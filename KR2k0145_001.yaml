body:
  text: 東西洋考卷一明張燮撰西洋列國考交址清化新州順化提夷廉南交址古南交也秦為象郡漢滅南越置九郡交址其一也光武時女子徵側徵二反馬援討平之後改交州隋復為交址郡唐置都護府朱梁時曲承美據地輸款授承美節鉞已復并於南漢其後州將爭立所部雲擾丁部領及子丁璉討平之宋綏嶺表璉內附封交址郡王蓋於是淪為夷矣璉弟璿嗣為其將黎桓所篡貢使不絶宋史曰宋鎬使黎桓歸闕上令條列形勢及事迹以聞鎬具奏曰去歲抵交州境桓遣牙內都指揮丁承正等以船九艘卒三百人至太平軍來迎由海口入大海冒涉風濤半月至白藤徑入海㲼乘潮而行宿泊之所皆有茅舍三間營葺尚新目為館驛至長州漸近本國務為誇詫盡出舟師戰櫂謂之水軍宵征抵海岸至交州僅十五里有茅亭五間題曰茅徑驛至城一百里驅部民畜産妄稱官牛數不滿千揚言十萬又廣率其民混於軍旅以雜色衣乘船鼓譟近城之山虛張白旗為陳兵之象俄而擁從桓至展郊迎之禮桓斂馬側身問皇帝起居畢按轡偕行時以檳榔相遺馬上食之此風俗待賓之厚意也城中無居民上有茅竹屋數十百區以為軍營而府署湫隘題其門曰明德門桓質陋目眇自言近歲與蠻寇接戰墜馬傷足受詔不拜信宿之後張筵出臨海汊為娛賓之逰桓跣足持竿入水標魚每中一魚左右皆叫噪歡躍凡宴㑹與坐之人悉令解帶冠以帽子桓多衣花纈及紅色衣帽以真珠為飾或自歌勸酒嘗令數十人扛大蛇長數丈饋使館曰若能食此當治為饌以獻焉又羈送二虎以備縱觀皆卻之不受士卒三千人悉黥其額曰天子軍糧以禾穗日給令自舂為食兵器上有弓弩木牌梭槍竹槍弱不可用桓輕鋭殘忍昵比小人腹心閹豎五七輩錯立其側好狎飲凡官屬善事者擢居親近左右有小過殺之或鞭其背賓佐小不如意亦捶之黜為閽吏怒息乃復其位有塔其制朴陋桓一日請同登逰覽地無寒氣十一月猶衣夾衣揮扇云然屢為寇害漸失藩臣禮桓卒諸子爭立及廷龍嗣苛虐不道李公藴逐之遂代為王其孫日尊稱帝改元僣號大越數傳至昊旵無嗣為其壻陳日煚所有宋史曰李氏有國凡八傳二百二十餘年元攻下之封其子光昺為王世貢不絶顧時時遣將躙蹂其地髙皇帝蕩平區宇王陳日煃率先內附遣學士張以寧封為安南國王㑹日煃卒侄日熞嗣請詔印于以寧拒之吾受命封先王何得豫若日熞乃請于朝遣編修王濓主事林唐臣封日熞嗣王而賞以寧得使臣體未幾陳叔明篡立叔明死子日焜為其臣黎季犛所弒蒼霞集曰叔明老弟煓代視事煓攻占城敗死弟煒代先是上嘗戒安南占城毋相攻至是以叔明兄弟怙強速禍復遣使諭之二十一年黎季犛弒煒立叔明子日焜旋為季犛所弒改國大虞稱太上皇使其子胡為國王詐稱陳氏絶無後而其甥也請權國事文皇帝許之俄而陳氏之孫天平者間道訴于朝胡懼表請天平還國封天平安南國王使都督吕毅黃中大理卿薛巖以兵護之季犛具牛酒犒師偵騎往壺觴道相屬也不為虞至芹站伏發殺天平及薛巖上大怒拜成國公朱能為征夷將軍西平侯沐晟左副將軍新成侯張輔右副將軍發兵分道討之吾學編載上幸龍江禡誓衆曰黎賊父子必獲無赦毋養亂毋玩寇毋毁廬墓毋害稼穡毋恣取貨財毋搶人妻女毋殺降有一雖功不宥成國公薨詔新成侯輔行大將軍事兵躙坡壘隘留二關而入抵富良江西平侯亦破猛烈關突宣江口出洮水度富良江與大軍㑹於三帶州賊立柵屯守師夜度大破之焚柵煙熖漲天乘勝攻下西都燒其宫室又破賊艘於木九江嗣大破賊於鹹水關窮追季犛父子獲之捷聞詔求陳王後已絶乃郡縣其地立交址布政司都指揮司按察司為府十七州四十七縣一百五十七衛十一守禦千户所三論功進封輔為英國公晟黔國公餘爵賞有差亡何餘孽簡定作亂英國為大將率兵討擒之踰年陳季擴復叛季擴簡定從子也輔復往討轉戰連歲始獲之自英公下交南凡三獲僞王威震西南夷因留鎮其地而尚書黃福掌藩臬有威惠遐外以寧尋召輔歸以豐城侯李彬代鎮福亦以久得代中貴人馬騏墨而煩苛失衆心黎利遂乘之反彬不能制所攻沒郡邑十數命成山侯王通佩將印發二廣兵四萬并鎮兵討之凡十餘戰利益盛前逼交州詔安逺侯栁升以精兵七萬往犄角平賊升故嘗從征安南者鋭而輕敵自以千騎為前鋒敗利兵前追之伏發橋壞升中鎗死成山侯懼不敢出乃與利約和以交址棄之引兵還利於是送還文武官吏四百十七人進代身金銀香象布帛謝罪且乞封而宣宗用大學士士竒榮䇿利表言前國王遺嗣皓今在老撾請嗣封上集大臣議英國公臣輔尚書臣義臣原吉皆言交南本中國地勞苦得之不宜隳成功大學士臣士竒臣榮言兵興以來天下無寧歲今瘡痍未起而復勤之臣不忍聞且求立陳後者太宗皇帝心也求之不得而後郡縣今因其請撫而建之以息吾民於計大便漢棄珠崖前史榮之安在為示弱乎上曰卿二人言是遣少宗伯李琦少司空羅汝敬等持璽書赦利求陳氏後立之利詭陳氏已絶更遣少宗伯章敞納言徐琦冊為權署安南國事利遣使入謝解歲金五萬兩然已改元順天帝其國中矣利死子麟立僣號紹平僞諡利太祖髙皇帝遣使告哀求冊權署國事正統丙辰以少司馬李都納言蔡亨持節冊為安南國王麟復改號大寶久之死子濬嗣僣號太和僞諡麟太宗文皇帝請冊朝貢不絶天順時為庶兄琮所弒自立僣號天興大酋黎壽域等起兵殺琮而立濬弟灝僣號光順成化初與鎮安土官守岑宗紹相攻為岑氏所敗占城王茶全攻其化州灝率兵救之占城退走虜王茶全以歸𢎞治間灝死子暉嗣僣號景統僞諡灝聖宗淳皇帝暉死子敬嗣僣號泰貞未踰年而死遺命立其弟誼僣號端慶僞諡敬肅宗欽皇帝誼立四年死於弒其酋黎廣度等表誼寵信母黨阮种阮伯勝恣行凶暴民不堪命阮氏圖竊國柄遷誼别宅逼令自盡臣等與國人共聲其罪黨與盡伏誅竊見故國王黎灝第二子故臣照有子黎賙堪任國事乞賜襲封詔許之賙僣號洪順追諡誼為厲愍王初灝生二子長即暉次子玿僞封錦江王暉生敬誼玿生灦賙誼被害時玿與灦俱先死故國人立賙而灦之子僞沱陽王譓及弟懬以兄不得立灦妻鄭綏女譓妻鄭惟鏟女是時鄭彊且握柄於國立賙非其意也賙既立僞尊父玿為德宗建皇帝多行不義國人惡之正德丙子鄭惟鏟鄭綏與其黨陳真弒賙而諒山都將陳皓者稱陳氏後以諒山之甲迫交州殺鄭惟鏟自立陳真擊走之皓病死鄭綏等共立譓為主於國僣號光紹僞尊灦哲宗明皇帝諡賙曰靈隱王追諡誼為威帝其大臣阮𢎞裕等討弒賙之罪攻鄭氏鄭氏出奔時國柄未有所屬莫登庸諷羣臣推已典兵登庸者荆門人世業漁以武舉為陳皓參督後歸黎譓纍戰功封武川伯鎮海陽以重賂賂譓左右入柄軍政加太傅封仁國公遂篡奪僞國既得志漸除譓左右易所親信防守之譓潜起兵攻登庸反為所敗出奔清華時嘉靖元年也登庸乃僞立懬僣號統元追諡賙為襄翼帝亡何鴆懬并其母殺之而自立國號大越改元明德僞諡懬曰恭皇帝時譓尚據清華乂安順化廣南四道登庸立其子方瀛居守自稱太上皇率兵攻譓連破之譓走入哀牢國憤悒死子寧甫七歲故臣共立之於漆馬江登庸屢攻不能克鄭惟憭以黎寧命來請兵下部議拜咸寧侯仇鸞為大將尚書毛伯溫監督及督臣蔡經等分道入討乃聚兵以聲恫喝登庸誘使納款登庸於是為降表請罪獻代身金人自贖伯溫等為壇兩軍相距登庸脫帽徒跣伏壇下稱詔赦之廣西通志曰嘉靖十五年皇子生先議頒詔諸夷禮部尚書夏言奏安南不貢逾二十年宜罷使及黎寧奏至廷議命毛伯溫為兵部尚書從宜撫𠞰兩廣督臣潘旦疏稱莫氏奸雄之賊黎氏逆利之裔皆非宜立如以夷狄處之則元昊可爵不義可侯而黎利可王也二氏紛爭兵甲未息皆欲假天朝名號宜靜觀其變與廷議不合因召旦還以侍郎蔡經代之亷州守張嶽獨言用兵之害宜留使者勿前經問嶽曰能保毋用兵降登庸乎嶽曰欲降之必令納地令貶號令匍伏詣闕獻國中圖籍聽上處分國體不可褻也經曰如此能令登庸聽乎嶽曰一檄足矣於是兵事調度一屬之嶽司馬毛伯溫至嶽手賊情地形冊子授伯溫曰公計用兵則圖進取方略無逾此者然不若罷毋征為完計顧公䇿安決耳伯溫密謂嶽曰交事屬子矣先是登庸聞廷議興師遣人上表乞降至是求益􅈤嶽用前言要之登庸初猶倔彊嶽懼以禍令蚤自計於是登庸惟命㑹嶽遷去登庸復首鼠兩端伯溫經奏乞還嶽廣東登庸曰張公在吾無恐矣伯溫檄重兵駐節南寧而參政翁萬達素負雄略諸所䇿如張嶽議乃使通判蘇廷瓛傳譯令束身軍門歸地繳印去僣號奉正朔復遣作書諭之登庸乃以十一月素衣繫組躬率頭目耆士候于南關萬達等開張幕府設龍亭覆以黃幄傳令開關登庸等由關道左出脫履跣足面北而跪傳解其組及接受降書凱旋伯溫等加秩有差廷議黎寧非真黎氏後以登庸為都統使鎮安南然帝其國自如也登庸方瀛相繼死孫福海嗣位又死子宏瀷幼大臣阮敬等専權國復亂四十三年貢使黎光賁至京光賁以國難羈留南寧者十五年至是乃達其後貢遂絶萬厯間莫茂洽為都統使茂洽死國大亂數年鄭惟憭子鄭檢立黎暉後維邦為主維邦死子維潭嗣盡逐莫氏遺孽詣督臣請款關輸貢移文擅用前國王印守臣詰之維潭飾詞對然請款愈堅與約必以髙平居莫氏如黎氏漆馬江時維潭心難之遁去頃之復款具言其恢復之義歸附之誠髙平乃其故土且莫氏篡臣不宜漆馬江為比守臣曰莫氏先世雖篡逆今日乃國家外臣也使假息一隅毋遽殄絶是我國家所以鎮撫四夷共其患難之意維潭乃聽二十四年夏築壇受降如登庸故事廣東通志曰維潭抵關同知黃宇李陶成出關傳譯詰以六事首擅殺貢臣曰復仇之急不遑請命乞矜其愚次維潭曰世孫也其祖黎暉天朝曾錫命焉次鄭松曰𨽻臣世以衛黎非冒黎也然則何宵遁乎曰以儀物之不戒非遁也幸不加討其自今有死無二金印何在曰權倣為之立銷矣至安插猶佯對不決復譯諭曰均貢臣也黎昔可漆馬江莫獨不可髙平乎且分土既定庸何傷阮澧等語塞趨白維潭曰謹遵命黃宇還報授澧款關儀節使旋習之初十晨開關先夷杠次夷使衛兵次維潭并通國臣耆俱魚貫入維潭褫衣跣足身繫白組北面伏地陶成親解其組維潭起著衣履同臣耆五拜三叩頭訖進伏罪表次進金人代身姑令戴罪還國候㫖維潭又五拜三叩頭畢候龍亭前赴左江道請用賔主見又請稍降階俱不從黃承祖從旁厲聲示維潭今復國不費檳榔半咽何靳四拜遂下拜各頭目皆羅拜張其犒之督臣陳大科疏言莫之篡黎其事逆先朝猶赦其愆况黎之復讎其名正今日宜許其順以夷治夷祖宗成法事下部議如大科言以維潭為都統使安南復定萬厯間黎維新嗣維新雖國主然政無纖巨悉決於大臣鄭松所擁虛器耳三十五年交南苦饑叛酋集衆掠欽州輒散去督臣戴耀遣兵討捕之移檄維新自縛叛酋松縛企揚扶安扶忠三人來獻其與粵西連境者歲歲為南大憂督臣周𢎞謨請增兵增餉以需大創云其俗夷獠雜居獷悍喜鬬或剪髮或椎髻口赤齒黑跣足文身暑熱好浴故便舟善水惟交愛人倜儻好謀歡演人淳秀好學則從古傳為美談國中尚知祀文宣王用制科取士亦猶中華之遺教也其地分十三承政司廣志曰欲示土地之廣彊分析為郡縣其實一承政不能及中國一府或自舊縣升為府如慈山涖仁之類或承政只管一府如安邦諒江之類舊名多更改割裂舶人稱東京者即其故都其王居曰日南殿清化港即舊清化府也是漢九真郡治之地隋唐為愛州在交址為西京今為清華承政司順化港即舊順化府也今為順化承政司廣南港即舊乂安府也漢為日南隋唐為歡州今為廣南承政司太傅阮某鄭松之舅也松既執國政阮不能平擁兵出據於此威行諸部某卒其子始修貢東京新州港即舊新安府也今為海陽承政司提夷港亦交址屬縣以上風俗大約與東京相類尚有汝南承政京北承政山西承政諒山承政太原承政明光承政興化承政乂安承政賈船所不到附載于此形勝名蹟佛跡山在交州府石室縣有巨人跡下有池景物清麗一方勝概勾漏山在石室縣古勾漏縣在其下漢書注勾漏有潜水牛上岸共鬬角軟還復出東究山在北江府嘉林州一名東臯山唐刺史髙駢建塔其上仙逰山在北江府武寧縣相傳有樵夫觀二仙奕棋於此金牛山在武寧縣唐刺史髙駢欲鑿其山見金牛奔出遂止漢書注九真郡居風縣有山出金牛往往夜見光輝十里崑山在諒江府鳯山縣上有清虛洞山腰有瀨玉橋白雲庵林岫之勝丘皤山在諒江府丹巴縣上有石門廣三丈相傳漢伏波將軍馬援所鑿安子山在新安府東湖縣一名象山漢安期生得道處宋海嶽名山圖以為第四福地雲屯山在新安府新屯縣大海中兩山對峙一水中通商舶多聚此大圓山在新安府新安縣大海中突起圓嶠永樂十六年山獲白象二來獻鳯翼山在三江府夏華縣邑人歲時登覽三島山在宣化府楊縣三峰特起芄山在太原府弄石縣下有巖洞水穿洞中可行舟隴山在太原府洞喜縣四面皆峭壁中有村墟在焉戲馬山在清化府永寧縣一名逰英山巍然獨立橫枕長江邑人九日登髙處安鑊山在清化府東山縣出美石漢豫章太守范寧嘗遣吏採石為磬天琴山在乂安府竒羅縣東海邊相傳陳氏主遊此夜聞天籟聲故名永樂初天兵擒黎賊子蒼于此橫山在乂安府河華縣昔林邑告交州刺史朱蕃求以日南北鄙橫山為界即此傘圓山在嘉興州其勢髙峻雄偉艾山在嘉興州䝉縣面臨大江峭石環立人跡罕至相傳上有仙艾每春開花雨後漂水羣魚吞之便過龍門江化為龍富良江在交州府東關縣一名瀘江上接三帶州白鶴江經城東下通利仁縣大黃江以達于海宋郭逵破蠻決里隘次富良江本朝張輔等破黎寇于此如月江元兵與懷文侯戰處天德江一名廷藴江又名東岸江永樂初黎寇懼討役民堙塞天兵既平寇重加浚治舟楫復通來蘇江舊名蘇歷江自交州東北轉而西下直抵鋭江昔有蘇歷者開此故名永樂初工部尚書黃福重浚因王師弔伐乃更名來蘇宣光江在宣化府曠縣源自雲南教化長官司入境流七百餘里達宣化江沐晟自雲南引兵駐此海潮江在建昌府快州自阿魯江分流下通玉球江昔陳氏破占城軍處龍門江在嘉興州䝉縣漢書注封溪縣有隄防龍門水深百尋大魚登此門化成龍不得過曝鰓㸃額血流此水恆如丹池一統志曰源出雲南寧逺州至此橫截江流中分三道飛湍聲聞百里舟過此必舁上岸方可復行夜澤在建昌府東結縣梁時有阮賁世為豪右陳霸先擊破之賁逃澤中夜則出掠因號夜澤龍溪在鎮蠻府廷河縣昔陳氏夜過江不能渡忽見一橋跨江既渡回顧不見及有國改名龍溪天威涇唐髙駢以交州至雍川海多潜石漕運不通鑿開五道有青石徑或傳馬援不能治既而震碎其石亦得通因名天威涇東津渡在交州府東關縣瀘江舊以舟楫往來阻風永樂初張輔沐晟始置浮橋每歲一易金溪究水經注曰朱䳒雒將子名詩索麋泠雒將女名徴側為妻側有膽勇攻破州郡為王馬援將兵討之走入金溪究三歲乃得越王城在乂安府東岸縣又名螺城以其屈曲如螺漢時安陽王所築安陽王舊都越地故又稱越王城宫址尚存璽城望海城俱交州府漢書曰馬援奏言西于縣户三萬二千逺界去庭千餘里請分置封溪望海二縣因築二城守之大羅城在交州城外漢交址郡唐安南都護府皆在此其城張伯儀所築髙駢修廣之宋李公藴立國于此雒王宫交州異域記曰交趾未郡縣時地有雒田隨潮上下民墾食其田因名雒民設雒王雒侯主諸郡縣縣多為雒將銅印青綬後為蜀王子所滅今三帶州宫址尚存天使館元傅與礪使安南題詩云使旌入館青雲動仙蓋臨江白日回喻蜀豈勞司馬檄朝周終見越裳來浪泊在交州府東關縣一名西湖馬援平交趾謂官屬曰吾弟少逰常哀吾慷慨有大志嘆曰士生一世但衣食才足為郡縣吏守墳墓鄉里稱善人足矣至求贏餘自苦耳吾在浪泊西里閒下潦上霧毒氣薰蒸仰視飛鳶站站墮水中念少逰語何可得也銅柱馬援破交址立為漢界誓云銅柱折交址滅唐馬總亦建二銅柱物産金爾雅曰黃金謂之蕩孔融曰金之優者謂之紫磨一統志謂太原諒山乂安等府所出也珠晋陶璜為交州百姓無農惟採珠為業以珠易米辟寒犀唐開元間交址進犀角一株色黃如金以金盤置殿中暖氣襲人上問其故使者曰辟寒犀也珊瑚一統志曰有赤黑二種在海直而軟見日曲而堅漢初趙他獻赤珊瑚號絳火樹犀角宋及本朝充貢山海經曰犀三角一在頂上一在額上一在鼻上鼻上者小而不墜食角也交州記曰犀有二角鼻上角長額上角短或曰三角者水犀二角者山犀象牙爾雅翼曰象齒歲脫猶愛惜之掘地而藏必削木為僞齒潜往易之覺則不藏故處宋及本朝交址充貢貝劉欣期交州記曰大貝出日南如酒杯廣州志曰貝有八紫貝最美出交州萬震曰乃有大貝竒姿難儔交址以南皆有之玳瑁本草曰大如扇似龜甲有文解毒兼辟邪海槎餘録曰背負十二葉有文藻取用必倒懸其身用滚醋潑之逐片應手而下但不老大則皮薄不堪用耳翠羽爾雅謂之鷸異物志雄赤曰翡雌青曰翠禽經曰鷸有文而貪人取其羽為飾故左傳云翠被而楚詞云翠帷銅鼓廣州記曰俚獠鑄銅為鼓面濶五尺餘鼓臍隱起或作海魚周回有蝦蟇十二相對初因鄉里小兒聞鳴蛙之怪得於蠻酋大冢中按漢書馬援征交址得駱越銅鼓改鑄馬式蓋漢而有之與今制不同銅銅柱之鑄從來久矣丹砂晉葛洪煉丹求為勾漏令杜子美詩交址丹砂重竒楠香其香經數歲不歇為諸香之最故價轉髙以手爪刺之能入爪既出香痕復合如故華夷考曰香木枝柯竅露木立死而本存者氣性皆溫為大蟻所穴蟻食石蜜歸而遺於香中歲久漸漬木受蜜氣結而堅潤則香成矣近世以制帶銙率多湊合頗若天成純全者難得耳竒楠香油真者難得今人以竒楠香碎漬之油中以蠟熬之而成微有香氣沉香圖經曰木類椿櫸多節葉似橘花白子似檳榔大如桑椹交州謂之蜜香斷其積年老根經年皮幹俱朽爛木心與枝節不壞者即香也堅黑而沉水為沉香速香南方草木狀曰交址蜜香樹伐之經年其根幹枝節各有别也心與節堅黑沉水為沉香水面者為雞骨香根為黃熟香幹為棧香細枝緊實未爛者為青桂香根節輕而大者為馬蹄香同出一樹今人名速香蓋黃熟語音之訛矣安息香酉陽雜爼曰其樹呼辟邪樹長三丈許刻皮出膠如飴名息香本草云似柏脂黃黑色為塊新者亦柔軟一統志曰樹如苦棟大而直葉類羊桃而長中心有脂作香詹糖香圖經曰出交南木似橘煎枝葉為香往往以皮及蠧屑和之難得淳好者蘇合油圖經曰蘇合香與真紫檀相似而堅實極芬香今不復見但用如膏油者極芬烈耳陶隱居以為是獅子屎外國說不爾梁書云蘇合香是諸香汁煎之非自然一物也先煎其汁為香膏乃賣其滓與賈人絹按九真郡蠶年八熟繭小輕薄絲弱綿細今交址絹蓋八蠶之絲所織也薄者畫家多用之其色近古本朝充貢東京布亦吉貝所織者尺幅甚狹羚羊角郭璞曰麢似羊而大角圓鋭陳藏器曰羚羊夜宿以角掛木不著地但取角彎中深鋭緊小猶有掛痕者是交址出髙石山明角牛白者角亦白是稱明角雄角大而直雌者多磊塊故價為遜烏角考工記曰稚牛之角直而澤老牛之角紾而昔疢疾險中瘠牛之角無澤鹿角許氏說文曰鹿解角獸雅翼曰鹿陽獸逰山夏至得陽氣而解角從陽退之象埤雅曰羣居則環角外向以防物之害己獺皮埤雅曰似狐而小青黑色膚如伏翼一歲二祭其先取魚水潏四面陳之謂之祭魚今人集其皮為裘馬尾宋時占城多從交址市馬則馬故所自出蠟陶隱居云蠟生蜜中故謂蜜蠟蜂先以此為蜜跖煎蜜亦得之初時極香軟人更煮煉或加少醋酒便黃燕窩燕食海藻吐以作巢依石穴上伏其卵生雛故多著毳夷人梯取之王敬美閩部疏謂海燕所築銜之飛渡倦則擲置海面浮之若杯身坐其中久之復銜以飛為海風吹泊山澚海人得之以貨此好竒而誤入之者也胡椒酉陽雜爼云苗蔓生根極柔弱長半寸有細條與葉齊條上結子兩兩相對其葉晨開暮合合則裹子葉中形似漢椒至辛辣蟳肉周書王㑹海陽大蟹注海水之陽以此貢獻蓋蝤蛑巨者蝤蛑即蟳别名也今人貨其乾肉以歸薏苡仁交南呼為􅗰珠一名薏珠子馬伏波所以興謗也檳榔俞安期曰檳榔子既非常木亦特異余在交州度之大三圍髙丈餘葉聚木端房棲葉下花秀房中子結房外皮似桐而厚節似竹而概中空外徑遐立海南遼然萬里嶺表録異曰安南人採實以扶留藤兼瓦屋子灰競嚼之云交州地溫非此無以祛瘴癘椰異物志曰樹髙六七丈無枝葉葉如束蒲在上實如瓠繫之顛實外皮如胡蘆膚中有汁升餘食其膚則不饑食其汁則增渴交州記曰椰子有漿作酒飲之亦醉沈佺期椰子樹詩日南椰子樹香裊出風塵叢生調木首圓實檳榔身玉房九霄露碧葉四時春不及塗林果移根隨漢臣千歲子南方草木狀曰藤蔓出土子在根下鬚緑色交加如織其子一苞二百餘顆皮殼青黃色殼中有肉如栗味亦如之乾者殼肉相離撼之有聲出交址菴羅果一統志曰俗名香蓋乃果中極品實似北梨四五月熟多食無害波羅蜜一統志曰大如冬瓜皮有軟刺五六月熟味最香甜核可煮食能飽人嘉林州出者佳劉爾雅注曰實如梨酢甜核堅出交址石栗草木狀曰石栗生石罅間殼厚肉少味似胡桃熟時為鸚鵡啄食略盡故彼人珍貴出日南豆蔲異物志曰生交址形似益智皮殼小厚如石榴辛且香古度交州記曰不花而實實從皮中出大如石榴色赤可食石南樹南方記曰實如燕卵取核乾其皮中作肥魚羮和之尢美出九真州樹南方記曰掘煮如李子剝核味甜出武平國樹南方記曰子如雁卵曝乾食之味似栗出交址多感交州記曰多感子黃色圍一寸蓽茇草木狀曰蒟醬生蕃國者大而紫謂之蓽茇交址多種蔓生留求子草木狀曰形如梔子稜瓣深而兩頭尖及半黃已熟中有肉白色甘如棗核大交址有之大茄草木狀曰交廣種茄宿根三五年漸長枝幹乃成大樹盛熟梯取之蘇木華夷考曰蘇枋樹出九真南人以染絳一統志曰一名多那俗名紅木烏樠木顔師古曰樠木名其心似松一統志曰樹似栟櫚堅緻可為器棕竹竹如指大實中黑色而白㸃文文似栟櫚故名稯竹其粗者名竹枯不中用棘竹竹譜曰棘竹生交州大二尺圍肉厚幾於實中夷人破以為弓枝節有刺種以為城卒不可攻萬震異物志所謂種為藩落阻過曽墉者也白緣交州記曰白緣樹髙丈餘實味甘美於胡桃人子藤酉陽曰安南人子藤紅色在蔓端有刺子如人狀燒之集象南中亦難得犀交州記曰犀毛如豕蹄有三甲頸如馬有三角象朝野僉載曰安南有象能知人曲直負心者以鼻捲之兕爾雅曰兕似牛青色重千斤一角長三尺餘形如馬鞭柄皮堅厚可制鎧漢霛帝時九真獻為竒獸元時安南貢兕白鹿晉元康初白鹿見交趾武寧縣宋元嘉交趾獻白鹿驨爾雅云驨如馬一角者騏郭云元康八年九真郡獵一獸大如馬一角角如鹿葺此即驨也猩猩水經注云猩猩獸形若黃狗又狀貆人面顔容端正音聲妙麗楚太原王綱曰猩猩好酒及履里人置之山谷常數輩為羣見酒物知人張設取之先知張者祖父姓名詈曰奴欲殺我亟舍爾去也既復還曰試共嘗酒逮醉取屐著之為人所擒狒狒爾雅曰狒狒如人被髮迅走食人山海經一名梟羊有毛反踵見人則笑出交廣郭璞贊曰狒狒怪獸被髮操竹獲人則笑脣掩其目終亦號跳反為我戮果然山經果然似獼猴以名自呼羣行老者在前少者在後得果食輒與老者似有義焉交趾有之南州異物志曰交州果然獸體不過三尺而尾長四尺餘反尾度身過其頭視鼻仍見兩孔仰向天其毛長柔細滑澤以白為質黑為文集十餘皮可得一縟繁文麗好細厚溫暖蒙貴爾雅謂之䝉頌一統志曰狀如猫而小紫黑色畜之捕鼠甚於猫林元凱為安南陳中貴題畫云內相家中䝉貴兒華堂客到每先知今朝洗面還過耳故寫新圖開閣詩白雉漢光武時日南九真貢孔雀異物志曰孔雀自背及尾皆圓文五色頭戴三毛長寸以為冠足有距迎晨則鳴相和交址郡人多養孔雀殺為脯臘又養其雛為媒傍施網罟伺其飛下則牽網橫掩之採其金翠毛裝為扇拂或生截其尾以為方物云生取則金翠之色不減鸚鵡林元凱詩隴頭春樹拂雲紅學語聲嬌弄晚風上國抵今辭逺貢莫愁彩羽閍雕籠蚺蛇水經注曰交址山多蚺蛇長十丈圍七八尺常樹上伺鹿鹿過低頭繞之有頃鹿死先濡令濕便吞頭角骨皆鑽皮出山夷始見蛇不動時以大竹籤籤蛇頭至尾殺而食之以為珍異故異物志曰蚺為大蛇既洪且長采色駮犖其文錦章食豕吞鹿腴成養創實享嘉宴是豆是觴言養創之時肪腴甚肥搏之以婦人衣投之蟠而不起便可得也紅飛鼠華夷考曰多出交址深毛葺葺然唯肉翼淺黑色雙伏紅蕉花間捕者獲其一則其一不去婦人帶之為媚藥竹鼠交州記曰竹鼠如小狗大食竹根出封溪鸚鵡魚一統志曰龍門江旁有穴出鸚鵡魚色青緑口曲而紅似鸚鵡嘴相傳此魚能化龍蟻子鹽嶺表録異曰溪洞酋長多收蟻卵爭鹵為醬非官客親友不可得食周禮醢人饋食之豆有蚳蟻子即此交易賈舶既到司關者將幣報酋舶主見酋行四拜禮所貢方物具有成數酋為商人設食乃給木牌於廛舍聽民貿易酋所須者輦而去徐給官價以償耳廣南酋號令諸夷埒于東京新州提夷皆屬焉凡賈舶在新州提夷者必走數日程詣廣南入貢廣南酋亦遙給木牌民過木牌必致敬乃行無敢譁者斯風稜之旁震矣順化多女人來市女人散髮而飛旁帶如大士狀入門以檳榔貽我通殷勤士人嗜書每重資以購焉按宋史大觀初貢使至京乞市書籍有司言法不許詔嘉其慕義許之然則彼國嗜書正非一朝耳論曰久矣夫交南之為郡縣也文皇帝振宋之陋六師所指海立電飛漢唐土疆於兹重闢厥績偉矣逮英公內斾銜命宵人馬竭猶求獸窮則逸宣廟以止戈為武休息甚𢎞然楚楚冠裳棄成鱗介不得與珠崖儋耳同被華風則大造者之靳此一方靈秀也二百餘年羈縻勿絶保境戢惠固獻琛而稱藩易姓代興終款關而待命雖僣竊未改視黎桓時則有分矣東西洋考卷一
