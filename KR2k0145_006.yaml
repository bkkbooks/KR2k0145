body:
  text: 東西洋考卷六明張燮撰外紀考日本日本古倭奴也漢光武時遣使入朝自稱大夫安帝時始稱倭奴國靈帝光和中其國遞相攻伐女子卑彌呼能以鬼道惑衆國人共立為王無夫有二男子給王飲食通傳言語魏志曰有男弟佐治國自為王以來少有見者以婢千人自侍惟男子一人給飲食傳辭出入居處宫室常有人持兵守衛卑彌呼死更立男王國人不服乃立宗女臺與為王自魏至隋朝聘不絶隋書開皇中遣使詣闕上令所司訪其風俗使者言倭王以天為兄以日為弟天明出聽政日出便停理務云委我弟文帝曰此大無義理訓令改之人大業三年王遣朝貢使者曰聞海西菩薩天子重興佛法故遣朝拜國書云日出處天子致書日沒處天子無恙帝覽不恱謂鴻臚卿曰蠻夷書有無禮者勿復以聞明年遣裴世清使倭倭數百人設儀仗鳴鼓角來迎後十日遣大禮哥多毗從二百餘騎郊勞王相見大恱曰我聞大隋禮義之國故遣朝貢僻處海隅不聞禮儀是以稽留境內不即相見今清道飾館以待大使冀間維新之化清曰皇帝德並二儀以王慕化故遣行人來此宣諭復令使者隨清來貢唐咸亨後稍習夏音惡倭名更號日本武后時使臣真人粟田請從諸儒受經副使仲滿至慕華不肯去自此文物日增矣唐書曰真人冠進德冠頂有華花四披紫袍帛帶好學能屬文進止有容宴之麟德殿開元初復朝請從諸儒受經詔四門助教趙玄默即鴻臚為師獻大幅布為贄悉賞物貿書以歸其副仲滿慕華不去易姓名曰朝衡歷左補闕儀王友多所該悉久乃還建中元年使者興能善書其紙似繭而滭人莫識貞元末使者朝其學子橘免勢願留肄業歷二十餘年宋時屢遣僧入貢方物宋史曰僧奝然來朝太宗存撫甚厚賜紫衣館太平興國寺其國多中國圖籍奝然之來復得孝經及越王孝經新義皆金鏤紅羅褾水晶為軸奝然詣五臺令所過續食求印大藏經詔給之景德元年僧寂照來朝不曉華言而繕寫甚妙問答並以筆札詔號圓通大師賜紫方袍熙寧五年僧誠尋至天台國清寺願留詔使赴闕神宗以其逺人有戒業處之開寶寺盡賜同來僧紫方袍是後連貢方物而來者皆僧也元豐初通事僧仲回來賜號慕化懷德大師日本舟為風濤飄至者悉厚給之按宋史乾道三年風泊日本舟至明州衆不得食行乞至臨安復百餘人詔日給錢米俟其國舟至日遣歸十年日本七十三人復飄至秀州給常平倉錢米賑之紹熙四年慶元六年嘉太二年復有倭人風飄而至者詔並給錢米遣歸國元世祖使趙良弼招之不至嗣發水犀十萬征之全師漂沒元史曰敗卒于閶脫歸言官軍七月至平壺島移五龍山八月一日風破舟諸將各自擇堅好船乘之棄士卒山下衆議推張百户為主帥聽其約束方伐木作舟日本人來戰盡死餘二三萬為其虜去盡殺蒙古漢人謂新附軍為唐人不殺而奴之閶等是也久之莫青吳萬五亦逃還十萬之衆得還者三人耳終元世竟不通然亦不能為寇洪武二年倭寇山東淮安明年再入轉掠閩浙上遣趙秩語其王良懷爾能臣即來毋患苦吾邊不能善自為備良懷言蒙古嘗使趙良弼好語餂我襲以兵今使者得毋良弼後乎其亦將襲我也秩曰聖天子蕩平區夏四裔來庭此非蒙古時也吾逺宣國家威德耳豈狙汝耶良懷氣沮乃遣僧奉表稱臣入貢上亦遣二僧往諭然其為寇掠自如乃下令造海舟防倭德慶侯廖永忠請備輕舸以便追逐從之憲章類編曰廖永忠上言陛下定四海臻太平元人遺黨亦逺遁萬里獨倭夷鼠伏海島時因風便以肆侵掠來如奔狼去若驚鳥請令沿海添造快船巡徼倭來則大船薄之快船逐之彼欲為寇不可得也上善其言七年來貢無表文九年表貢語謾詔詰責之十三年再貢皆無表以其征夷將軍源義滿所奉丞相書來書倨甚命錮其使明年復貢命禮臣為檄數而卻之已復納兵貢艘中助逆臣胡惟庸惟庸敗事發上乃著祖訓示後世絶不與通而令信國公湯和江夏侯周德興分行海上視要害地築城設衛所兵戌之犬羊盤錯矣吾學編曰信國公和致仕居鳳陽召至京諭曰日本小夷屢擾東海上卿雖老強為朕行視要地築城防賊信國築登萊至浙沿海五十九城二十年置浙東西防倭衛所是年遣江夏侯周德興築福建海上十六城永樂元年王源道義遣使入貢賜冠服文綺給金印道義稍捕獲諸島寇來獻賜賚甚豐封其鎮山賜勘合百道與期期十年一貢八年道義死子源義持立遣使册封頃之我兵獻海上俘其首皆倭人羣臣請誅之上釋歸下璽書義持爾父畏天事大職貢不愆先烈之不圖而輕犯上國罪在必討朕所隱忍者未忘爾父之恭耳爾熟計之義持奉表謝罪未幾復寇遼左都督劉榮大破之吾學編曰都督劉榮總兵守遼東繕海上堠堡伏兵伺倭十七年倭入王家山島傳烽沓至榮率精兵疾馳望海堝賊數千人直抵馬雄島榮發伏出戰遣竒兵詣山下斷其歸路賊奔入櫻桃闈榮合兵攻之斬首七百四十二生捕八百五十七是時方招來諸島夷貢使絡繹倭乘為欺詐瀕海復騷賴是捷始戢論功封榮廣寧伯宣德七年命中使往諭自後遞貢遞掠羈縻而已倭益縱無忌至焚官庾墟民舍縛嬰兒竿上沃以沸湯卜孕婦男女剖視賭酒為樂慘毒不忍言成化時廷臣議郤貢竟從中格正德四年王源義澄遣宋素卿來貢素卿者鄞人朱縞也入倭有寵于王易姓名充使守臣白發之禮臣恐失外夷心置不問賜飛魚服遣歸嘉靖二年再奉使至是時國王源義植孱不能御其酋諸酋爭貢以邀互市及賞賚右京兆大夫髙貢使宋素卿來左京兆大夫內藝興遣宗設兼道先素卿至俱留寧波故事夷使以先後至為序市舶中官賴恩墨素卿賄先素卿宗設大忿攻素卿遂躙諸旁縣奪舟去御史以聞下素卿獄論死因罷市舶絶貢者十七年至十八年王源義晴復貢乞易勘合不許仍申約貢必如期舟以三為率每舟不得過百人不者郤勿受夷性婪鯁約如故內地姦豪往往與為市不償直夷索逋急則哃喝官府逐寇兵出則隂泄之倭速其去且樹德也如是久之倭大恨言我挾王資來不得直何以還報因盤據島中海上亡命無賴之徒交搆為亂東南之禍大作于時特設閩越中丞臺彈治之撫臣朱紈日夜飭兵甲嚴糾察上章暴勢豪交通罪紈疏曰去外夷之盜易去中國之盜難去中國之盜易去中國衣冠之盜難紈竟為豪所中自殺賊益獗三十一年殘浙東明年犯太倉破上海崇德嘉善諸邑時王忬為中丞拮據粗有成緒旋移大同去李天寵代之盧鏜湯克寬俞大猷為將倭四出流剽諸道與戰俱不利三十三年張經為總督經前督兩粵有威惠調粵兵禦倭兵未集而工部侍郎趙文華以禱海至文華素夤緣相嵩貴華頥指經經自以大臣位其上不肯下文華遂劾經養寇并及天寵詔逮訊時經已與賊大戰王江涇破走之斬首二千人進攻陸涇壩賊又敗之倭大創經上疏自理不聼竟論死西市以周珫代經胡宗憲代天寵珫未幾去以楊宜代屬文華督察其師倭來益衆文華戰于陶宅敗績遂還朝賊别部自日照登掠贑榆自上虞登掠髙埠皆不滿百人官軍莫能禦轉掠浙西南直破南陵溧水橫行數千里殺傷蔽野至蘇州始為參政任環所敗大猷等逐賊海上斬獲頗多而閩廣倭大至三十五年十月有倭由漳浦登岸所過焚掠無計漳自此歲歲苦倭漳志曰三十六年海寇許老謝䇿等突至月港虜殺千餘家是冬倭泊浯嶼往來漳潮間流毒甚慘三十七年夏寇月港焚燒人家奪舟去是冬海寇誘倭三千餘復泊浯嶼三十八年正月散處行劫二月倭數千自潮來延劫海濵長泰南靖平和諸處楊宜既罷去宗憲代之以阮鶚代宗憲文華復出督師時浙賊惟陳東最疆徐海後至與東合勢雄甚當事意在議撫而鶚主剿賊進圍桐鄉鶚固守不能拔乃解去葉福唐阮中丞傳曰賊衆奔桐鄉公先馳入城與知縣金燕死守自倚戟女牆上更四十餘日乞援於胡竟不應賊悉力仰攻不能入持胡公牘請犒曰吾與胡成矣公怒伏神銃射之穿其股賊乃退宗憲欲搆二賊遣人至海所若為好語者東疑之則厚賂海使執東自贖海許諾乃計擒東以獻而自率其衆别營梁莊鶚遣官兵盡殱東巢進攻海于梁莊海死兩浙暫平李文定曰海奔據沈莊憑險設守諸道兵觀望不敢進公躬率重兵赴之别選壯士夜潛渡濠薄賊柵焚之海重甲突圍創斃之賊遂滅其明年誅王直直徽人也嘯逋海上有盜道能號召諸夷治艨艟巢五島中姦商王滶等共集衆與相署置倭來皆直等為導宗憲欲招之乃迎其母妻至杭供具犒慰甚厚先是鄞諸生蔣洲者上書督府言能説直使禁戢諸夷宗憲遣洲行以陳可願副之直為言日本方亂誠令我輩得自歸無難倭矣遣養子毛臣同可願還白直語而傳送洲至豐後島島主留洲稍為傳諭諸島居二歲乃遣僧德陽隨洲來貢直亦許俱至宗憲遣毛臣還報直所以遊説百端至是直乃來御史王本固疏言不宜招直直至覺有異乃先遣滶入見曰吾等奉招而來謂宜信使逺迎宴犒交至也今行李不通而兵陳儼然公毋誑我乎宗憲曰國法宜爾毋我虞也與約誓堅苦直終不信曰果爾可遣滶歸宗憲立遣之復以指揮夏正為質直乃使毛臣王滶守舟而身入見頓首言死罪且陳與洲戮力狀宗憲慰藉甚至令居獄中俟命疏聞有詔誅直始宗憲本無意殺直以本固爭之強宗憲不敢為請直死王滶毛臣殺夏正率餘衆據舟山征之踰年乃解三十八年倭寇江北巡撫李遂討平之李遂至如臯與賊遇白蒲諸將請擊之遂曰戰貴得地賊方鋭而我軍未嘗見大敵即小挫難復矣約勒軍中毋得言戰賊益進䇿曰賊分道入過如臯必且合合則道有三自泰州逼天長鳯泗即皇陵驚最要自黃橋逼瓜儀搖南都而梗漕次之若從富安而東海濵荒涼虜掠無所得至廟灣絶矣乃吾得地時也於是部諸將防遏令毋得過天長瓜儀而分兵綴賊後賊果走廟灣遂欲以䇿困之通政唐順之以視師至促戰死傷甚衆順之度不能克釋去遂益合兵攻圍賊因甚欲遁副使劉景韶督兵焚其舟賊救舟我兵水陸攻之賊大潰江北倭悉平其寇閩最劇者曰張璉璉饒人也三十九年夏由潮襲漳郡無寧土漳志曰張璉僣偽號襲陷雲霄城屯住十餘日方去是時平和詔安龍巖南靖俱被倭饒殺掠草寇乘風所在為亂璉又攻破寧德福清永福諸邑宗憲檄參將戚繼光往援時賊據橫嶼阻水為營官軍踰年莫敢進繼光所部用命至則令軍中人持束草填河力戰大破之歸乘勝剿福清牛田倭又破之繼光每至郡邑從當事酣飲父老請師期繼光曰吾兵疲且休矣緩圖之賊偵者歸告不為備酒罷輒督兵行數十里黎明破其巢郡邑人尚未知兵出也繼光歸賊復肆四十年寇漳州陷鎮海南靖而月港人自稱二十四將雄據海上久之先是張維等二十四人造船通倭官府莫能禁戊午冬遣兵剿捕維等率衆拒敵由是益橫據堡為巢官府為倭饒亂故用以賊攻賊之計遣金幣招致洪迪珍攻倭倭衆由詔安漳浦取道漸山進擊八九都接戰草坂城外倭敗走而迪珍等益橫張維復叛巡海道周賢宣檄鄧士元討擒之自此地方告寧而設縣之議起矣四十二年賊陷興化復命繼光往時賊方巢平海繼光督軍薄戰因風縱火賊糜巢中無脫者因捕餘寇於連江仙遊追至漳浦大破之明年討吳平林道乾于詔安滅之當是時微繼光幾無閩時廣中倭亦為總兵劉克寬所敗斬獲無算自東南中倭以來十餘年間中外騷擾財力俱匱蒼黔之屠膾已極倭亦大傷至盡島不還隆慶時海上逋寇曽一本等復勾引入犯我亦嚴為備旋至旋撲非如嘉靖之季矣倭自平清盛秉政一門並據要路為淫暴於國萬厯十四年平信長為關白其義子平秀吉者先是母為人婢得娠欲勿舉念有異徵育之秀吉幼微賤販魚為業醉卧樹下信長出獵吉驚起衝突將殺之見其鋒頴異常因留養馬名木下人嗣從征伐有功為大將已而信長為明智所殺秀吉與行長誅明智廢信長子自立為關白倭奴既盛散入諸國間萬歷初使臣封琉球聞中山王往往為倭所苦至十八年阻中山王勿通貢閩撫以聞朝議置而不問二十年正月秀吉帥行長清正等入犯朝鮮朝鮮承平久武備盡弛王李昭聞變恇怯遂陷三道太妃及世子為倭所執昭北走義州絡繹告急遣祖承訓往援全師皆沒上震怒以宋應昌為經略率大將軍李如松督諸將東征渡鴨緑江戰平壤大破之倭奴宵遁我師追討遇伏發戰碧蹄館師遂少挫自是連戰不利大司馬石星度內閣有厭兵意力主和議以布衣沈惟敬往遊説焉倭遣小西飛來議貢顧養謙孫礦相繼為總督俱掣肘不得展中朝力陳其偽章滿公車大司馬持之堅上為下御史曹學程于獄至論死於是中外莫敢言乃遣臨淮勳衛李宗城及沈惟敬持册封秀吉為日本國王使至秀吉不受封宗城遁還朝鮮陪臣李元翼知關白無意罷兵議乘釜山漸弛作攻復之計為惟敬所阻久之倭益肆羽檄旁午和議訖不成上始暴大司馬石星誤國狀下獄論死二十五年邢玠為經略楊鎬為經理鎬誓師躬自督戰屢破清正圍秀吉秀吉糧盡請和鎬曰受降不受和也倭窘甚會大雨雪我師沾濕不得駐倭突圍出戰我師敗歸鎬坐奪職萬世德為經理無何秀吉死倭人反首拔舍而還世德追破之斬獲甚夥朝鮮以寧當朝鮮鼎沸時倭聲言入閩閩撫張皇久之事定而後解嚴然殘倭流劫者時時竊發海外掠我賈舶春秋防汛遺刁斗憂而富人射利之徒又詭給别引挾重貨走倭覬其厚直且隂輸中國情形亂未歇也三十九年上諭廷臣議嚴越販之條犯者殺無赦姦計稍戢而倭已將他部攻破琉球虜中山王以去中山王入倭之二年得還國上章補貢自陳包茅不入之罪廷議以中山王既降倭恐藉貢使為倭偵探謝遣之四十三年琉球使者重來泊閩海上閩當事驅之使歸嚴內防也四十四年夏倭將有事東番漂渡閩越間在處為蠆螫閩遣材官董伯起偵之徑擁之去其明年倭酋村山等安命小舟送伯起來歸并獻方物上章求市當事以章表不中式拒不納厚犒之遣還然比年以來無日不中倭秋襲料羅冬陷大金春屯彭湖大抵遭風飄搖登岸取水元非入犯顧當者無不摧殘官軍不能制聽其揮斥旋復解維他往至夏五月有倭舟為風濤擊碎流泊東湧中丞臺命將以計擒之旋以捷聞閩自戒倭後請增置遊擊將軍一人領舟師備倭戎容亦稍振云夫倭在東海中分五畿七道三島又附庸國百餘最稱魁然然唐宋之世酷慕華風為不侵不叛之外國雍容文雅宋時滕木吉來朝上令挽射矢不能逺詰其故云國中不習戰也宋史曰海賈周世昌遭風至日本七年得還與其國人滕木吉至上召見之以國人唱和詩來上詞甚雕刻膚淺令滕木吉以所持木弓矢射不能逺曰國不習戰鬬至元而黠至我國家而遂稱天驕之雄蓋造物者突開東南幾番殺氣而華人導之禍遂烈耳詎云喜盜輕生好殺天性然哉倭地北跨朝鮮南盡閩浙其往朝鮮也自對馬島開洋信宿至閩浙順風旬月至其主居山城故稱山城君山城之南為和泉又南為沙界沙界之東南為紀伊紀伊之西為伊勢山城之西為丹渡左為攝津左之西為攝摩右為但馬右之西為因幡丹渡西為美作左為備前左之西為備中右為因幡右之西為伯耆美作之西為安藝出雲之西為石見安藝石見之西為山口答國即古之周防州也山口之西為長門關渡在焉渡此而西為豐前其南為豐後又其南為日向豐前之西北為築前西南為後築後築之南為大隅大隅之西為薩摩豐後東南懸海為土佐為伊豫為阿波阿波相近懸海為炎路土佐豐後之間為佐加關薩摩之北為肥後又其北為肥前肥前西懸海為平户平户之西為五島北為多藝為伊岐極北則對馬島諸島皆有酋長山城君弱空名耳倭不稟其號令內相攻強則屬役而豐後最大其入貢必由博多歷五島而行回則徑趨長門每歲清明後至五月重陽後至十月常多東北風利入寇故防海者以三四五月為大汛九十月為小汛其入寇多薩摩肥後長門三州人次則大隅築前築後博多日向豐前後和泉諸島耳男子魁頭削髮黥面文身婦人被髮屈紒足皆徒跣亦間用屨勇而戅不甚别生死每戰輒赤體提三尺刀舞而前無敢捍者邇又為蝴蝶陳勢且益熾夫中原百貨所萃彼國之所必須嚴絶百端既不勝內熱微開一線又多憂外潰則衣袽之不可以已也亦久矣隋書曰內官有十二等一曰大德次小德次大仁次小仁次大義次小義次大禮次小禮次大智次小智次大信次小信員無定數有軍尼一百二十人猶中國牧宰八十户置一伊尼翼如今里長也十伊尼翼屬一軍尼其服飾男子衣裙襦其袖微小履如屨形漆其上繫之於腳人庶多跣不得用金銀飾故時衣橫幅結束相連而無縫頭亦無冠但垂髮兩耳上至隋其王始制冠以錦綵為之金銀鏤花為飾婦人束髮於後亦衣裙襦裳皆有襈􅗒竹為梳編草為薦雜皮為表緣以文皮有弓矢刀矟弩䂎斧漆皮為甲骨為矢鏑雖有兵無征戰朝會陳設儀仗奏其國樂户可十萬其俗殺人強盜及姦皆死盜者計贓酬物無財者沒身為奴餘輕重或流或杖每訊獄不承引者以木壓膝或張強弓以弦鋸其項或置小石沸湯中令競者探之云理曲即手爛或置蛇甕中令取之云曲者即螫手矣人頗恬靜罕爭訟少盜賊樂有五絃琴笛男女多黥臂點面文身投水捕魚無文字唯刻木結繩敬佛法於百濟求得佛經始有文字知卜筮尤信巫覡每正月一日必射戲飲酒好棊博握槊摴蒱之戲氣候溫暖草木冬青俗無盤爼藉以槲葉食用手餔之性質直有雅風女多男少婚嫁不取同姓男女相恱者即為婚婦入夫家必先跨犬乃與夫相見婦人不淫妬死者斂以棺槨親賔就尸歌舞妻子兄弟以白布製服貴人三年殯於外庶人卜日而瘞及葬置尸船上陸地牽之或以小輿多唐書曰王以金玉文布為衣左右佩銀花長八寸以少明貴賤國宋史曰奝然善𨽻書不通華言問其風土以書對云中有五經書及佛經白居易集七十卷並得自中國土冝五穀而少麥樂有國中髙麗二部四時寒暑大類中國東境接海島夷人所居身面皆有毛國王以王為姓傳襲至今王六十四世文武察吏皆世官其年代紀所記云初主號天御中主次曰天村雲尊其後皆以尊為號次天八重雲尊次天彌聞尊次天忍勝尊次瞻波尊次萬魂尊次利利魂尊次國狹槌尊次角龔魂尊次汲津丹尊次面垂見尊次國常立尊次天鑑尊次天萬尊次沫名杵尊次伊奘諾尊次素戔烏尊次天照大神尊次正哉吾勝速日天押穗耳尊次天彥尊次炎尊次彥瀲尊凡二十三世並都於築紫日向宫彥瀲第四子號神武天皇自築紫宫入居大和州橿原宫即位元年甲寅當周僖王時也次綏靖天皇次安寧天皇次懿德天皇次孝昭天皇次孝天皇次孝靈天皇次孝元天皇次開化天皇次崇神天皇次垂仁天皇次景行天皇次成務天皇次仲哀天皇國人言今為鎮國香椎大神次神功天皇開化天皇之曽孫女又謂之息長足姬天皇國人言今為太奈良姬大神次應神天皇甲辰歲始於百濟得中國文字今號八蕃菩薩有大臣號紀武內年三百七歲次仁德天皇次履中天皇次反正天皇次允恭天皇次安康天皇次雄略天皇次清寧天皇次顯宗天皇次仁賢天皇次武烈天皇次繼體天皇次安開天皇次宣化天皇次天國排開廣庭天皇亦名欽明天皇即位十一年壬申嵗始傳佛法於百濟當此土梁承聖元年次敏逹天皇次用明天皇有子曰聖德太子年三嵗聞十人語同時解之七嵗悟佛法于菩提寺講聖鬘經天雨曼陀羅華當此土隋開皇中遣使泛海至中國求法華經次崇峻天皇次推古天皇欽明天皇之女也次舒明天皇次皇極天皇次孝德天皇白雉四年律師道照求法至中國從三藏僧玄奘受經律論當此土唐永徽四年也次天豐財重日足姬天皇令僧智通等入唐求大乘法相教當顯慶三年次天智天皇次天武天皇次持總天皇次文武天皇大寶三年當長安元年遣栗田真人入唐求書籍律師道慈求經次門閉天皇次皈依天皇次聖武天皇寶龜二年遣僧正玄昉入朝當開元四年次孝明天皇聖武天皇之女也天平勝寶四年當天寶中遣使及僧入唐求內外經教及傳戒次天炊天皇次髙野姬天皇聖武天皇之女也次白璧天皇二十四年遣二僧靈仙行賀入唐禮五臺山學佛法次桓武天皇遣騰元葛野與空海大師及延歷寺僧澄入唐詣天台山傳智者止觀義當元和元年也次諾樂天皇次嵯峨天皇次淳和天皇次仁明天皇當開成會昌中遣僧入唐禮五臺次文德天皇當大中年間次清和天皇次陽成天皇次光孝天皇遣僧宗睿入唐傳教當光啓元年也次仁和天皇當此土梁龍德中遣僧寬建等入朝次醍醐天皇次天慶天皇次封上天皇當此土周廣順年也次泠泉天皇今為太上天皇次守平天皇即今王也凡六十四世畿內有山城大和河內和泉攝津凡五州共統五十三郡東海道有伊賀伊勢志摩尾張參河逺江駿河伊豆甲斐相模武藏安房上總常陸凡十四州共統一百一十六郡東山道有通江美濃飛驒信濃上野下野陸奧出羽凡八州共統一百二十二郡北六道有狹越前加賀能登越中越後佐渡凡七州共統三十郡山隂道有丹波丹彼狙馬因幡伯耆出雲石見隱伎凡八州共統五十二郡小陽道有播麼美竹備前備中備後安藝周防長門凡八州共統六十九郡南海道有伊紀淡路河波讃耆伊豫土佐凡六州共統四十八郡西海道有竺前竺後豐前豐後肥前肥後日向大隅薩摩凡九州共統九十三郡又有臺伎對馬多褹凡三島各統二郡是謂五畿七道三島凡三千七百七十二都四百一十四驛八十八萬三千三百二十九課丁課丁之外不可詳見有續文獻通考曰飲食常用磁器漆器尊敬處用土器筯匙男披髮而束之人佩短刀婦人拔其眉黛其額髮垂背而續之以髢長曳地男女冶容者黑其齒會時蹲坐為禮道遇尊長脫鞋履而過形勝名迹夀安鎮國山國之鎮山永樂初御製文賜之立碑其地邪摩堆是倭王都處即魏志所謂邪馬臺阿蘇山隋書曰石無故起火接天俗以為異因行禱祭東奧州産黃金處五龍山元師至平户島移五龍山舟破棄士卒十餘萬處平户島元史曰太宰府西有平户島可屯軍船一岐島元史曰風水不便再議定會於一岐島八角島日本盡殺蒙古髙麗處聚快樂院續文獻通考曰其城蓋築四座名聚快樂院內蓋大樓樓閣九層粧黃金下睡房百餘間東西遊卧令人不知以防隂害相板關赤門關續文獻通考曰東號板西號赤門二關各有船數千隻千丈溪續文獻通考曰二月至千丈溪點齊選兵物産金銀僧奝然曰東奧州産黃金西别島出白銀以為貢賦如意珠隋書曰色青大如雞卵夜則有光曰魚眼精也青玉見南史瑪瑙華夷考曰出日本生土石間種有三般紅黑而白紋如纒絲者咸妙砑木不見熱者才真琥珀宋時充貢水晶宋時貢有青紅白三色水銀廣雅謂之澒本草謂之靈液螺鈿宋時貢石硫黃宋時貢銅見一統志鐡見一統志錦魏志曰貢異文雜錦二十匹細絹宋史曰産絲蠶多織絹薄緻可愛花布景初二年獻斑布宋時獻白細布刀倭刀甚利中國人多鬻之其精者能卷之使圓蓋百鍊而繞指也屏風宋時貢畫屏風今亦有入中國者畫金隱起如打成帖著扇兩山墨談曰中國宋前惟用團扇元初東南使者持聚頭扇人皆譏笑之我朝永樂初始有持者及倭充貢遍賜羣臣內府又倣其制天下遂通用之硯見一統志漆一統志曰以漆製器甚工緻兩山墨談曰泥金畫漆之法古亦無有宣德時遣漆工至倭國傳其法以歸椒魏志曰有橘椒襲荷可和以為滋味犀象宋史曰多犀象黑雉見南史山鼠南史曰有獸如牛名山鼠又有大蛇吞此獸蛇皮堅不可斫上有孔乍間乍閉時或有光射中蛇則死矣交易自市舶罷而倭不能來射利之徒率多潛往倭輒厚結之欲以誘我乃舶主之黠者至冠進賢衣綺繡詭稱閩撫材官與重申互市之約彼雖在疑信亦厚遣之以庶幾幸而售耳其意乃滋不可測矣宋史曰交易用銅錢文曰乾元大寶紅毛番紅毛番自稱和蘭國與佛郎機鄰壤自古不通中華其人深目長鼻毛髮皆赤故呼紅毛番云顔師古曰西域諸戎其形最異今胡人青眼赤鬚狀類彌猴者其種也一名米粟果佛郎機據吕宋而市香山和蘭心慕之因駕巨艦橫行瓜哇大泥之間築土庫為屯聚處所竟以中國險逺垂涎近地嘗抵吕宋吕宋拒不納又之香山為澚夷所阻歸而狼卜纍年矣廣東通志曰紅毛鬼不知何國萬歷二十九年冬大舶頓至濠鏡其人衣紅眉髮連鬚皆赤足踵及趾長尺二寸壯大倍常澚夷數詰問輒譯言不敢為寇欲通貢而已當道謂不宜開端李𣙜使召其酋入見遊處會城一月始還諸夷在澚者尋共守之不許登陸始去澄人李錦者久駐大泥與和蘭相習而猾商潘秀郭震亦在大泥與和蘭貿易往還忽一日與酋麻韋郎談中華事錦曰若欲肥而槖無以易漳者漳故有彭湖嶼在海外可營而守也酋曰倘守臣不允奈何錦曰宷璫在閩負金錢癖若第善事之璫特疏以聞無不得請者守臣敢抗明詔哉酋曰善乃為大泥國王移書閩當事一移中貴人一備兵觀察一防海大夫錦所起草也俾潘秀郭震賫之以歸防海大夫陶拱聖聞之大駭白當道繫秀于獄震續至遂匿移文不投初秀與夷約入閩有成議遣舟相迎然夷食指既動不可耐旋駕二巨艦及二中舟尾之而至亡何已次第抵彭湖時萬歷三十二年七月也是時汛兵俱撤如登無人之墟夷遂伐木駕厰自以鱗介得窺衣裳矣李錦徐拿得一漁舟附之入漳偵探詭云為夷所虜逃還當事者已亷知其蹤并繫之嗣議使錦秀諭令夷王還國許以自贖并拘郭震與俱錦等既與夷首謀不欲自言其不售第云我國尚在依違而已材官詹獻忠捧檄往乃多攜幣帛瓜酒覬其厚償海濵人又有潛裝華貨往市者夷益觀望不肯去屢遣官諭之比見夷語輒不揚夷視之如發蒙振落也而寀璫者已遣親信周之範馳詣海上與夷訂盟以三萬金為中貴人夀貴人從中持之盟已就會南路總兵施德政遣材官沈有容將兵往諭沈多才略論説鋒起從容謂夷曰中國斷不容逺人實逼處此有誑汝逗留者即是愚爾四海大矣何處不可生活嗣又聞璫使在此更曰堂堂中國豈乏金錢巨萬萬爾為鼠輩所誑錢既不返市又不成悔之何及麻郎見沈豪情爽氣嘆曰從來不聞此言旁衆露刃相語曰中國兵船到此想似要與我等相殺就與相殺何如沈厲聲曰中國甚慣殺賊第爾等既説為商故爾優容爾何言戰鬬想是元懷作反之意爾未覩天朝兵威耶夷語塞又心悔恐為之範所賣乃呼之範索所餉金錢歸只以哆囉嗹玻璃器及夷刀夷酒遺璫將乞市夷文代奏而都御史右御史各上疏請剿於是德政嚴守要害厲兵拭甲候旨調遣兵民從海外入者一錢不得著身挾錢者治如法蓋接濟之路遂窮又聲言預作火攻之䇿夷度茲事必無濟理又且坐困乃以十月二十五日挂帆還錦秀震獻忠等論死及戍有差嗣奉旨使殷商至大泥移檄和蘭毋更為細人所誤云或謂和蘭長技惟舟與銃耳舟長三十丈橫廣五六丈板厚二尺餘鱗次相銜樹五舶上以鐵為網外漆打馬油光瑩可鑑舟設三層傍鑿小窗各置銅銃其中每銃張機臨放推由窗門以出放畢自退不假人力之下置大銃長二丈餘中虛如四尺車輪云發此可洞裂石城震數十里敵迫我時烈此自沉不能為虜也其役使名烏鬼嘗居髙自投于海徐出行濤中如御平原舵後銅盤大徑數尺譯言照海鏡識此可海上不迷奉天甚謹祀所謂天主者于中其酋所居及卧內俱哆囉嗹蒙其四壁每華商詣酋守門者撞鐘為報侍者二人出傳語值酋卧或别冗則坐外間以俟傳見乃進或為設食以一大片置盤中人分一刀切而食之與華人語數侵華人若華人與他夷人爭鬬則為華人左袒嘗謂華人曰此身浮泊世間須有鱗甲爪牙令可畏若輩牝雞耳譏其不善鬬未嘗以狸膏蒙其頭也萬厯四十五年在吕宋港口迎擊華商大肆劫掠舶主苦之物産金銀錢琥珀瑪瑙玻璃天鵝䘬瑣服哆囉嗹刀交易商舶未有抵其地者特暹羅瓜哇渤泥之間與相互市彼國既富裊蹄華人貨有當意者輒厚償之不甚較直故貨為紅夷所售則價驟湧論曰譬天下之大其猶上林乎珍禽異羽競響齊鶱即孤嶼剩巢殊方片翮分之固頸長頸短合之皆腹毳背毛獨倭猶梟也不能革子之鳴東行能無惡子之聲哉和蘭繼至蜂目已露象齒終焚絶之此為時矣東西洋考卷六
