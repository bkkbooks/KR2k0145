body:
  text: 東西洋考卷八明張燮撰稅璫考髙寀者順天文安人也幼給事上前纍遷御馬監監丞先是大學士張位以國帑虛耗請開採以充邊儲比三殿之役於是四方言利之徒姧辨積猾率上章請遣中貴出督礦嵗輸巨萬萬足供大工又徐及𣙜稅上俞其議廷臣爭之強不能得也燕山衛指揮馮綱千户胡志嗣請以寀使閩帝命寀往閩自市舶鎮守先後報罷四封老稚久不識貂璫為何物比寀銜命南下金鉦動地戈旗絳天在在重足莫必其生命而黜吏逋囚惡少年無生計者率望羶而喜營充稅役便覺刀刃在手鄉里如几上肉焉寀在處設關分遣原奏官及所親信為政每於人貨湊集置牌書聖旨其上舟車無遺雞豚悉算然稅額必漳澄之賈舶為巨寀躬自巡歷所過長吏望風披靡漳守韓擢每股掌玩之澄令龍國祿者強項吏也分庭入見寀不為屈嚴約所部不得為寀驅使每事掣肘不令飛而食人寀遣人詣令白事其人輈張自豪國祿庭笞之寀在郡恚甚欲具疏劾其阻撓韓守謂寀曰澄故習亂所不即反者以有龍令在也倘令危民何能即安激而生變若亦豈有賴焉寀氣奪而止自後每嵗輒至既建委官署于港口又更設于圭嶼既開稅府於邑中又更建于三都要以闌出入廣摉捕稍不如意並船貨沒之得一異寶輒攜去曰吾以上供三十年賈舶還港寀下令一人不許上岸必完餉畢始聽抵家有私歸者逮治之繫者相望於道諸商嗷嗷因鼓譟為變聲言欲殺寀縛其參隨至海中沉之寀為宵遁蓋自是不敢復至澄其開採之役漳龍巖亦與焉寀不論有礦無礦但與富人廬墓相連處輒命發掘必飽行賄乃止其應開之山聚徒躍冶竟得不償失虛縻縣官為名而已三十二年澄商潘秀郭震等攜渤泥國王文以和闌夷求市為請稱渠錦囊所載舊浯嶼元係彼國通商處所乞修故事夷舟徑趨彭湖當事者嚴絶之紅夷則遣人厚賂寀大將軍朱文達者與寀厚善嘗以其子為寀乾子寀謀之文達曰市幸而成為利不資第諸司意有左右惟公圖之文達刺刺向大吏言紅夷勇鷙絶倫戰器事事精利合閩舟師不足攖其鋒不如許之寀遣周之範往報夷因索方物夷酋麻韋郎贈餉甚侈并遣通事夷目九人赴省候風未行參將施德政已奉憲檄遣沈有容諭夷無為細人所誤德政整兵料羅少候進止麻韋郎知當事無互市意乃乘風歸寀竟上疏為夷乞市上俞中丞及御史言置璫疏不納海上人悉北向稱萬嵗寀聞之頓足曰德政乃敗吾事蓋從此思甘心之矣明年德政擢神機營右副將軍後軍都督文達私語寀如許歸裝悉異香大貝寀心動遣數百人邀之途掠其裝以去既胠篋無他長物始遣還三十四年上命封閉礦洞諸稅咸歸有司璫威勢稍殺然已屢擢太監賜緋魚服其在會城築亭臺於烏石山平逺臺之巔損傷地脈又于署後建望京樓規制宏壯幾埓王家諸棍受寀意指諷人為立碑平逺臺頌寀功德恬不為怪原奏官魏天爵林宗文百計媚寀由是得幸忽進一方云生取童男女腦髓和藥餌之則陽道復生能御女種子寀大喜多買童稚碎顱刳腦貧困之家每割愛以售惡少年至以藥迷人稚子因而就寀幸博多金者稅署池中白骨齒齒嗣買少婦數人相逐為祕戲以試方術歌舞孌童又不下數十人備極荒淫天爵等術既售益自為得計導之橫噬如陰雲毒霧蒙被草木無不焦枯子襟路相遇避塵稍緩困辱隨之簮紳奉使過里與寀微芥蒂者關前行旅並遭摉掠里市貧民挾貨無幾宷朝夕所需無巨細悉行票取久乃給價價僅半額而左右司出入者又幾更橫索錢始得到手如是者嵗嵗為常澄稅已屬有司轉解然寀日遣稅棍詭名督催仍買取方物迫勒減價商民無所望天閩中驛卒習為驕悍獨寀稅役經過輒縮項欲死每一人索馬三四匹人夫稱是往來驛路雞犬騷然四十二年廣東稅璫李鳯病死有旨命寀兼督粵稅閩父老私計粵稅視閩稅為巨寀必舍閩適粵所在欣欣祈解倒懸然粵人已插血訂盟伺寀舟至必揭竿擊之寧死不聽寀入也寀既隴蜀望奢神氣益飛揚不駐如飢烏躊躇兩樹間攫物之念愈動遂造雙桅二巨艦誑稱航粵其意實在通倭上豎黃旗兵士不得詰問時施德政為閩都督尼之海門無從速發中丞袁一驥檄所部緝治之而浦城人有為璫役所苦者匍控兩臺袁逮其役使材官馬仕騏下之理四月十一日寀所未償直商人數百輩自金繒以逮米鹽所負金錢巨萬羣赴閹署求領辭氣稍激寀揮所練習亡命羣毆之立斃數人餘衆趨出復從巍樓射之放火延燒民屋數十餘家衆各奔潰次早逺近不平各群聚閹署約數千人寀露刃躍馬率甲士二百餘突犯中丞臺是時皇太后哀詔新至轅門解嚴宷斬關而入一驥叱曰汝反耶寀見一驥辭鋒慷慷意為少阻未敢遽犯但劫一驥俱出步至憲臺會副使李思誠僉事吕純如都司趙程等後先繼至始釋中丞返署而諸司與寀偕還時萬姓走護大兵徐集一殺寀無難諸司慮傷國體以理解散之曰衆休矣明旨自有處分無狂鬭也衆乃解去至次早又留海防同知陳豸為贄始聽思誠等出中丞若御史上疏暴寀諸姧狀大小臣工叩閽之牘為滿上始下一驥疏撤寀回京徐聽處分十六載之風霾一朝開朗矣寀雖奉嚴旨然尚蹢躅未肯就道必盡釋稅役諸械繫者乃起行識者謂大盜既已就擒不妨寬假束縛圖獻俘於闕下今日馭璫亦須如此聊為委曲以聽早去九月九日宷發榕城遣材官黃應龍覃繼榮護之以歸遵朝命也寀輜重塞途日行僅一舍馳賄乞援于大璫既將抵京不即歸命公然引疾棲遲里門朝議然久之然後入見上怒命繫之聞寀在請室中竟日股戰後不知所終巡撫都御史袁一驥為稅監流毒激變劫制要挾顯謀叛亂事近皇上大沛德意稅減三分之一海內百姓歡欣鼓舞大小臣工亦仰頌聖德為閭閻稱慶獨稅監髙寀謂減稅即減其督稅之利恩減則漸致罷稅之機恐不久撤回并日漁獵岌岌若狂又以粵人戒嚴擯斥懼不敢往思専取盈于八閩者囊括無遺故私派一切行户金行取紫金七百餘兩珠行取大珠五十餘顆寶石行取青紅酒黃五十餘塊鹽商每引勒銀二錢嵗銀萬兩其他綢緞鋪户百家編定輪日供應日取數百計而打造通倭雙桅海船二隻竹木油鐵各鋪行取料二千餘兩置辦通倭禁物如番段龍鳯紅袍建鐵刀胚硝磺鉛錫氊單湖絲價數十萬出入陳兵家丁三百餘人賓客謀士及歌童舞女百人飲食珍竒及一應米菜酒果盡取商店日用五十餘金各項物價分毫不給又聽魏天爵等撥置設立看驗使用寀受其獻而各棍人人取足百金之産編派無遺擒拏考逼非投水即自縊寃號動天赴臣泣訴日以百計皆甘心以命與寀博臣等每善諭百姓猶如防川惟恐一旦決裂不能救隨出牌禁諭乃寀稔惡彌甚四月十一日怒各行哀求稍給麾兵持刀亂砍殺傷潘六蔡廷機等數命餘各驚逃又恨逼近民家居停鋪户及暮射火將三十餘户無辜蕩燬一時萬姓裂眥切齒欲得寀而食其肉乃不思招安退衆十二日率領家兵二百餘乘臣以國喪撤衛屛從突出匕首隨招各凶露刃劫臣復挾副使李思誠僉事吕純如都司趙庭要盟而始釋臣情形若此其為叛亂豈待智者知哉宷以貪殘凶惡之性日糜爛其民故民樂與偕亡而脅臣以幸緩萬死有餘辜之命是陛下責臣以保民而寀欲臣保其惡以殺民也日大行慈聖皇太后升遐臣民無不縞素獨寀藉口詔書未到張樂演戲沉湎如故大逆不忠由來漸矣且民因臣被脅暫解以舒臣其積怨深怒已成燎原之勢皇上不速召寀顯戮以謝天下寀小而如楊榮與民俱付烈熖禍猶止在地方大而為尉他結倭外援操戈叛逆則禍在社稷矣若臣見辱刑餘又何足道哉伏乞皇上大奮乾斷早賜施行海邦幸甚誅第二疏為逆璫蔑君叛國聚兵通倭讐執命臣懇速滅以保東南疆土以免萬姓鋒鏑事稅監髙寀剝民一十六年恃富敵國潛蓄異志打造兵器藏貯萬件近又私造海船招集亡命練習刀槍騎射散泊沿海身踞會城經營狙伺凡姦豪勇猛蹈險輕生之輩皆收為親兵外假朝廷之威陵轢臣民內圖通倭制閩粵二省之命而籠天下半壁之利形為百足勢成負嵎近因肆虐以激民變按劔一呼兵卒雲集先劫臣以諭散百姓次挾道臣為城下之盟因恨同知陳豸盤詰其開洋海船喝兵拘執擁入稅府自十三日迄今未有釋放之期夫豸天朝之命臣而兵防之要任也當春汛戒嚴正督率巡兵之日宷惡其礙已擅自拘執叛亂之形已著臣受皇上付託恐以逆賊貽憂君父不敢愛身以犯其鋒其邊海伏姦要害處所一面布置兵卒制其航海通倭而盤踞內地之姦漸次以圖翦割其陳豸被執不放以兵入索彼必殺豸以逞大傷國體故寧濡忍朝夕以待雷霆若皇上忍弗早圖寀不死於皇上之法而死於萬民之怒則紀綱掃地國勢陵夷從此不可挽回矣臣才本迂踈濫承節鉞惟恤民瘼以固邦本禁通倭以保封疆因與凶竪枘鑿而威望素輕致薰腐賤臣以兵刃加遺忝皇上之委任臣無所逃罪但地方禍在燎原臣于斯時求弛負擔則臣為畏死為避難而重負國恩故靦顔在列而直陳悖逆之狀伏望皇上赫然震怒亟行封刃之誅顯戮無君之惡使腥穢滌於一朝萬民從此帖席仍乞即賜罷臣以謝髙寀臣不勝隕越待命第三疏為逆閹久繫府官閩省變在呼吸懇乞聖明速下霆威以弭大禍事稅監髙寀惡逆萬狀具前疏者不敢復贅惟恨同知陳豸挾仇拘禁始猶鑰門環守今則竟置私牢聲息不通矣豸仁廉公正百姓戴之如慈父母今見其橫受刑餘之僇辱咸願捐軀為豸一灑臣諭以候旨處分幸各俯首寀知神人共憤無所自容大出金錢召募海洋巨盜以為兵衛軍竈日增會城之內市罷肆而户晝閉勢如厝火積薪僅僅濡濕以延頃刻陛下不視如燃眉亟下崇朝雷雨一解鬱攸之氣至烈熖猛發寀之首領與閩民俱膏鋒刃斯時而責臣以不能禁亂未萌即臣無敢逃罪顧陛下守二百年磐石山河縱一閹豎與積怒之民相尋干戈釀成內釁而外寇乘之誰為厲階一至此極况天子至尊即臣工有犯非重辟不輕置獄今髙寀陛下之奴𨽻而豸則外臣之才而賢者也以奴𨽻奪主威而辱賢臣非豸之辱而朝廷之辱也以陛下之明而容無君之惡豈以言者過而有未信之心耶今豸見在囚執而寀航海艦豎旗列戟見泊南臺地方船內滿載鑿違禁畨貨及下海槍刀弓弩鳥銃火藥皆萬目共覩鑿有據者陛下猶然置疑直至潰裂糜爛不可收拾始悔不信臣言亦無及矣伏乞大奮乾斷亟賜誅戮下兵刑二部議覆施行民第四疏為府官寃繫濵危逆豎怙終愈甚王綱掃地恨敷天懇乞聖明亟賜傳首陳尸以正大罪事臣惟國號中華雖蠻夷率服君為共主雖蜂蟻知尊世未有作逆而逭天誅無君而逃上刑如凶豎髙寀其人者寀之稔惡擢髮難數如近日殺死潘六蔡廷機等二十餘命射火燒燬鄭欽陳懷等三十餘家擒進而綁縛斬首者聚尸而灰之烈火即縱凶而駢殺于外者官司買棺斂骨而置若罔聞先脅臣以兵次劫盟于司道旋執同知陳豸禁錮臣已三疏列其罪狀使寀尚知有君稍懷顧忌則釋陳同知于幽囚而安海邦積怨之民弭營窟負固之狂謀輟叛國媚倭之異志席藁待命猶身戴百死無足以寬燃臍碎骨之辜乃頑凶狡賊日長月滋養流倭于私室以召募亡命傳習刀法闢教場於城外以侍衛親軍訓練行陳匠作百人大修攻戰之具先是該監造府原建敵樓以象大內北臺丹堊儼然皇居上築箭垜馳道已預設不逞之謀近且擺列發煩神飛炮百子銃佛郎機各樣火器放則百丸齊發殺人千步之外人情洶洶無敢寧居此何等景象臣等因諜而得其凶謀首恨往者寃聚之衆欲盡殺閩省官民而據城招倭以叛次謂粵人之拒其去欲帶勇敢千人自衛而用前所劫臣計執粵中命臣而入其省其長繫陳豸欲于興兵屠省之日拘于軍前為質今豸遭禁日則僅給糲食夜則嚴扄暗阱夫禮下公門式路馬乃皇上所禮使之臣而凶璫擅執之僇辱之寀寧知有君耶夫寀剝民一十六年富踰萬乘力贍三軍實養成其不掉而身為叛逆蔑棄君父囚奴縉紳為二百年未有之事不特皇輿之內無不驚心動魄使外夷聽聞中國有閹豎擅執王臣而朝廷不能問則君權輕于鴻毛國事將至瓦解恐因此而啓戎心關繫非細故也今閩民榜示通衢欲殺寀以救豸并雪殺人放火之讐寀日夜治兵欲行屠滅寀與閩民已成不共之勢即臣等多方撫戢諭以待旨而衆怒鬱勃竊發難料儻島夷恃寀內變五日海程揚帆卒至即閩省阽危天下響震寧惟一時之害哉頃皇上不以臣愚誤任閩撫若臣貪位固祿儕俗茍同不以民瘼吏治加意是臣負皇上為不忠今臣不避危險以捋虎不愛死亡以報國乃民被殺而不能伸孤寡號天之寃官被執而不能灑冠裳塗炭之禍斬孤雛而忌器叩九閽而不應是皇上負臣而臣負此心至於目擊危亂如厝火積薪撲之不能置之不可跋胡疐尾進退維谷徒有痛哭流涕嘆生之不辰耳惟皇上念陳豸一日不釋則百姓恨深一日而釋豸以雪其恥髙寀一日不誅則國家禍深一日而誅寀以正其刑仍弛無藝之征以蘇憔悴則雷霆雨露一時並施庶可轉亂為治否則閩事有不忍言者矣第五疏為璫變臚陳已數愚臣誠信未孚尸位非宜循分引退事臣惟人君不能任未信之臣志士不能受虛拘之祿若顯用其人而陰疑其心雖忠告如藥石必以為鴆毒而不食矣既任以事而仍奪其權雖強顔而展采皆視為土偶而弗靈矣方今朝多上哲野有遺賢奈何以臣之未信具員節鉞致皇上懲毒廢藥一方受病浸至不救又令臣以枯叢受土偶之媟嫚哉以稅監髙寀害民賊國通外夷囚命官具疏四陳而槩置不報豈不知三諫不聽再瀆而厭祗以奉身求退遑其恤後臣子之心不若是恝也故終為皇上再申前説如下堂之婦一數臧獲之姦夫皇上詘臣言若不聞必以前疏枚舉未足盡信耳顧言出慿虛駕空則可無信言出隔别浪傳則可無信如寀僇辱陳同知囚繫三月兩次大行皇太后詔到凡在臣工俱出郊恭迓寀深拱不臣且怙終拘執陳同知如故曾不得出塗炭以盡臣禮此非臣以釋為禁也寀造船通倭違禁之物無所不有明豎上用黃旗大書總督閩廣使官兵不敢盤詰乘風往來海上飛報旁午誰得稽留今二船見泊會城船哨周桂等看守可據此非臣以無為有也其被殺潘六等尸親見在號寃白骨暴野被燒鄭欽等露居見無棲託一望焦土俱鑿鑿人有主名此非臣以生為死以偽為真也且寀自踞閩之始即勾引紅毛番皇上允前撫臣之奏寢遂公然以軍資禁物載輸于倭資寇召兵禍在不逺稅既有司徵解此外即有孝順私進皇上度不過二三萬止矣乃寀假託剝奪按各屬記籍及海洋商舶嵗得數萬他金珠寶玩派取無價者不可勝計在閩一十六年總得數十餘萬金每進稅銀槓數動踰百計驛遞鈔關可查一至德州先以其半假作商貨分途竊運及抵雄縣又以十之六七公行裝入文安厚藏私室所獻皇上曾不滿百中之一耳皇上明眷南顧念此巨萬之數非橫奪民間從天降乎從地出乎閩八郡多不食之土民以販鬻為生人人而奪之嵗嵗而劫之非寃殞於刑逼即自經于溝瀆比屋而是呼號震天君門萬里雖隔絶不聞以寀家之金銀山積即閩民無罪而死無告訴者當以國量矣此亦事理之真而確乎有據者若猶以為未信則見在拘執同知打造海船放火殺人亦不可信耶海內方駭為非常之變而皇上故縱寀使行意自如欲殺人則立斬數十餘命碎其尸使無所葬欲放火則立燬三十餘家赤其地使無所依欲通倭則操駕巨艦橫行海洋而大小將領無敢置喙欲執官則辱陳同知于囚奴而地方之撫按目擊而莫可誰何臣若喪節隳守一切望寀風旨悉置不問則皇上嚴敕臣以撫安軍民整飭庶僚者為何事而臣受節鉞叨居督撫而抗顔司道之上者為何官於此而猶戀尸位之爵祿安犬馬之豢養不亦羞朝廷辱縉紳哉則臣之去在情理固然而勢亦不容已者矣臣當髙寀脅辱之後已決意拂衣然猶低回遲速間者誠望皇上以臣言除寀出閩民湯火之餘庶幾不負明恩而後一去謝寀今皇上疑臣以義不可留而去去等耳第不能博寀之去稍裨地方而僅以明已之志臣實愧之然國體之全毁閩土之安危實係寀之去留所關非小非斬寀無以謝九廟神靈無以慰天下萬姓伏望皇上將臣先賜罷斥仍將寀亟行撤回正法庶朝綱正而亂臣不致逋誅臣不勝激切乞附湖廣道御史周起元為稅監戕殺生命要脅重臣速行正法以存國紀以安地方事福建稅監髙寀素行貪殘最於别璫歷年海商貴重美麗竒巧之珍百入於寀未必一貢於皇上臣生長之地耳而目之久矣溪壑既盈虐聲久播入粵粵人不受歸閩閩人震恐不意益肆鴟張大開狼噬剋剝我皇上取用各行物料即一草一木莫不按數豫值而寀剡刳樓船連舸揭百尺之維檣窮雕飾之極麗所取物料浩煩槩欲白沒彼市鬻之夫挾資何幾令一旦盡付烏有誰能甘之相率控訴自無足怪乃簡梟雄以作威陳利兵而相向揮刃放火市民驚駭圍擁喊集怨氣沖騰然不旋踵而解者豈誠畏寀哉蓋撫按禁約于上司道府縣曉諭于下毋敢抗法雄行以干三尺且又慮寀造一偏之言以誑皇上反以揮刃放火誣坐小民萬里君門不易自白是以死者駢首就戮生者含寃解散竟不敢逞于一擊也寀是時宜下罪已之詞自執殺人之參隨付之有司猶可稍逭萬分之一乃越日披堅執鋭統率驍騎乘守衛之偶撤徑弄兵于轅門撫臣袁一驥節制一方為民造命寀不能遂其竭澤之貪夙懷憤忿輒敢按劔要挾三司副使李思誠僉事吕純如埓虎鬚以解厄寀復留而要盟皇上試思從來稅監最貪最很最毒曾有放火殺人刃劫節鉞要留方面如寀之大逆不道者乎皇上利根未肯割斷稅使未肯全撤釀成時事至此臣讀撫按疏揭參以鄉人之見聞不覺髮指而繼之以痛哭也近者邢洪馳兵器于禁地盧受假狐威于票擬皆漫不處分今寀又見告矣望皇上亟行兩觀之誅用雪三山之忿非僅僅撤回墩鎖可以了事臣聞省會人情洶洶防川不決決必滔天宿火不發發必燎原萬一戈矛起于肘腋海濵因而搖動倭夷乘以生心寀粉骨不足惜皇上豈善為社稷計乎寀之言曰多進孝順便可保全首領寀以纍年括摉挾百萬蓋藏出其珍玩綺縠歌舞角抵享用作樂之剩資可以結左右之歡而及于寬政儻一遂其姧是皇上不惜太阿之重而僅易此阿堵也昭之史册虧纍令名豈淺鮮哉臣不勝激切待命寀袁中丞疏初上時周念切桑梓即中夜草疏繼之故恨周獨深因有謀占澚頭公館之誣也奏又袁中丞參駁稅監疏乞為罪璫悖旨要挾飾詞瀆捏陷無慿侵盜有據懇早賜正法以警姧邪以全國體事先是稅監髙寀激變地方種種不法蒙皇上俯允臣疏特準撤回乃寀離閩後逗遛途次凡五越月乘傳擁衛百無顧忌所攜珍寶從浙中已多抵換沿途竊匿不知幾許辨髦明旨曾無天日近閲邸報見寀四疏又復咆哮據首疏以告病為詞公然乞養外宅旋有回監管事之請夫寀之在閩殺傷民命當斬燒劫民房當斬造船通倭當斬囚執命官當斬椎擊童男女至死而吮吸其腦髓當斬皇上日照月臨業洞悉姦貪悖逆之狀需其至京自有處分乃戴罪視息之餘而自請供職視皇上為何如主矣皇上試看內外大小臣工凡奉旨建繫乞恩貸死不暇曾有請復原官自求敘用者乎真膽大包天者至讐臣反噬詆為權門鷹犬正所謂得其惡言不足怒臣不任受亦可無贅所可恨者身未入都差官以稅課餘鹽銀兩解進是明以小利嘗我皇上而駕言拖欠搶奪尚欲貽地方以不結之局至棲住公館妄言變賣熒惑聖聰此其肉尚足食哉臣聞報後即欲具疏駁參尤以事關錢糧仍須核實隨行各司道查議據布政司署司左參政金忠士回稱福建稅額六萬福興等府分委徴收解監完足自稅監激變放火殺人氣焰方張何人敢搶及奉旨撤回地方加謹防護該監在日並無搶欠之説顯是混賴止有古田麴稅已徵在官因變後請旨未經轉解並無葉家包攬情由且稅銀六萬該監疏中止五萬三千五百其六千五百明係侵匿相應題參又據按察司署屯鹽道按察使蕭近髙回稱運鹽司續領依山鹽引四萬道除引價外餘價鹽課該二萬四百有竒內尚有未經發賣鹽引致課銀四百餘無出原非拖欠又據漳南建南福州兵備道參政劉洪謨陳德元副使吕昌期回稱該監駐劄原無額設衙門澚頭圭嶼雖有公館已經倒塌其浦城詔安閩安等處係民間店房因監役住宿地方量為修葺未動該監分毫公費何從變賣各到臣該臣會同巡按御史李凌雲看得在外官司各有衙門間設一二公署為過客經臨之所建造修茸非官帑則民資也即官有遷移而署仍其舊曾無可變賣者稅監原非常設之官其入閩之初地方有司罔敢委使命于草莽故到處擇空間别署為之棲止原無創建以監署為名止該監初年一駐海澄即狹小公署旋欲移居海口委有澚頭圭嶼二館之建該監方借建館科斂民財而費一派十闔邑騷然幾至大變若論地方之耗費當日何止三千而脂膏入監棍之手甎石木料曾不足數百計自該監入省數年來敗垣頽瓦所存寧幾勿論變價無多即欲變賣其誰售者他如閩安詔安新港等處原非該監居住不過監棍借棲民間何曾動該監絲毫之費而哆口千百以欺皇上乎若省城烏石平逺國初以來即有公會廳亭不知創造何年至欲攘為已有亦稱三百餘兩之費真逢人説夢者惟該監先年烏石山曾建一閣省城風水不便前撫臣丁繼嗣勸令自行拆毁尤昭昭耳目此而可欺孰不可欺乎况自稅監以來撤回如梁永髙淮不下五六輩當年亦必非露處者曾不聞公署變賣何獨寀而造此惡孽也又據疏稱餘價鹽課內商人洪國裕尚欠四百夫依山鹽引原創自該監其第二次復請鹽引四萬道除引價先行解進節發各商出賣共上餘價鹽課銀二萬三十八兩有竒其滴珠在外即該監疏稱歷年解內之數尚有鹽引未經發賣該課銀四百餘緣鹽商消乏前按臣不便行即該監在地方不能強派故遲留至今夫引尚未發銀于何出而可謂拖欠乎即見在各商非止一人何他商不欠獨洪國裕敢于逋欠也猶記臨行時聲言恐嚇各商謂此番不加津貼到京必行攀害故各商有私餽至一二百金者獨國裕不應銜恨而以逋欠故入之耳最後一疏復稱搶去銀兩九千八百兩不言搶于何地搶于何日臣且就其疏折之夫該監激變地方在四月十一日火箭齊發煙焰熏天地方救死不暇誰敢攖其鋒者比入臣署迫脅以百餘棍持刀衝突而另留親兵一枝居守仍以火器凶械攔當前後監門兩道臣同詣其室該監張目嗔視微有混賴意兩道臣叱之云庫門封識宛然即卓上擺設一氊不動安得為此昧心語渠聞之口塞此十二日事也及奉旨差官護送地方兢兢惟恐有失而謂其有搶劫乎至古田出水麴稅自有司徵解絶無絲毫短少纍年稅簿可查且有造麴之人即納造麴之稅何從包攬按籍亦别無葉姓者祗四十一年秋冬麴稅例于次年上納起解已當激變之後方在請旨仍收貯該縣耳崇安未解二十七兩之數事亦類此一稱拖欠一稱包攬駕空鑿虛欲陷害地方乃所揑搶銀之人首為林世吉而方塌鼻其家奴也次則張嘉謨曾文宇嘉謨係名色把總物故冇年文宇係絲線經紀原非衙門員役不知因何中傷若林世吉以任子起家郎署向年該監交通紅毛番世吉倡言不可遂致蠆尾即如變賣疏中驀添御史周元起以霸占公署為詞所開此釁者因起元不忍桑梓塗炭抗疏激切遂含沙以泄其私憤耳獨不思舉朝借劍章滿公車固東西南北之人也為國除姦豈皆有澚頭圭嶼之可覬哉若臣不自量首撲凶𦦨更宜有鷹犬之詈辱矣乃臣因全疏而得該監侵盜之實不敢不直陳者蓋福建稅銀六萬兩為額有司奉行務足前數而後即安從前解內銀兩疏不發抄無從核其虛實今據該監之疏開福建每年稅銀五萬內一半解進內庫二萬五千兩一半解工部助工二萬五千兩外雜費三千兩滴珠二百五十兩加平二百五十兩合之僅五萬三千五百兩耳其每年六千五百兩竟無歸著此孰非民之膏脂可竟置勿問乎有謂該監每遇取解動稱備辦方物銀三千兩或亦在此數內竊謂方物以孝順為名宜其自備而亦取足稅銀于名何居然或各省稅監通例臣亦不敢深求就方物外尚餘銀三千五百兩未經開載將謂起運路費耶則長途原有勘合之應付將謂解部雜費耶在該部萬無耗羡之誅求料該監必不敢以此藉口其為侵匿入已無疑矣每年侵匿多則六千五百少亦不下三千五百合十六年所積何止十萬而在外朘削一切無名之征不與焉皇上亦安用此盜臣為也據自陳疏僅留一二公署尚圖變賣以充國用其忠赤何如而顯行乾沒其狀若彼不一追究則有限之民財曷勝此漏巵而此輩尚復知顧忌哉故由前則種種不法當正典刑由後則飾無為有説謊之罪不容誅也徵多解少侵欺之罪不容誅也伏乞敕下法司從重究擬籍沒其家為姦欺悖旨之戒庶法紀修明所全國體亦不小矣潘相江西稅監也上既撤寀命相兼攝閩中稅務四十三年六月二十八日奉聖旨所奏內官髙寀不諳事體以致人心不安激變地方撫按官差的當官員伴送來京定奪其原管稅課并兼攝廣東稅務俱著歸併江西潘相不妨原務兼攝督理待三殿工有次第即奏請停止其地方不安撫按官出示曉諭撫綏該部院知道七月十七日邸報到閩然稅進裊蹄俱屬有司類解藩司轉解相僅使命時一還往不能大為害國初又有提督市舶內官蒞閩卓洪范士明俱宣德間遣梁著楊某俱正統間遣韋查董讓俱𢎞治間遣然市舶之設是主貢夷及夷商來市者與今漳稅不同第以均屬稅璫故附列之論曰以內庭執虎子之人而舌簸憲準手握利權則夫竊帝之威而厲蒼黔幸人之國以結夷虜彼寧復有榮名之願禍敗之虞哉阻撓足以制郡縣而橫決且至凌節鉞山頽海泣霜履氷堅自其常勢耳此古人所以嘆鹿馬之易形而問豺狼之當道也東西洋考卷八
