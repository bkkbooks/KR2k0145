body:
  text: 東西洋考卷三明張燮撰西洋列國考下港加留下港一名順塔唐稱闍婆在南海中者也一名訶陵亦曰社婆元稱瓜哇一統志又名蒲家龍甲兵為諸番之雄王宫磚墉髙三丈方三十餘里屋髙四丈宋史曰室宇壯麗飾以金碧地覆板蒙藤花席跏趺而坐唐書曰象牙為床若席王蓬頭頂金葉冠胸縈嵌絲􅍤腰束錦綺佩短刀跣足跨象或乘牛前導有金鎗珠篋及孔雀尾傘之屬宋史曰其王椎髻戴金鈴衣錦袍躡革履坐方牀官吏日謁三拜而退出入乘象或腰輿壯士五七百人執兵器以從國人見王皆坐俟其過乃起云宋史曰王子三人為副王官有落佶連四人共治國事如宰相無月俸隨時量給次有文吏三百員目為秀才掌文簿總計財貨又有卑官千員分主城池帑藏及軍卒其領兵者每半歲給金十兩勝兵三萬亦給金有差民居茅茨磚庫男蓬頭女椎結衣裝纒胸以下姻聘無媒妁但以黃金為禮將婚男造女家後五日迎婦以牛車載綵棚實繡女其中又作假新人新婦一雙粧束相類迎向禮拜寺訂盟然後抵家其俗有名而無姓五月遊船十月遊山方輿勝略曰每月望夜前後婦數十人聚衆成隊一婦為首衆婦隨行月下首婦唱則衆婦皆和至親友富貴家贈以鈔帛等物每十月有竹槍會其國王與妃各乘一車至會所令男子二人為偶各執竹槍妻各執短木列其旁及交敵一合妻各以短木隔之曰那剌那剌則退設中槍死王令勝者與死者金錢一個死者妻即隨勝者而去樂有橫笛鼓板自為夷舞諺所謂太平闍婆之徵也元史曰多出竒寶取貴於中國人則醜怪情性語言與中國不能相通病不服藥但禮佛祈禳喪有水葬火葬犬葬惟逝者所欲而已生子甫一歲以匕首佩之名曰不刺頭俗云吧六頭金銀象牙雕琢為靶無貧富悉佩腰間值忿爭即拔刃相刺國人居相語曰病死天之所厭不若刺死者身自為雄也其輕命捐生類如此劉宋元嘉時始入中國南史曰元嘉十二年國王師黎婆達阿陀羅跋摩遣使奉表曰宋國大主大吉天子足下教化一切種智安隱天人師降伏四魔成等正覺轉尊法輪度脫衆生我雖在逺亦霑靈潤至唐貞觀中遣使入貢唐書曰王居闍婆城其祖吉延東遷於婆露伽斯城旁小國二十八莫不臣服上元間國人推女子為王號悉莫威令整肅道不拾遺大食君聞之齎金一囊置其郊行者輒避如是三年太子過以足躙金悉莫怒將斬之羣臣固請悉莫曰而罪實本於足可斷趾羣臣復為請乃斬指以徇大食聞而畏之不敢加兵大厯元和咸通之間使者屢至朝命優答之唐書曰大厯中訶陵使者三至元和八年獻僧祗奴四五色鸚鵡頻伽鳥等憲宗拜內四門府左果毅使者讓其弟帝嘉美並官之訖大和再朝貢咸通中遣使獻女樂至宋淳化三年其王穆羅茶遣使來貢云中國有真主本國願得比於外臣宋史曰先是朝貢使泛舶船至明州定海縣掌市舶監察御史張肅先驛奏其使飾服之狀與嘗來入貢波斯相類譯者云今主舶大商毛旭者數往來本國因假其鄉導來朝貢又言其國王一號夏至馬羅夜王妃曰落肩娑婆利又其方言目船主為葧荷主妻曰葧荷比尼贖其船中婦人名眉珠椎髻無首飾以蠻布纒身顔色青黑言語不能曉拜亦如男子膜拜一子頂戴金連鎖子手有金鈎以帛帶縈之名呵嚕使還賞賫甚厚大觀三年再貢詔禮之如交址元遣史弼髙興征之終不能制元史曰世祖撫有華夷其出師海外諸番者惟瓜哇之役為大我朝洪武二年遣行人賜瓜哇國璽書三年王昔里八達刺遣使奉金葉表貢方物及黑奴三百人納元所授宣敕二道已而我使至三佛齊瓜哇要而殺之宋史曰其國與三佛齊有仇怨互相攻戰十三年王八達那巴那務來貢上絶其使下詔責王永樂元年西王都馬扳奉表賀即位二年東王孛令達哈遣使朝貢請印與之西王亦歲歲貢使來朝五年西王與東王戰滅東王時我舟過東王城西王殺我百七十人西王懼遣使謝罪敕責西王令償死者金六萬已僅入貢萬金禮官請索如約上曰朕利金耶令逺人知畏耳蠲其金賜鈔幣諭之八年貢馬及方物十一年復貢是時三佛齊已降瓜哇更名舊港中貴人吳賔使瓜哇還奏言滿刺加國王詭稱朝旨從瓜哇索舊港地瓜哇人不敢即寧上降敕附來使慰諭之俾無猜惑十三年都馬板更名楊惟西沙專使謝恩十六十九年凡再貢而東王久不至蓋先是為西王所破詭言欲立其子意竟不果而遂滅也正統二年再貢厚賜之景泰時請封賜蟒衣繖蓋天順四年王都馬班貢使還國以綵幣賜其王及妃鄭端簡謂其國人大抵三種唐人土人而外西畨賈胡居久者服食皆潔近紅毛畨建禮拜寺彼中蓋其别種由來漸矣加留下港屬國也半日程可到風土盡相類云形勝名迹新村舊名厮村中華人客此成聚遂名新村約千餘家村主粵人也賈舶至此互市百貨充溢西山中有人三百餘歲身穿紙衣卧樹上辟穀能知吉凶呼為老仙覆鼎山其上似釜故云蘇魯馬益港傍大洲林木蔚茂千餘家強半是中國人又有長尾猿數萬人相傳唐時族衆凶惡一日有僧至其家取水噀之俱化為猿止留一嫗不化至今餘種猶存麻喏巴歇村元史瓜哇傳曰由戎牙路於麻喏巴歇浮梁前進又葛郎王追殺至麻喏巴歇後人訛為滿者伯夷中有二三百家總領七八人漳估山賈人登岸之處郎卑野州唐書曰王嘗登之以望海夏至立八尺表景在表南二尺四寸鸚鵡山出鸚鵡故名石碇相傳是鄭和所遺者重只百斤二千餘人擡之不起及徙置他所瘟疫甚多國王乃移還其處吉利門元史曰大軍繼進吉利門闍婆城唐書訶陵傳王居闍婆城婆露伽斯城唐書吉延束遷處旁國二十八莫不臣服淡水港去蘇魯馬益二十里物産金銀唐書曰出黃白金真珠宋史闍婆傳曰方言謂真珠為沒爺蝦羅宋及本朝皆充貢犀角宋史曰方言謂犀為低密其角宋及本朝充貢象牙宋史曰方言謂牙為家囉宋及本朝充貢玳瑁宋時充貢沉香宋史曰方言謂香為昆燉盧林檀香宋及本朝充貢丁香生深山中樹極辛烈不可近熟則自墮雨後洪潦漂山丁香乃湧澗溪而出撈拾數日不盡宋時充貢銅鼓即今華人所用者諸國以瓜哇為最振響遏雲價直可數十金龜筒本朝充貢絞布宋史有繡紋絞雜色絲絞本國充貢吉貝見宋史藤花簟宋時充貢硫黃見宋史紅花習鑿齒所謂紅藍者也爾雅翼曰花生時但作黃色茸茸然故又名黃藍杵灌水淘絞去黃汁更闕搗以清酸粟漿淘之絞如初即收取染紅夷瓶下港出者其色紅蘆薈本草曰一名訥會一名奴會俗呼象膽以味苦如膽也一統志曰草屬狀如鱟尾採之以玉器搗研成膏阿魏一統志曰土人納竹筒樹梢脂滿其中冬破筒取脂或曰脂毒人不敢近繫羊樹下自逺射之毒著羊羊斃即為魏胡椒樹如蒲桃葉如扁豆實如浮葵子蔓生梧桐上故國人語曰未種椒先種桐青鹽唐書曰訶陵最富有穴自湧鹽按魏地記鹽大而青白名青鹽也木瓜爾雅謂之楙何承文賦所謂方朝華而繁實比沙棠而有耀者也宋史載為瓜哇所産檳榔見宋史椰子舊唐書曰以椰樹花為酒其樹生花長三尺餘大如人腦割之取汁成酒味甘飲之亦醉蝦蝚丹樹宋史曰其酒出於椰子及蝦蝚丹樹蝦蝚丹樹華人未嘗見波羅蜜蓽澄茄一統志曰藤蔓春花夏實白而實黑蛬吉柿華夷考曰如石榴樣皮厚潤有橘囊櫸白肉四塊甘酸可食出瓜哇國夷人呼為綱滑赤白豆蔲本朝充貢海菜海物異名記曰海生而紫蔓其大者為鹿角菜一名猴葵南越考曰猴葵色赤生石上謂之鹿角以其莖有岐也故名思君似婆羅蜜而中無子烘食之似芋茴香見宋史蘇木南州記云生海畔葉似綘木若女貞犀象見宋史白鹿見吾學編猴宋史曰國中多猴不畏人呼以霄霄之聲即出投以果實則二大猴先至土人謂之猴王猴夫人食畢羣猴食其餘孔雀本朝充貢博物志曰尾多變色喻如雲霞人拍其尾則舞尾有金翠五年始成鸚鵡埤雅曰衆鳥足趾前三後一其目下瞼眨上惟鸚鵡四趾齊分兩瞼俱動雅翼曰五色尤慧白次之青為下按白者闍婆宋時充貢伽鳥唐時入貢倒挂鳥星槎勝覽曰身形如鵲而羽五色日間焚香則收藏之羽翼間夜則張尾翼而倒挂以放香緑鳩似鸚鵡而小不復能言俗名柑樜鳥其五彩者名彩鳩交易華船將到有酋來問船主送橘一籠小雨傘二柄酋馳信報王比到港用果幣進王立華人四人為財副畨財副二人各書記華人諳夷語者為通事船各一人其貿易王置二澗城外設立鋪舍宋史闍婆傳曰中國賈人至者待以賔館凌晨各上澗貿易至午而罷王日徵其稅又有紅毛畨來下港者起土庫在大澗東佛郎機起土庫在大澗西二夷俱哈板船年年來往貿易用銀錢如本夷則用鉛錢以一千為一貫十貫為一包鉛錢一包當銀錢一貫云下港為四通八達之衢我舟到時各州府未到商人但將本貨兊換銀錢鉛錢逮他國貨到然後以銀鉛錢轉買貨物華船開駕有早晚者以延待他國故也東埔寨東埔寨即古真臘國也其國自呼甘孛智後訛為甘破蔗今云東埔寨者又甘破蔗之訛也風土記云西畨經名其國曰澉浦只蓋甘孛智之近音先為扶南屬國王姓剎利氏至質斯多那兼扶南而有之遂雄諸夷既死子伊奢那先代立隋大業十三年遣使貢獻帝禮之甚厚至唐疆土寖闢神龍以來國分為二北多山阜號陸真臘南近海號水真臘久之仍合為一今賈舶至者大都水真臘地也宋政和六年使者來貢賜朝服服之宋史曰奉化郎將鳩摩僧哥等十四人來貢賜以朝服僧哥言萬里逺國仰投聖化尚拘卉服未稱區區嚮慕之誠願許服所賜從之仍以其事付史館明年辭去宣和二年詔封其國王與占城等建炎間以郊恩授王檢校司徒加食邑其國屢與占城戰戰失利至建元時大舉復仇破占城遂王其地改國號占臘蓋於是地方七千餘里矣元之置省占城也嘗遣一虎符一金牌同往真臘為所拘執元貞中始招諭賔服之明興國王忽兒那獻琛內附二十年七月行人唐敬還自真臘王遣使貢象五十九頭香六萬斤永樂改元遣使者諭即位二年八月國王參烈婆毗牙遣陪臣九人來貢賜鈔幣有差先是中貴人奉使彼中將歸有健兒三人夜遁去索之不得其王以國中三夷人充數還朝既引見上曰華人自遁何與彼事而責償之過且若輩語言不通風土敻隔將焉用此而令背井離鄉之為顧命禮部給道里費善遣之尚書李至剛曰臣意華人必不甘逃遁彼土或為彼所匿則此三人於法應留上曰何須逆詐人主但推天地之心以待逺人可也三年參烈婆毗牙殂命鴻臚王孜往祭之封其子參烈昭平牙為王賜綵幣七年奉金鏤表貢馴象及方物景泰三年再貢王城周圍可二十里城上石佛頭五飾其中者以金王宫及府第皆面東宫殊壯麗風土記曰蒞事處有金窗櫺左右方柱上有鏡四十八面列於窗旁王三日一視朝坐七寶牀上著朝霞吉貝瞞絡腰腹下垂至脛頭戴金寶花冠足履革屐耳懸金鐺嘗服白㲲風土記曰男女椎髻以布圍腰出入則加以大布圍小布之上惟國主打純花布頭戴金冠有時穿茉莉之類周匝髻間項上戴大珍珠三斤許手足及指上皆帶金鐲指環上篏貓晴石手掌用紅藥染赤色臣入見王稽首階下者三王呼上階則跪以兩手抱膊繞王環坐議國事訖跪伏而去風土記曰國主坐衙欲見者列坐地上以俟少頃內中隱隱有樂聲外吹螺迎之須臾二宫女捲簾國主仗劍立金窗中矣臣僚合掌叩頭螺聲方絶國主隨亦就坐坐處獅子皮一領乃傳國之寶言事畢國主轉身二宫女復垂簾國中有金塔金橋歲時一會羅列玉猿孔雀白象犀牛於前名百塔洲風土記曰用中國十月為正月名為佳得宫前縛大棚可容千人挂燈毬花果之屬對岸逺離二十丈地以木接續縛成髙棚每夜裝煙火爆扙請國主觀燈如是半月而後止四月拋毬九月壓獵壓獵者闕聚國衆皆來城中教閲宫外五月迎佛水聚逺近之佛皆送水與國主洗身陸地行舟國主登樓以觀七月燒稻蓋新稻已熟迎於南門外燒之供佛婦女觀者無數主卻不出八月挨藍挨藍者舞也點差伎樂宫內挨藍且鬬豬鬬象如是一旬諺所謂富貴真臘也生女九歲擇僧道去其童身名曰陳毯風土記曰官司每歲四月內擇日頒行本國有女應陳毯之家先行申報給巨燭一條燭間刻畫一處點至刻畫處則為陳毯時候矣先期父母擇一僧是夜大會親鄰以綵帛結二亭子一坐女子一則僧坐其中至期與女俱入房手去其童納之酒中天明以鼓樂送僧去後當布帛與僧贖身否則女終為僧有不得他適婚娶男女兩家俱八日不出門晝夜燃燈相續人死輿置之野聽烏鳶食頃刻食盡者以為福報居喪但髠其髮女人於額上剪髮如錢大曰用此報親文字以麂鹿雜皮染黑隨其廣狹以意裁之用粉如白堊類磋為小條子拈於手中就皮畫以成字永不脫落作字皆從後書向前卻不自上書下也沃野彌望一歲可三四穫風土記曰糞田種蔬皆不用穢嫌其不潔其國謂儒為班詰僧為苧姑道為八思班詰不知所讀何書但由此入仕則為清貫微時於打布之外項上挂白線一絲以此自别既貴曳白線如舊僧皆食肉直不飲酒肉亦時以供佛王有大故輒僧為司南今賈舶未有到王城者只到海隅一屬國耳故不覩其麗靡或云即蒲甘地按宋史蒲草入貢朝議欲待以交址之禮制詔書白背金花綾紙貯以間金鍍管鑰用錦絹夾襆緘封以往乃本朝貢夷獨無蒲甘應是為真臘所并無疑矣形勝名迹陸伽鉢婆山隋書曰上有神祠以兵五千守衛之城東有神名婆多利祭用人肉王别殺人以夜祀禱亦守衛千人伊奢那城隋書曰伊奢那先代立居伊奢那城婆羅提拔城按唐書是水真臘所居處真蒲風土記曰真蒲以來率多平林叢昧長江巨港綿亘數百里古樹修藤森隂蒙蘙禽聲雜遝其間至半港始見曠田絶無寸木彌望芃梵黍苗而已籬木州以木為城是華人客寓處竹坡風土記曰綿亘數百里其竹節相間生刺筍味苦四畔皆髙山佛村風土記曰自查南撰小舟順水十餘日過半路村佛村魯班墓風土記曰在南門外周圍十里石屋數百間銅臺宋史曰列銅塔二十四銅象八以鎮其上象重四千斤內中金塔風土記曰國主夜卧其上塔中有九頭蛇精乃國之土地主也係女身每夜國主先與同寢雖其妻不敢入二鼓乃出方與妻妾同睡若此精一夜不見則王死期至矣王一夜不往必獲災禍淡水洋風土記曰四月至九月每日午後下雨洋中水痕髙七八丈巨樹盡沒僅留一杪耳人家濵水者皆移入山後十月至三月點雨絶無洋僅通小舟深不過三五尺人家又復移下物産犀角風土記曰白而帶花者為上黑為下象牙風土記曰以搮殺之上也自死而隨時為人所取者次之死山中多年者為下鶴頂翠羽風土記曰叢中有池翡翠飛入求魚番人以樹葉蔽身坐水濵籠一雌誘之持小網伺其來則罩日獲三五隻銅金顔香一統志曰香乃樹脂擘開雪白者為佳夾砂石為下其氣能聚衆香畨人以和香塗身篤耨香本草綱目曰出真臘國樹如松形香老則溢出色白而透明者名白篤耨盛夏不融香氣清逺土人取後夏日以火炙樹令脂再溢至冬凝復收之雜以樹皮者名黑篤耨一統志曰盛之以瓢碎瓢爇之亦香名篤耨瓢沉香一統志曰出臘為上占城次之速暫香一統志曰出真臘為上伐樹去木取香者謂之生速仆木腐而香存者謂之熟速其樹木半存者謂之暫香降香風土記曰叢林中頗費斫伐之勞此乃樹心其外白木厚八九寸蠟風土記曰出村落枯樹間一種細腰蜂番人取得之一船可收二三千塊塊大者三四十斤藤黃本草曰樹名海藤花有蘂散落石上彼人收之謂之沙黃就樹採者輕妙布風土記曰土人不事蠶桑僅織木綿布亦不能紡以手理成條無機杼但一頭縛腰一頭搭上梭只用一竹管獺皮夷瓶明角烏角燕窩胡椒風土記曰纒藤而生纍纍如緑草子紫梗風土記曰生樹枝間如桑寄生狀頗難得大風子風土記曰大樹之子如椰子而圓中有數十枚婆那娑樹隋書真臘傳曰葉似柿實似冬瓜菴羅樹隋書曰花葉似棗實似李毗野樹隋書曰花似木瓜葉似杏實似豬婆田羅樹隋書曰花葉實並似棗而小異歌畢他樹隋書曰花似林檎葉似榆而厚大實似李其大如升椰子檳榔唐書曰客至削檳榔龍腦香蛤以進豆蔲一統志曰樹如絲瓜蔓衍山谷春花夏實酒風土記曰酒有四等第一呼蜜糖酒用藥麴以蜜及水為之次者呼朋牙四以樹葉為之乃樹葉名也又次以米或剩飯為之名包稜角包稜角者米也其下糖鑑酒糖為之又入港濵水有茭漿酒按唐書真臘飲酒者比於淫顧後人亦漸預醉鄉矣麝香木一統志曰氣似麝臍蘇方木蘇恭曰樹似菴羅花黃子青熟黑其木人以染絳南方草木狀曰煎汁忌鐵器則色黯犀象宋史曰國戰象幾二十萬慶元二年貢馴象二孔雀鸚鵡建同魚隋書曰四足無鱗其鼻如象吸水上噴髙五六十尺浮胡魚隋書曰形似鱔觜如鸚鵡有八足交易船至籬木以柴為城酋長掌其疆政果幣將之遂成賈而徵償夷性頗直以所鑄官錢售我我受其錢他日轉售其方物以歸市道甚平不犯司暴之禁間有鯁者則熟地華人自為戎首也風土記曰國人交易皆婦人能之所以唐人到彼必先納一婦兼利其能買賣故也每日一墟自卯至午則罷無居鋪但蓬席鋪地間亦有司賃地錢土人見唐人頗加敬畏呼之為佛見則伏地頂禮近亦有欺負唐人由去人之多故也大泥吉蘭丹大泥即古浡泥也本闍婆屬國今𨽻暹羅其國以板為城宋史曰城中居者萬餘人所統十四州以銅鑄甲宋史曰戰鬬者將刀被甲甲以銅鑄狀若大筒穿之於身護其腹背其王所居屋覆貝多葉王服頗效中國在王左右者為大人王坐繩床出即大布坐其上衆舁之名曰阮囊民居覆草椎髻以五綵帛繫腰花錦為衫市用金錢國人宴會鳴鼓吹笛擊鉦歌舞為樂愛敬華人見華人醉者扶之以歸婚聘之資先以椰子酒檳榔次之指環又次之後量用金錢成禮喪葬有棺以竹為輿載棄山中二月始耕則祀之如是者七年不復祀矣原田豐利臘月七日為歲節地熱多風雨盛食無器並以竹編貝多葉貯之食畢輒棄捐古稱其鄰有藥樹取根煎為膏服之及塗其體兵刃不能傷也宋太平興國二年其王向打遣使從商人蒲盧歇為導入都朝貢其表以小囊緘封數重非中國紙類木皮而薄瑩滑色微緑長數尺濶寸餘橫卷之僅可盈握其字細小橫讀之使至詔館於禮賔院優賜遣歸元豐五年王錫理麻喏復遣使貢方物乞從泉州乘海舶歸國從之明興洪武四年王馬漠沙遣使進金表銀箋并貢方物續文獻通考曰遣御史張敬之往諭其國辛丑遣其臣朝貢詔賜金綺永樂三年遣使封其國主麻那惹加那乃為浡泥國王賜印誥符幣六年王率其妻子來朝遣使迎勞之王上金表獻珍物妃箋獻中宫東宫上宴王奉天門是年王卒于都下賜諡恭順葬石子岡續文獻通考曰在安德門外樹碑立祠有司春秋致祭封其子遐旺為王賜玉帶金銀綺帛他物稱是禮送還國遐旺請封其國後山賜名長寧鎮國上自為文俾勒于石十二年及洪熙元年皆來朝貢萬厯間國王病卒無子族衆爭立國中相誅殺俱盡乃立其女主為王初漳人張某為哪哪者大酋之號也國難既作哪避禍出奔女主既立乃遣人迎哪復其爵號其女出入宫中有心疾一日向女主言父欲反女主大恐急使人按哪家哪自殺已而國人訟哪無反狀女主尋悔之絞殺其女官其子為酋紅毛番近築土庫于中謀入彭湖互市者攜大泥國文也事詳紅毛番考吉蘭丹即浡泥之馬頭也風俗俱同浡泥嘉靖末海寇餘衆遁歸于此生聚至二千餘人行劫海中商舶苦之或謂吉蘭丹即小葛蘭國按小葛蘭與柯枝接境而吉蘭丹在大泥相連去彼逺甚但大泥吉蘭丹俱鑄金為錢而柯枝與小吉蘭亦俱用金錢以此相同影響之所自起也姑載之以破疑形勝名迹長寧鎮國山永樂六年國主麻那惹加那乃上言蒙恩封王爵境土皆屬職方國有後山乞表為一方之鎮王卒子遐旺復以為請封為長寧鎮國山御製碑文刻石其上物産金星槎勝覽曰大金錢名儻伽小金錢名吧喃犀角象牙宋時充貢鶴頂見一統志本朝充貢玳瑁見宋史宋及本朝俱充貢翠羽錫檀香宋時充貢降香本朝充貢本草曰似蘇方木紫而潤為良片腦即龍腦香一統志曰樹如杉檜取者必齋沐而往其成片似梅花者為上次有金腳腦速腦米腦蒼腦札聚腦又一種如油名腦油吉貝布宋史曰無絲蠶用吉貝花織成布明角獺皮錦魴皮燕窩西國米亦名沙孤米其樹名沙孤身如蕉空心取其裏皮削之以水搗過春以為粉細者為王米最精粗者民家食之以此代榖今賈舶慮為波濤所濕只携其粉歸自和為丸檳榔見一統志椰子見一統志萪藤異物志曰萪藤圍數寸重於竹可代篾以縛船勝竹也巴尾樹見一統志貝多樹加蒙樹一統志曰二樹心可為酒犀象孔雀本朝充貢爾雅翼曰尾展開如車輪金翠燁然羽族最華輝者鸚鵡本朝充貢交易華人流寓甚多趾相踵也舶至獻果幣如他國初亦設食待我後來此禮漸廢矣貨賣彼國不敢徵稅惟與紅毛售貨則湖絲百斤稅紅毛五斤華人銀錢三枚他稅稱是若華人買彼國貨下船則稅如故舊港詹卑舊港古三佛齊國也初名干陀利又名渤淋在東南海中本南蠻别種居真臘瓜哇之間王號詹卑故今王所部號詹卑國而故都為瓜哇所破更名舊港以别於彼之新村云俗名吉寧邦其地故稱沃土諺云一年種榖三年生金言其米榖盛而多貿金也冬無霜雪纍甓為城民散居城外香油塗身覆屋多用椰葉市用錢布字倣梵書以國王指環為印宋史曰亦有中國文字上章表時即用焉俗囂好淫水戰甚慣文獻通考曰習水陸戰臨陳敢死霸於他國其國多水而少陸部領乃聚岸築屋以居僮僕環之其餘民庶悉架室木筏上以木樁拴閘水長則筏浮起不能沒也或將别居則起樁去之連屋移徙不勞財力島夷志謂好潔淨故於水上架屋與此不同其樂有小琴小鼓昆崘奴踏曲之類劉宋孝武世始貢中國南史干陀利傳曰王釋羅那鄰陀遣長史竺留陀獻金銀寶器梁天監元年其王夢中國有聖人如是者再因圖夢中所見遣使獻玉盤其容質果與梁帝合歲時望北頂禮南史曰王瞿曇修跋陀羅以四月八日夢一僧謂曰中國今有聖主十年之後佛法大興若遣使貢奉禮敬則土地豐樂商旅百倍若不信我則境土不得自安初未之信既又夢此僧曰汝若不信我當與汝往觀乃於夢中至中國拜覲天子既覺心異之陀羅本工畫乃寫夢中所見武帝容質飾以丹青仍遣使并畫工奉表獻玉盤等物使人既至模寫帝形還國比本畫則符同焉十七年及普通元年凡再至後亦遂絶唐天祐初復通授其使都蕃長蒲訶寧逺將軍宋時貢使絡繹按宋史建隆元年王悉利胡大霞里檀遣使李遮帝朝貢二年夏又遣使蒲蔑貢方物是冬其王室利烏耶遣使茶野伽朝貢其後歲各一至太平興國五年王夏池遣使茶龍眉來是年潮州言三佛齊國蕃商李甫誨乘舶船載香藥犀角象牙至海口會風勢不便飄船六十日至潮州其香藥悉送廣州八年王遐至遣使蒲押拖羅來貢雍熙二年舶主金花茶以方物來獻端拱元年遣使蒲押陀黎貢方物淳化三年廣州上言蒲押陀黎前年京回聞本國為闍婆所侵住南海一年今春乘舶至占城偶風信不利復還乞降諭本國從之嘗建佛寺以祝聖壽願賜名及鍾詔以承天萬壽為寺額鑄鍾給之時咸平六年也其後貢獻不絶每優賜遣歸元豐時使者入見以金銀花貯真珠龍腦撒殿用昭殊敬宋史大中祥符元年王思離麻囉皮遣使來貢許赴泰山陪位于朝覲壇天禧元年王霞遲蘇勿吒蒲迷遣使貢真珠象牙梵夾經昆崘奴詔許謁會霛觀遊太清寺金明池及還賜詔慰奬之天聖六年王室離疊華遣使來貢舊制遼國使人賜以問金塗銀帶時特以渾金帶賜之熙寧十年使大首領地華伽囉來以為保順慕化大將軍元豐中使至者再天子念其道里遙逺優賜遣歸二年賜錢六萬四千緡銀一萬五百兩官其使羣陀畢羅為寧逺將軍陀旁亞里為保順郎將畢羅乞買金帶白金器物及僧紫衣師牒皆如所請給之三年廣州南蕃綱首以其國王之女唐字書寄龍腦及布與提舉市舶孫逈逈不敢受言於朝詔輸之官市帛以報五年遣使皮襪來官皮襪為懷逺將軍六年又以其使薩打華滿為將軍紹聖中再入貢紹興二十六年貢使復至帝曰逺人向化嘉其誠耳非利方物也淳熙五年詔免赴闕館於泉州洪武二年詔行人趙述往使其國王恆麻沙那阿遣使隨述奉金葉表來貢賜厯及文幣六年復貢八年遣使從使者招諭拂菻九年王殂王子麻那者巫里表請紹封詔授駝紐鍍金銀印封三佛齊國王久之丞相胡惟庸事發事連三佛齊懼而貢絶三十年上念逺夷希至謂禮臣曰惟庸謀叛三佛齊乃生間諜詒我使臣至為瓜哇聞知禮送還朝今度已悔禍朕欲許其自新暹羅在逺國中最稱恭順而瓜哇則三佛齊所悉索敝賦以從者也可移檄暹羅達于瓜哇俾戒諭三佛齊嘉與更始禮臣如旨以行永樂初年三佛齊竟為瓜哇所破廢為舊港是時南海豪民梁道明竄泊兹土衆推為酋閩廣流移從者數千人廷議遣行人談勝受往招之道明隨勝受來歸廣東通志云談勝受南海人鄉薦授臨桂丞以最召拜監察御史坐事降行人時閩廣流徙從梁道明者數千人指揮孫鉉使海南遇其子及二奴挾與俱來上以勝受同鄉令偕其二奴齎敕往招道明遂從入朝賜道明襲衣鈔百五十錠文綺十二表裏絹七十二匹勝受奏事稱旨擢浙江按察使留副酋施進卿代領其衆五年中貴鄭和奉使西洋還過舊港遇流賊陳祖義祖義詐降潛謀要劫和料賊無歸順意整兵以待賊倅至與戰大破之斬獲無算械祖義至京伏誅諸夷聞之震懾曰真天威也吾曹安意內向矣是年施進卿遣壻朝貢詔命進卿為舊港宣慰使賜印誥冠服及文綺後進卿卒二十一年以子濟孫嗣印燬于火詔給之形勝名迹彭家山在港外承天萬壽寺宋時賜額今廢物産珠宋史曰以珠獻宰臣秦檜檜已死詔償直收之金銀宋時入貢珊瑚宋時充貢犀角宋時入貢象牙宋時入貢琉璃宋時入貢魏仲培鼠璞曰此自然之物彩澤光潤踰於衆玉其色不常今皆銷冶石汁以衆藥成之非其物也摩娑石庚辛玉册云陽石也出三佛齊海南有山五色夷取燒之作硫黃氣以形如黃龍齒而堅重者佳姚西溪叢話曰舶過山下愛其石以手捫之故名摩娑水晶宋時入貢沉香見宋史安息香一統志曰樹脂其形色類核桃瓤不宜於燒然能發衆香故人取以和香龍腦香宋時充貢使者來朝至以撒殿乳香一統志曰樹類榕以斧斫之脂溢于外凝結而成其品十有三有滴乳瓶乳袋香黑榻纒末之别宋時入貢降香金銀香華夷考曰其香如銀匠欖糖相似中有白蠟一般白塊在內好者白多低者白少焚之香美出舊港國木香一統志曰樹類絲瓜冬取根曬乾薔薇水一統志曰即薔薇花上露花與中國薔薇不同土人多取其花浸水為露故多偽者以琉璃瓶試之翻搖數四其泡周上下者為真蘇合油一統志曰濃而無澤者為上猛火油華夷考曰樹津也一名泥油大類樟腦第能腐人肌肉燃置水中光焰愈熾蠻夷以制火器其烽甚烈帆檣樓櫓連延不止魚鱉遇者無不燋爍膃肭臍圖經曰舊説似狐而大長尾今滄州所圖乃魚類而豕首兩足其臍紅紫色上有紫斑點欲驗其真取置睡犬旁犬忽驚跳者真吉貝椒國中最多他港取給焉阿魏蘆薈沒藥血竭一統志曰樹略同沒藥採亦如之烏樠木一統志曰單馬令國出樹似棕櫚可為器用褊桃北户録曰占卑國出褊核桃形如半月狀取食絶香美沒石子一統志曰樹如樟開花結實如中國芋栗萬歲棗見一統志火雞􅌡崖勝覽曰三佛齊出火雞大如鶴身圓頸長頸有二紅軟冠狀如紅褐嘴尖毛如羊毛腳長其爪甚利好食熱炭因名火雞交易舟至獻果幣有成數詹卑人商量物價雖議償金多少然非償金實償椒也如值金二兩則償椒百石其大較云喜買夷婦他國多載女子易其椒以歸舊港則用鉛錢矣三佛齊夙稱蕃盛國破以後漸覺故都滿目蕭條賈人亦希造續文獻通考曰萬厯丁丑中國人見大盜林朝曦在三佛齊列肆為番船長如中國市舶官論曰闍婆真臘故島外繁華地也東西之王水陸之國嚮化已非一朝浡泥三佛齊亦雄視諸部而或以守祧或以易姓華人逋入司彼國鈞傭中佼佼輒復驅簸逺夷益以覘皇靈之無外矣東西洋考卷三
