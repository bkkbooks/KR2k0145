body:
  text: 東西洋考地理類十外紀之屬提要臣等謹案東西洋考十二卷明張燮撰燮字紹和龍溪人自署海濱逸史葢布衣也是書成於萬厯丁巳仿宋趙汝适諸蕃志例惟載海國之通互市者首西洋考凡十五國又附録者四次東洋考凡七國又附録者十二次外紀考為日本及紅毛畨不通貢使故别著之次税餉考分水編陸編職官公署四子目次舟師考分内港水程二洋針路祭祀占驗水醒水忌定日惡風潮汐七子目次税璫考紀神宗時内官髙宷通書蠧國刼官擾民始末最詳次藝文考次逸事考其例於交阯占城暹羅彭亨吕宋蘇禄名與古同者仍用古名他若𤓰哇之為下港東埔塞之為真臘大泥之為勃泥舊港之為三佛齊麻六甲之為滿剌加啞齊之為蘇門荅刺思吉港之為蘇吉丹遲悶之為吉里地悶文莱之為婆羅猫里務之為合狸里則並從今名使通俗易檢每國先列沿革事蹟多與諸史相出入如占城即古臨邑而五代史以為自古未通之類亦頗有改正大致與明一統志畧同而稍益以諸書如閩部疏之誤記燕窩菜及小葛羅誤稱吉蘭丹之類咸附辨之次列海船交易之例則皆采自海師賈客之口為傳記之所未詳其税璫一篇言利弊最悉水程針路諸篇尤切於實用惟明代控制外蕃至為無術無事則百計以漁利有變則委曲以茍安事事可為炯戒而篇末諸論乃稱功頌徳曲筆實多葢當時臣子之詞置而不論可矣乾隆四十五年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀東西洋考小引澄水國也農賈雜半走洋如適市朝夕之皆海供酧酢之皆夷産閭左兒艱聲切而慣譯通罷襏畚而善風占殊足異也徃歳商苦璫苦首余條十三議上之稍見蘇時詣予引覈閒進而問徼外風土諸種種異因介司餉金陵王君謀曰是不可以無紀並郡誌所逸也於是孝㢘張紹和父博物善屬辭延之參咨搜稽閲月二洋考成受梓予讀而蹍然曰異哉吾儒之一耳一目之足以盡海内乎彼僅隔一帶水華風夷運逓閲因陳不啻陰陽寒暑之代乎其前矣要以茫茫堪輿恢恢函蓋我雖不得文教一之其指南所至風轖所屯西産多珍東産多鑛今觀其各區宇者部領酋護莫非率也甓城榔屋莫非式也寶帶錦帔莫非容也竹轝筒吸莫非餉也擊鉦踏曲莫非節也灼骨嚙指莫非盟也吹蠡飲血莫非武也則其異異同同者也獨至嗜殺敢死枕戈佩盾朝君暮虜東奔西掠不親親而親釋不問醫而問巫則諸畨類然寧獨天性亦漸靡使之耳傳曰性相近也習相逺也交南諸國非秦漢以及國朝所列冠帶也乎史稱任延等出守化行俗易矣藉非阻距關河盡臣服之寧梗化外而勢不行也固天所以格夷而令窮於華也乃我土之民自倭禁外亹亹然梯航以導之幣質以要之昵之如嬰孩收之如几席上以佐帑需下以廣生遂波斯之藏吐耀紫貝之玩充牣非天以夷賜華而不窮於夷其較著也耶嗟嗟朔方開而竟塞九真郡而旋罷無庸溯矣居夷出關意念良深余弗克得之星槎而習之三老長年按性習之異同總百蠻之錯落可市亦可釁者夷耶綢繆之其奚畫能生亦能殺者海耶䟽鑿之其奚道誠得自今一秉於成波不沸而市不挑水國浸稱樂郊獨澄利也乎哉是編也足以觀矣而第曰續埤史之叢譚資韻士之夢逰非考意也然自非王君好事張君博物予何從以跼蹐睠方外之跡不更足夸異乎遂次第以弁諸首時萬厯丁巳嘉平月之二十日西昌蕭基書於李署水心堂凢例一島外諸國惟交阯占城暹羅彭亨吕宋蘇禄舶人所稱尚沿故號若下港之為𤓰哇東埔寨之為真臘大泥之為渤泥舊港之為三佛齊麻六甲之為蒲剌加啞齊之為蘇門答剌思吉港之為蘇吉丹遲悶之為吉里地問文萊之為婆羅猫里務之為合猫里徃徃訛璞為朴認魯成魚是必質之方言叅之鄰壤騐之謠俗方物始能得其主名用心良苦今於屬掇輒書古號若標題某國則仍依舶人給引之舊使俗眼易于披閲而里耳可以不驚也一占城之先為林邑在唐為環王暹羅之先為赤土婆羅刹後又為暹與羅斛二國𤓰哇之先為闍婆亦曰社婆三佛齊之先為干陀利滿剌加之先為哥羅富沙蘇門答剌之先為大食即宿學不能綜其變而名其源歐陽永叔作五代史尚誤稱占城前代不入中國况豎儒哉自非窮搜千卷鮮不迷亂余所稱引俱本于先正所論次而折𠂻之非敢臆見妄為牽合也一諸國前代之事史籍倍詳而明興以來為畧即國初之事掌故粗備而嘉隆以後為尤畧每見近代作者叙次外夷於近事無可縷指輒用此後朝貢不絶一語唐塞譬之為人作家傳叙先代門閥甚都至後來結束殊蕭索豈非缺陷余毎恨之間採于邸報所抄傳與故老所誦述下及估客舟人亦多借資庶見大全要歸傳信一列國各立一傳如史體其後附載山川方物如一統志體以其為舶政而設故交易終焉一集中所載皆賈舶所之若琉球朝鮮雖我天朝屬國然賈人所未嘗徃亦不掇入或曰日本紅夷何以特書書其梗賈舶者也一司關者其人強半見在不便立傳第賢者又不宜泯没聊于各名下為誌數語其有碑可採者亦附載名下以見繫思倘碑出溢情與本宦名實不相肖則削不録一紀税璫者何曰史不有宦者傳乎間一展卷如乆病暫蘇追念呻吟嘗藥之候悲喜交集乃國醫之功不可誣也即附逐璫䟽于後如譜良劑焉一舶人舊有航海針經皆俚俗未易辨説余為稍譯而文之其有故實可書者為鋪飾之渠原載針路毎國各自為障子不勝破碎且叅錯不相聨余為鎔成一片沿途直叙中有迂路入某港者則書從此分途軋入某國其後又從正路提頭直叙向前其再值迂路亦如之庶幾尺幅具有全海稍便披閲若謂新豐之雞犬識路穆滿之臺榭積蘇則吾豈敢一藝文逸事不載者尚多無論搜剔所未及即余自能覩記者亦僅行其一臠聊待後人之補入
