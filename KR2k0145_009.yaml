羌特立以妃默佑捕反有功疏聞於朝加封善利淳熙間加封靈惠慶元戊午調舟師平太奚寇神在空中以霧障之賊為晝昏而我師晴明如故以此賊無脫者開禧丙寅敵迫淮甸忽半漢旌旄雲集望之則妃廟號也敵披靡解圍景定辛酉巨寇泊祠下禱神不允羣肆暴慢醉卧廊廡間神縱火焚之各自躙蹂而斃有司以聞纍封助順顯衛英烈協正善慶等號元以海漕有功賜額靈濟國朝永樂間內官鄭和有西洋之役各上靈蹟命修祠宇己丑加封𢎞仁普濟護國庇民明著天妃自是遣官致祭歲以為常冊使奉命島外亦明禋惟謹舟神不知創自何年然舶人皆祀之以上三神凡舶中來往俱晝夜香火不絶特命一人為司香不他事事舶主每曉起率衆頂禮每舶中有驚險則神必現靈以警衆火光一㸃飛出舶上衆悉叩頭至火光更飛入幕乃止是日善防之然畢竟有一事為驗或舟將不免則火光必揚去不肯歸都公者相傳為華人從鄭中貴抵海外歸卒於南亭門後為水神廟食其地舟過南亭必遙請其神祀之舟中至舶歸遙送之去靈山石佛頭舟過者必放綵船和歌以祈神貺占驗似可解似不可解似有韻似又無韻備波濤之望氣非委巷而徵歌也朝看東南黑勢急午前雨暮看西北黑半夜看風雨右占天天外飛逰絲久晴便可期清朝起海雲風雨霎時辰風靜鬱蒸熱雷雲必振烈東風雲過西雨下不移時東南卯沒雲雨下巳時辰雲起南山遍風雨辰時見日出卯遇雲無雨必天隂雲隨風雨疾風雨片時息迎雲對風行風雨轉時辰日沒黑雲接風雨不可說雲布滿山低連宵雨亂飛雲從龍門起颶風連急雨西北黑雲生雷雨必聲訇雲勢若魚鱗來朝風不輕雲鈎午後排風色屬人猜夏雲鈎內出秋風鈎背來亂雲天半繞風雨來多少風送雨傾盆雲過都暗了紅雲日出生勸君莫出行紅雲日沒起晴明未堪許右占雲風雨潮相攻颶風難將避初三須有颶初四還可懼望日二十三颶風君可畏七八必有風訊頭有風至春雪百二旬有風君須記二月風雨多出門還可記初八及十三十九二十四三月十八雨四月十八至風雨帶來潮榜船人難避端午訊頭風二九君還記西北風大狂回南必亂地六月十一二彭祖連天忌七月上旬來爭秋莫船開八月半旬時隨潮不可移右占風烏雲接日雨即傾滴雲下日光晴朗無妨早間日珥狂風即起申後日珥明日有雨一珥單日兩珥雙起午前日暈風起此方午後日暈風勢須防暈開門處風色不狂早白暮赤飛沙走石日沒暗紅無雨必風朝日烘天晴風必揚朝日燭地細雨必至返照黃光明日風狂午後雲過夜雨雱𩃱右占日虹下雨雷晴明可期斷虹晚見不明天變斷風早掛有風不怕曉霧即收晴天可求霧收不起細雨不止三日霧蒙必起狂風右占霧電光西南明日炎炎電光西北雨下連宿辰闕電飛大颶可期逺來無慮遲則有危電光亂明無風雨晴閃爍星光星下風狂右占電螻蛅放洋大颶難當兩日不至三日無妨海乏沙塵大颶難禁若禁沙岸仔細思尋烏􅠧弄波風雨必起二日不來三日難抵東風可守回來暫傲白蝦弄波風起便和右占海月上潮長月沒潮漲大訊潮光小訊月上水漲東北南東旋復西南水回便是水落擊定且守船走難纜鈕定必凶直至沙岸走花落矴神鬼驚散要知矴地大洪泥硬右占潮水醒水忌每月初一卅日初二三四五六水醒至初七平交十五水又醒至十六十七十八十九二十日水俱醒草一日水平如前水醒流勢甚緊凡船到七州洋及外羅洋值此數日斟酌船身不可偏東宜扯過西自初八九十一二三四水退流東草三四五六七八水俱退東船到七州洋及外羅值此數日斟酌船身不可偏西西則無水宜扯過東凡行船可探西水色青多見拜浪魚貪東則水色黑色青有大朽木深流及鴨鳥聲見如白鳥尾帶箭此係正針足近外羅對開貪東七更船便是萬里石塘內有一紅石山不髙如看見船身低下若見石頭可防可防水痕忌日忌行船裝載大月初一初七十一十七草三卅日忌小月初三初七十二草六日忌逐月定日惡風正月初十草一日乃大將軍降日逢大殺午後有風無風則雨二月初三十七草七日午時有大風雨三月初九十二草四日有大風雨四月初八十九草三日午時有大風雨五月初十十一十九日申酉時有大風雨六月十九草七日卯辰有大風雨七月初七初九十五草七日有大風八月初三初八十七草七日有大風九月十一十五十七十九日有惡風雨十月十五十八十九草七日府君朝上帝卯時有大風雨十一月初一初三十九日有大風雨十二月初二初三初五初六十二草八日有大狂風潮汐古今論潮備矣長為潮退為汐匪朝至夕至之謂或以為海鰌出入或神龍變化或日出于海或天河激湧皆居中土不習見潮者之論夫天地間一氣耳海潮者地之喘息耳記云卯酉之月氣以交而盛朔望之日氣以變而盛故潮獨大此以餘月餘日論也周翠渠云海居地上地有俯仰潮因有往來氣升於北則北盈而南虛地必南俯故潮皆南趨氣升於南則南盈而北虛地必北俯故潮皆北趨此以地乘氣潮因地論也唯俯仰之形與喘息之義略有異矣月臨於午為長之極歷未及申酉則極消月臨於子為長之極歷丑及寅卯則極消此以太陰之天盤論也若每日之子午亦有潮退每日之卯酉亦有潮至至於八時皆然晝刻不見太陰安得復論天盤乎余安道云海之極逺者其得氣尤專故潮因之東海南海其候各有逺近之殊豈非方之不同而氣有獨盛與若晝潮大於春夏夜潮大於秋冬潮之極漲常在春秋之中濤之極大常在朔望之後則天地之常數通四海皆然者漳人之候潮也夜則以月晝則以時於指掌中從日起時順數三位長半滿退半盡以六字操之無毫髮爽海上漁者於海嘯則知風海動則知雨潮退則出潮長則歸其方言云初一十五潮滿正午初八草三滿在早晚初十草五日暮潮平又云月上水翻流月斜水半月落水汐盡潮則呼曰南流上汐則呼曰北流落至駕舟洋海雖慿風力亦視潮信以定嚮往或晦夜無月惟瞻北斗為度至海外之潮已平而內溪猶長則氣盛而未收俗所云港尾水又云回流水是也海口以潮平為度其穿達支流仍以百里而緩三刻不可以此而分遲速焉見漳州志論曰造車室中出而合轍善舟者亦然彼夫蜩翼不分蠡測多合直狎夷酋為鷗鳥而谷王波臣皆莊周所可銜翼而濟也嗟乎望鼇冠山元無殊於戴粒問蝸左角亦何有於觸蠻所可慮者莫平於海波而爭利之心為險耳東西洋考卷九
