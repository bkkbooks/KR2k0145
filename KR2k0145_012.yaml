body:
  text: 東西洋考卷十二明張燮撰逸事考尚書大傅曰堯南撫交址於禹貢荆州之南垂幽荒之外故越也周禮南八蠻雕題交址有不粒食者焉秦開越嶺南立蒼梧南海交址象郡漢武帝元鼎二年始并百越啓七郡置交址刺史督領之時又建朔方郡已開北垂遂辟交址於南為子孫基址也交址外域記曰越王令二使者主交址九真二郡漢遣伏波將軍路博德討越王越王令二使者齎牛百頭酒千鍾及二郡民户口簿詣路將軍乃拜二使者為交址九真太守見水經注按後漢書男女同川而浴故稱交址蜀王子將兵三萬討雒王服諸雒將因稱安陽王後南越王尉他舉衆攻安陽王有神人名臯通下輔佐為安陽王治神弩一發殺三百人南越王却軍住武寧縣遣太子名始降服安陽王稱臣事之安陽王不知通神人遇之無道通便去語王曰能持此弩王天下不能者亡天下通去安陽王有女名眉珠見始端正珠與始交通始問珠取父弩視之始見弩便盜以鋸截弩訖逃歸報越王越進兵攻之安陽王發弩弩折遂敗安陽王下船徑出於海見水經注馬援南入九真至無功縣賊渠降進入餘發渠帥朱伯棄郡亡入深林巨藪犀象所聚羣牛數千頭時見象數十百為羣又分兵入無編至居風帥不降並斬級數十百九真乃清鑿南塘者九真路所經也去州五百里建武年馬援所開俱見水經注馬援所過輒為郡縣治城郭穿渠灌溉以利其民條奏越律與漢律駮者十餘事與越人申明舊制以約束之自後駱越奉行馬將軍故事見後漢書任延為九真太守九真俗以射獵為業不知牛耕東觀漢記曰九真俗燒草種田前書曰搜粟都尉趙過教人牛耕也每致困乏延令鑄作田器教之墾闢田疇嵗廣百姓充給又駱越之民無嫁娶禮法各因淫好無適對匹不識父子之性夫婦之道延移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省俸祿賑助之同時相娶二千餘人是嵗風雨順節穀稼豐衍其産子者始知種姓咸曰使我有是子者任君也多名子為任於是徼外蠻夷慕義保塞遂止罷偵候戌卒初平帝時漢中錫光為交址太守教導民夷漸以禮義化聲侔於延王莽末閉境拒守建武初遣使貢獻封鹽水侯嶺南華風始於二守焉見後漢書永和二年區憐攻象林交址刺史樊演發兵救之雖擊破反者而賊勢轉盛御史賈昌使在日南與州郡并力討之不利為所攻圍嵗餘兵榖不繼帝以為憂召公卿問方略拜祝良九真太守張喬交址刺史喬至開示慰誘並皆降散良到九真單車入賊中招以威信降者數萬嶺外復平見後漢書李進中平間代賈琮為刺史請交址依中州例貢士其後阮琴以茂才任至司𨽻校尉人才得與中州同選蓋自進始建康元年日南蠻夷攻燒縣邑扇動九真與相連結交址刺史夏方招降之後居風令貪暴無度縣人朱達等攻殺令衆至四五千人進攻九真太守倪式戰死都尉魏朗討破之渠帥猶屯日南衆轉盛延熹三年詔拜夏方交址刺史方威惠久著日南相率詣方降見後漢書周乘為交州刺史上書云交州絶域習俗貪濁強宗聚姦長吏肆狡侵漁萬民臣欲為聖朝掃清一方時屬城解綬者三十餘人士燮拜交址太守氣宇寬厚謙虛下士天下喪亂不廢職貢詔封龍度亭侯建安末吳孫權遣步隲剌交州燮奉節度修貢不缺封龍編侯水經注曰龍編初名龍淵立州之始蛟龍蟠編於南北二津故改龍編交州治嬴􅖮縣元封五年移治蒼梧廣信縣建安十五年治番禺縣詔書以州邉逺使持節并七郡皆授鼓吹以重威鎮見王範交廣春秋漢交址有橘官長一人秩二百石主貢御橘吳黃武中交址太守士燮獻橘十七實同一蒂以為瑞異羣臣畢賀見南方草木狀龍編縣功曹左飛化為虎數月還作吏見交州記吕岱為交州刺史交址太守士燮卒以燮子徽領九真太守以陳時代燮表分海南三郡為交州以戴良為刺史海東四郡為廣州岱自為刺史徽不承命舉兵戌海口拒良岱督兵三千晨夜浮海與良俱進徽不知所出率兄弟六人肉袒迎岱斬送其首徽將甘醴等率吏民攻岱岱奮擊大破之復進討九真斬獲萬計遣從事南宣國化林邑諸王遣使奉貢見吳志日南張重舉計入洛正旦大會明帝問日南郡北向視日耶重曰今郡有雲中金城必不皆有其實日亦俱出於東耳至於風氣暄暖日影仰當官民居止隨情面向東西南北回背無定人性凶悍果於戰鬭便山習水不間平地古人云五嶺者天地以隔內外况綿途於海表顧九嶺而彌邈非復行路之徑岨信幽荒之冥域者矣見水經注越人鑄銅為船在安定江潮退時見出交州記王機遣使乞為交州會杜𢎞溫邵及交州秀才劉沈謀反陶侃擊破之又遣别將討機斬之諸將請乘勝擊邵侃笑曰吾威名已著但一函紙足耳下書諭之邵懼而走追獲於始興加都督交州軍事見晉書日南野女羣行不見夫其狀晶白祼袒無衣襦見博物記盧循寇交州刺史杜惠度以火攻燒其船艦一時潰散循赴火死傳首京師封龍編侯見水經注按晉書盧循勢屈先鴆妻子又召伎妾問曰我今自殺誰能同者多云鼠雀貪生就死人情所難有云官尚當死某豈顧生於是悉鴆諸辭死者自投於水慧度取尸斬之與此不同虞國為日南太守有惠政出則雙鴈隨軒及還會稽鴈亦隨焉既卒猶棲墓不去孔曄會稽記高駢為安南都護時南詔陷交址駢擊破之進靜海軍節度使唐書曰駢大破南詔收所獲贍軍李維周匿捷書不奏劾駢玩敵更命王晏權代駢俄而駢拔安南斬蠻帥段酋遷降附諸洞二萬計晏權發海門檄駢北歸而駢遣王惠贊傳酋遷首京師見艨艟甚盛乃晏權等惠贊懼匿島中間關至京天子覽書羣臣皆賀進駢檢校刑部尚書仍鎮安南改都護府為靜海軍授駢節度交州有鳥王如鵲頭有毛冠尾長一尺五寸純黑色欲取諸鳥先選高枝斫除枝柯惟留三兩枝以膠插著取鳥王置其下鳥王鳴呼衆鳥聞聲爭集其處或銜果實或送蟲蟻皆送鳥王諸鳥著膠獠子下收之見寰宇記胡盧笙者交址人多取無柄之瓠割而為笙上安十三簧吹之音韻清響雅合律吕嶺表録異宋太宗遣李若拙以玉帶賜黎桓桓出郊迎然詞氣悖慢曰向劫如洪鎮乃外境蠻賊也皇帝知非交州兵否若交州叛命則首攻番禺次擊閩越豈止如洪鎮而已若拙曰上初聞寇雖未知所自然以足下拔自牙校授之節制固當盡忠豈有他慮及見執送海賊事果明白然大臣僉議朝廷建節帥以寧海表今蠻賊寇害是交州力不能獨制請發徑卒數萬會交兵剪滅之上曰未可輕舉慮交州不測朝旨或致驚駭不若且委黎桓討擊當漸清謐今不復會兵也桓避席曰海賊犯邉守臣之罪聖君容貸未加誅責自今謹守職約保永清於漲海因北望頓首謝見宋史黎龍廷遣黃成雅來貢會含光殿上以成雅坐逺欲稍升位著訪宰相王旦旦曰子産朝周饗以上卿之禮子産固辭受下卿禮而還國家惠綏逺方優待客使固無嫌也乃升雅于尚書省五品之次見宋史李天祈遣使入貢詔館懷逺驛安撫使范成大言經略諸蠻安南在撫綏之內陪臣豈得與中國王官亢禮政和間貢使入境皆庭參不報謁宜遵舊制詔從之見宋史元遣柴榛再諭陳日烜來朝若不能自覲則積金以代其身兩珠以代其目副以賢士方技以代其土民不然修爾城池以待審處見元史交址道士年九十九别號漫叟因渡海船壞結庵于金仙水石上養一雞大如倒挂子日置枕啼即夢覺又畜一胡孫小如蝦蟇以線繫几案間道士飯已即登几食其餘又有龜狀如錢置金盒中時使出戲衣褶常以詩自娛云流動乾坤影花沾雨露香白雲飛碧漢玄鳥過滄浪月照柴扉靜蛙鳴鼓角忙龜魚呈瑞氣無物汚禪床僧惠洪見之戲曰公小國中引道神也後莫知所之見廣州志莫登庸本東莞蛋民父流寓安南宜陽縣社長名之曰萍蓋無定迹之義也以漁為業登庸有勇力黎瀅以為都力士竟至篡國而終為義子阮敬所鴆見月山叢談以上交址從林邑至日南盧容浦口可二百餘里從口南發往扶南諸國常從此口出也故林邑記曰盡紘滄之徼逺極流服之無外地濱滄海衆國津徑見水經注紀粟出浦陽渡便州至典由渡故縣至咸歡咸歡已南麞鹿滿岡鳴咆命疇警嘯聒野孔雀飛翔蔽日籠山渡治口至九德見林邑記松原以西鳥獸馴良不知畏弓寡婦孤居散髮至老南移之嶺崒不踰仞倉庚懷春於其北翡翠熙景乎其南雖嚶歡接響城隔殊非獨步難遊俗姓塗分故也見林邑記林邑城西南際山東北瞰水重塹流浦周繞城下東南塹外因旁薄城東西橫長南北縱狹北邉兩端回折曲入城周圍入磚城二丈上起磚城一丈開方隟孔上倚板板上層閣閣上架屋屋上搆樓飛觀鴟尾迎風拂雲騫翥嵬崿但制造壯拙稽古夷俗城開四門東為前門當兩淮渚濱於曲路有古碑夷書銘讚前王胡達之德西門當兩重塹北回上山山西即淮流也南門度兩重塹對溫公壘交州刺史溫放之征林邑今東城南五里有溫公二壘是也北門濱淮路斷不通城內小城合堂瓦殿南壁不開青隟丹墀榱題桷椽多諸古法回廊曲掖綺牖紫窗椒房嬪媵無别宫觀路寢永巷共在殿上臨踞東軒徑與下語子弟臣侍昏不得上屋有五十餘丘連甍接棟簷宇如承神祠鬼塔小大八廟層臺重榭狀似佛剎郭無市里邑寡人居海岸蕭條非生民所處見水經注比景縣日中頭上影當身下與影為比故以比影名縣闞駰曰比讀蔭芘之庇影在已下言為身所庇也見水經注林邑王陽邁死子咄立慕其父復改名陽邁見南齊書阮彌之征林邑陽邁出婚不在阮謙之領七千人先襲區粟未入壽泠三日三夜無頓止處凝海直岸遇風陽邁携婚部伍三百許船夜於壽泠浦相遇暗中大戰謙之手射陽邁柂工以風溺之餘制勝理難自此還見水經注按宋書曰阮彌之遣隊主相道生三千人赴討攻區粟城不克引還宗慤隨檀和之圍區粟城林邑王傾國來拒具裝被象前後無際士卒不能當慤謂獅子威服百獸乃製其形與象相禦象果驚奔遂克林邑見宋書小水岸羃䍥常吐飛溜或雪霏沙漲清寒無底分溪别壑津濟相通檀和之東橋大戰陽邁被創落象即是處也見水經注隋煬帝時常駿使赤土還入海見緑魚羣飛水上浮海十餘日至林邑東並山而行海水色黃氣腥舟行一日不絶云是大魚糞見北史范頭黎死太宗崩詔於陵所刋石圖頭黎之形於玄闕之外見舊唐書大中祥符四年占城貢獅子詔畜苑中留二蠻人以給豢養上憐其懷土給資糧遣還見宋史占城交址素仇後同入貢占城使者乞避交人詔遇朔日朝文德殿分東西立望日則交人入垂拱殿占城趨紫宸殿大宴則東西坐見宋史有人往林邑於海嶼上得鯨頭骨如數百斛囷頂上一孔大如甕俗以為珠穴見寰宇記林邑人殺象象怒布陳以鬭人登樹取衣挂樹枝緣它樹而走象見衣以為人存以鼻汲水灌樹枝倒不見人踏碎其衣而去象病首必向南死肉粗連皮煮易熟牙笋足掌肉稍佳見安南志占城犯姦者男女共入牛贖罪負國王物者以繩拘於荒塘物充而後出之見宋史占城野水牛甚狠是人家耕牛走入山自生長年深成羣但見人身穿青者必趕來抵觸而死見華夷考占城尸頭蠻本是婦人但無瞳人為異與家人同寢夜深飛頭而去食人穢物飛回復合其體即活如舊若封固其項或移體别處則死矣人病者臨糞時遭之妖氣入腹必死見星槎勝覽林邑山楊梅大如杯碗以醖酒號梅香耐非貴人重客不得飲出林邑記海棗身無間枝直聳三四十丈樹頂四面生十餘枝葉如栟櫚五年一實實大如杯碗味極甘美泰康五年林邑獻百枚出南方草木狀以上占城赤土豪富之室恣意華靡惟金鎖非王賜不得服用見隋書赤土甘蔗作酒雜以紫瓜根酒色黃赤味亦香美見隋書勘合號簿洪武十六年始給暹羅以後漸及諸國每國勘合二百道號簿四扇如暹羅國暹字勘合一百道及暹羅字底簿各一扇送貯內府羅字勘合一百道及暹字號簿一扇發本國收填羅字號簿一扇發布政司收比遇朝貢填寫國主使臣姓名年月方物令使者齎至布政司先驗表文次驗簿比號相同方許護送至京每紀元則更換給見廣東通志以上暹羅訶陵有三十二大夫大坐敢先為最貴見唐書闍婆不設刑禁雜犯罪者隨輕重出黃金以贖惟寇盜者殺之見宋史瓜哇港口一州長尾猢猻萬數一黑色老雄猴為主一老畨婦隨側婦人無嗣者備果酒往禱老猴喜則食物餘諸猴食盡即有雌雄二猴來前交感婦回家便有孕否則無孕見華夷考瓜哇國舊傳鬼子魔天與一罔象青面紅身赤髮生子百餘常食啖人其中人被啖幾盡忽一日雷震石裂中坐一人衆異之遂為國主即領餘衆驅逐罔象而除其害復生齒安業至今國之遺文後書一千三百七十六年考之肇在漢時至我大明宣德七年見星槎勝覽以上瓜哇真臘城皆疊石卻無女牆亦有監門者惟狗不許入門城甚方整四方各石塔一座曽受斬趾刑人亦不許入東池在城東十里周圍可百里中有石塔石屋塔中有卧銅佛臍中常有水流出真臘惟國主打純花布大臣打踈花布惟官人打兩頭花布新唐人打兩頭花布人亦不罪以暗丁八殺故也暗丁八殺不識體例也國有丞相將帥司天等官皆國戚為之金轎扛四金傘柄者為上金轎扛二金傘柄次之金轎扛一金傘柄又次之止一金傘柄又其次也下者止一銀傘柄而已亦有銀轎扛者金傘柄以上官呼巴丁或呼暗丁銀傘柄呼厮辣的傘用中國紅絹其裙直拖地油傘緑絹為之裙卻短人知蠻人醜黑不知宫人及南棚南棚乃府第也婦女多有其白如玉一布經腰之外皆露胸酥國主之妻亦如此國主凡五妻正室一人四方四人嬪婢三五千番主與正妻同坐金窗中諸宫人次第列兩廊供出入之役者呼陳家蘭不下三千卻有丈夫與民間雜處只額門前削去其髮塗以銀硃及塗兩鬢傍以為陳家蘭别耳番婦産後作熱飯抹之以鹽納隂户凡一晝夜而除之以此産中無病且收斂常如室女次日即抱嬰兒同往河內澡洗夫適逺役只可數夜過十數夜歸必曰我非是鬼如何孤眠真臘亦有通天文者日月薄蝕皆能推算但大小盡與中國不同閏嵗彼亦置閏但只閏九月殊不可曉一夜只分四更每七日一輪亦如中國開建除之類有兩日最吉三日平平四日最凶何日可出東方何日可出西方雖婦女皆能算之十二生肖與中國同但呼名異耳如以馬為卜賽雞為欒豬為直盧牛為箇之類真臘爭訟雖小必上聞初無笞杖但聞罰金重事亦無絞斬止掘地成坑納罪人於內實以土石堅築而罷次有斬指去鼻者但姦與賭無禁姦婦夫或知之以兩柴絞姦夫之足痛不可忍竭資與之方免人家失物疑人為盜以鍋煎油極熱令伸手於中果偷則手爛否則皮肉如故又爭訟莫辨曲直國宫對岸有小石塔十二座令一人各坐一塔無理者必生瘡癤或咳嗽之類有理者略無纖事以此剖判謂之天獄真臘地苦炎熱日非數次澡洗不可過初無浴室盂桶但家有一池否則兩三家合一池男女皆祼形入池或三四日城中婦女至城外河中漾洗河邉脫去所纒布入水者動以千數雖府第婦女亦預焉踵頂皆見唐人暇日頗以此為遊觀之樂有病多入水浸浴及頻頻洗頭便自痊可真臘糞田皆不用穢嫌其不潔也唐人到彼皆不言及中國糞壅之事恐為所鄙登溷既畢必入池洗淨止用左手右手留以拿飰按隋書曰以右手為淨左手為穢每旦澡洗以楊枝淨齒讀誦經呪又澡灑食食罷還用楊枝淨齒又讀經呪巨舟以硬樹破版為之匠者無鋸但以斧鑿開成版凡要木成段亦以鑿鑿斷起屋亦然船上以茭葉蓋覆卻以檳榔木破片壓之此船名為新拏所粘之油魚油所和之灰石灰也小舟卻以一巨木鑿成槽以火熏軟用木撑開腹大兩頭尖可載數人名皮闌以上俱真臘風土記三佛齊人民不輸租賦有所征伐隨時調發自備兵器糧糗見宋史治平中三佛齊地華伽囉遣使至囉囉入貢遇風船幾覆禱天有老翁現雲端浪旋息時寇燬廣州天慶觀老君像在瓦礫中至囉囉覩之即向所見也及還告地華伽囉遣人詣廣鳩工重建施錢十萬置山田於黽塘以充常住鑄大鐘覆以樓明年地華伽囉沒剪其爪髮送道士葬之黽塘至今祭焉見廣州志神鹿高三尺許前半甚黑後半白花毛純可愛止食草木不食腥出舊港國見華夷考以上三佛齊大食男子鼻高黑而髯女子白晢出輒鄣面日五拜天神有禮堂容數百人率七日王高坐為下説法曰死敵者生天上殺敵受福故俗勇于鬭見唐書大食海中見一方石上有樹幹赤葉青樹上生小兒長六七寸見人皆笑其手腳頭著樹枝摘取一枝小兒便死收在大食王宫見舊唐書大食國出胡羊高三尺餘其尾如扇每嵗春月割取臘再縫合之不取則脹死見方國志按大食有大尾羊細毛薄皮尾上旁廣重一二十斤行則以車載之唐書謂之靈羊嘉靖三十四年三月司禮監傳諭户部取龍涎香百斤檄下諸藩懸價每斤償一千二百兩往香山澚訪買僅得十一兩以歸內驗不同姑存之亟取真者廣州獄夷囚馬那别的貯有一兩三錢上之黑褐色密地都密地山夷人繼上六兩褐白色問狀云褐黑色者採在水褐白色者採在山皆真不贋而密地山商周鳴和等再上通前十七兩二錢五分馳進內辨萬厯二十一年十二月太監孫順為備東宫出講題買五斤司劄驗香把總蔣俊訪買二十四年正月進四十六兩再取於二十六年十二月買進四十八兩五錢一分二十八年八月買進九十七兩六錢二分自嘉靖至今夷舶聞上供稍稍以龍涎來市始定買解事例每兩價百金然得此甚難見廣東通志以上啞齊成化間撒馬兒罕使臣枉道至廣東將往滿剌加市狻猊入貢所過震驚布政使陳選奏言狻猊本非澤國所産假借意旨入海宣索驚擾域中貽譏海外見昭代典則紅毛鬼投澚夷拒不納滿剌加伺其舟回遮殺殆盡見廣東通志甲以上麻六人到吉里地悶多染疾病十死八九蓋其地瘴氣及淫汚之故也見星槎勝覽右池閟佛郎機在瓜哇南二國用銃形製同但佛郎機銃大瓜哇銃小國人用之甚精稍不戒則擊去數指或斷一掌一臂嘉靖初佛郎機遣使來貢行使皆金錢其人好食小兒每一兒市金錢百文廣之惡少掠小兒競趨之其法以巨鑊煎沸湯以鐵籠盛小兒置鑊上蒸之出汗盡乃取出用鐵刷去苦皮其兒猶活剖腹去腸胃蒸食之居二三年兒被掠益衆海道汪鋐以兵逐之不肯去又用銃擊敗我兵乃使善水者入水鑿沈其舟盡擒之汪鋐由此薦用後為吏部尚書會北兵入寇鋐建議請頒佛郎機銃於邉鎮詔下所司施行三邉賴其用然鋐疏語諄復可厭兵部郎中吳縉見而笑之鋐怒黜為銅仁知府或戲之曰君被一佛郎機打到銅仁府見月山叢談然今在吕宋者卻不聞食小兒之事吕宋最嚴狡童之禁華人犯者以為逆天輒論死積薪焚之以上吕宋裴清使倭東至竹斯國又東至秦王國其人同於華夏以為夷洲疑不能明也又經十餘國達海岸自竹斯國以東皆附庸於倭見隋書貞觀五年日本使者入朝帝矜其逺詔有司毋拘嵗貢遣龍州刺史高仁表往諭與王爭禮不平不肯宣天子命而還永徽初獻琥珀大如斗瑪瑙若五升器見唐書唐日本王子來朝王子善棋敕顧師言為對手王子出楸玉局冷暖玉棋子云本國之東有集真島島上凝霞臺臺上有手談池池生玉棋子冬溫夏冷故謂冷暖玉又産如楸玉其狀類楸琢之為局光潔可鑑師言與敵手至三十三下勝負未決師言汗手凝思方敢落指謂之鎮神頭乃是解兩征勢也王子瞪目縮臂已伏不勝回語鴻臚曰待詔第幾手耶鴻臚詭對曰第三手師言實第一國手矣王子曰願見第一曰王子勝第三方得見第二勝第二方得見第一今欲躁見第一其可得乎王子掩局曰小國之一不如大國之三信矣倭國有天王自開闢以來相傳至今不與國事不轄兵馬惟世享國王供奉而已國王受國事掌兵馬盛衰強弱更替不常續文獻通考元豐時明州言得倭國太宰牒遣仲回等貢絁二百匹水銀五千兩以仲乃海商貢禮與諸國異請自移牒報而答其物直從之見宋史日本人善噉茶道傍有茶店邀人啜茶如漢人入酒館見續文獻通考肥前州島酋村山等安者受彼武藏總攝之命監主市易交關唐人者也明石道友乃領倭出販渠率駕舟送偵探官董伯起來還旗書單冀凱旋四字海道副使韓仲雍馳至海上召倭目譯審情實問渠何故侵擾雞籠淡水稱自平酋物故國甚厭兵惟常年發遣十數船挾帶資本通販諸國經過雞籠頻有遭風破船之患不相救援反掠我財乘便欲報舊怨非有隔逺吞占之志也問渠何故謀據北港稱通販船經由駐泊收買鹿皮則有之並無登山久住意或漁捕唐人見影妄猜或仇忌别島生端唆害問渠外海商販何故內地劫掠稱國王嚴禁不許犯天朝一草一粒緣各商趂風飄入折閩不得已沿途汲取山泉官兵既劫賊相侍因而格鬭未免殺傷且各商去國逺不必謹守國法有信附舟唐人恐嚇起釁者有被劫海唐人教誘取利者國王實不知聞聞則必根查之而種誅之董伯起親見舊年同道友來虜去漁人張士春歐達老船衆五十餘輩今盡監繫待回報行戮是也問渠何故挾去伯起稱上年彼國發商船十一隻阻風失䑸其二船係島酋親子至今未還其七船與浙兵纒住厮殺惟道友二船先到東湧遇小漁船浼代樵汲并作眼目詢知軍門黃都爺多撥船兵火器係是韓海道新行訓練十分精利於漁船叢中覺察伯起有異質問係是海道中軍官人禮請過船同到日本一則欲待官兵追及央其分剖一則藉此歸報國主明非逗留實不敢輕慢問渠今又何故送還伯起稱總攝嗣立未久每念四夷皆得自通天朝而彼獨隔絶先世亦常列名職貢而後乃棄捐心中時常以為恥憤今因送到伯起詞氣耿介愈仰中華人物始悟每年輕舟越販峩冠進謁或稱衙門差官以求供饋或領互市價值竟至脫騙皆骫法姦民使小國慕化之心有負而天朝字小之恩不沾今幸撥雲見日自願輸忱春信風柔始差道友等整船送回至恭進表文經沈參將諭以不合體式願帶繳回矣問渠何故侵奪琉球使吏治其土宇稱係薩摩酋陸粵守恃強擅兵稍役屬之今嵗輸我王不過銀米三千收利幾何而不忍割出但須轉貴該島耳本道隨諭汝并琉球皆吾赦前事當自向彼國議之又問渠來意何求稱送還華宫得一公文回報圖好體面傳好名聲别無他求但願自後鑒我倭人船衆止是通販不是行劫官兵相遇莫輒鬬殺本道諭汝來西販先經浙境乃天朝首藩也迤南為臺山為礵山為東湧為烏丘為彭湖為彭山皆我閩門庭之內豈容汝涉一迹此外溟渤華夷所共窮兵芟剃漢過不先汝或飄風暫時依泊不許無故登岸或為曠日所誤望山取汲不許作意淹留我兵各有汛地防圉驅逐自難弛縱但汝自取方便明聲稟而速揚去可矣渠又請歸島啓知國主先犯料羅大金之人係何島商倭則請官蒞殺之國中如唐人撥置則差倭縛送于境上以表效順本道諭使命往來非疆吏所得擅議本省奏聞發落尚延日時汝船經由港澚或招猜釁汝國中一動一靜我院道悉見悉聞果不食言自汝國長利也旋又諭上年琉球來報汝欲窺占東畨北港傳豈盡妄天朝因汝先年有交通胡惟庸之事有擅遣宋素卿在驛閧殺之事有誤信汪五峯頻年入寇之事近年有平秀吉侵擾高麗之事疑汝嫌汝懸示通倭禁例益嚴其實逺嶼窮棍挾微資涉大洋走死騖利于汝地者𢎞網濶目尚未盡絶汝若戀住東畨則我寸板不許下海寸絲難望過畨兵交之利鈍未分市販之得喪可覩矣歸示汝主自擇處之聞石道友等各指天拱手連稱不敢不敢因量打花紅布絲復椎牛釃酒大饗之仍頒布旗號由福建發回日本效順夷目俾懸桅上給糧遣回見款倭詳文倭自言為泰伯之後見梁書論曰逸事非盡稗官之殘簡流俗之瑣談也或臚列于正史而事近迂緩或參考于國故而事近纖屑或喧傳于前籍而事近荒唐本傳所不勝載者咸彚而存焉分之則碎金屑玉合之皆珠船寶山固麈談所必資抑狐掖之並採云爾東西洋考卷十二
