body:
  text: 東西洋考卷五明張燮撰東洋列國考吕宋吕宋在東海中初為小國而後寖大吾學編曰産黄金以故亦富厚人質樸不喜争訟永樂三年國王遣其臣隔察老來朝并貢方物其地去漳為近故賈舶多徃有佛郎機者自稱干系蠟國從大西來亦與吕宋互市酋私相語曰彼可取而代也因上黄金為吕宋王夀乞地如牛皮大蓋屋王信而許之佛郎機乃取牛皮剪而相續之以為四圍乞地稱是王難之然重失信逺夷竟予地月徵稅如所部法佛郎機既得地築城營室列銃置刀盾甚具乆之圍吕宋殺其王逐其民入山而吕宋遂為佛郎機有矣干系蠟國王遣酋來鎮數歳一更易今華人之販吕宋者乃販佛郎機者也華人既多詣吕宋徃徃久住不歸名為壓冬聚居澗内為生活漸至數萬間有削髮長子孫者萬厯二十一年八月酋郎雷氏敝裏系朥征美洛居役諸流寓二百五十人充兵助戰政和堂集曰髙肖為把總魏惟秀楊安頓潘和五洪亨五為哨官郸振岳為通事郭惟太等為兵夷人偃息卧船上使華人日夜駕船稍倦輙箠之或刺殺苦毒備嘗潘和五等謀曰叛死箠死刺死等死耳不然亦且戰死不若殺酋以洩吾忿勝則揚帆故鄉即不勝死未晩也議既定夜半入卧内刺酋持酋頭大呼夷人驚起不知所為悉被刄或落水死和五等悉獲金寶兵器駕其船以歸失路之廣南為交酋所掠獨郭惟太等三十二人走免附舟返舍酋既死子郎雷猫吝擁兵駐朔霧馳回代立為酋遣僧來訴明年閩撫遣賈舶招囘乆住吕宋華人酋為給粮以歸致書及詞重訴父寃吕宋嗣王具文一遒用金篋封識另小書用紅羅包裹付賈舶攜來内稱郎雷氏敝裏系朥是猫吝爺氏奉干系蠟國主命鎮守東洋吕宋等處蒙差官來探日本消息招囘唐人日本近雖稱兵入境然彼國有征伐之兵敝國有備禦之固况日本熟知敝國士卒精壯遇敵無不争鋒何足以懼前軰囘唐人係是久住不安生理今之軰者因敝國狹窄米穀稀少粮食不給别無他端伏望尊慈鑒察其被害戰船乞追軍器金銀寶貝并究殺父之人償命以警後人以正法紀從兄巴禮於舊年十月駕船徃貴省奔訴父寃萬里懸情惟冀秉公嚴追究治從兄巴禮厚遣歸國感佩圖報又訴詞一紙為辯明父寃事縁父守國欲討美洛居時有澗内唐民願充助敵者二百五十人自備行粮立功給賞時父與兵同船間駕到交逸地方有佛郎人與唐兵言競父責番人弔在船桅懲戒原船裝載金銀莫計同船番目各帶寶貝銀錢數多船進合萬門灣泊父令唐人牽罟捕魚共烹而食卧至半夜唐人心貪財寳隂謀不軌將父并番目四十餘命盡行殺死僅存巴禮書記二人報息將本船寶貝駕逃僕時奉命帶兵駐劄朔霧各屬間變共議報寃將城内舊澗拆卸僕聞訃囘國勸諭不許生端報怨復議設新澗城外慮及番兵横為擾害著頭目四人逐日在澗看守以便唐人生理不想起蓋未完而日本報警番目思見澗地接邇城郭兼之唐人每有交通之情恐招蕭墻之禍再議移澗此非本心革囘唐人每船給米五十包資助想來人必能道其詳者激切含寃伏望作主轉逹施行閩撫許孚逺具䟽以聞許中丞疏畧曰我民徃販吕宋中多無頼之徒因而流落彼地不下萬人畨酋築蓋舖含聚劄一街名為澗内受彼節制己非一日去秋彼酋抽取我民二百餘人為兵刑殺慘急遂致激成此變夫以番夷豺狼之性輕動干戈不戢自焚固其自取而殺其酋長奪其寳貨逃之交南我民狠毒亦已甚矣檄兩廣督臣以禮遣僧歸國置惟太等于理潘和五竟留交夷不敢還夷人故奴視華人徵賦溢格稍不得當呵辱無已時犯者即嚴置以法自茲釁既結疑貳日深夷益虜使我矣其後又有機易山之事自採金中貴蠆尾四出一妄男子張嶷更為新竒其説上疏曰吕宋有機易山其上金豆自生遣人採取之可得巨萬無禁有詔下閩廷臣力言其謬不報閩當事持之乃遣海澄丞王時和及百户干一成徃勘其地夷初聞使至大駭諸華人流寓者見酋言華無他特奸人横生事端今遣使者來按茲土使奸人自窮便於還報耳酋意稍解令夷僧散花道旁迎使者諸流寓先結蓬席為厰如公署狀酋盛陳兵衛邀丞入亦為丞設食然氣豪甚問丞曰汝華言開山山各有主安得開也且金豆是何樹生來丞無以對數目嶷嶷云此地皆金不必問豆所自蓋嶷欲借朝命臨之襲破其國耳至是不敢顯言夷人皆大笑酋留嶷欲兵之諸流寓苦解俾歸為戮於司寇廼釋令登舟時三十年四月也丞歸病死嶷以奏事不實坐誅傳首海外然夷竟疑中國有啓疆意益暴虐諸流寓諸流寓無頼者聲言今日之事汝為政一旦天兵下海門汝軰寕為石人乎語稍稍傳布夷益疑明年夷遂決計謀殺諸流寓詭言將征他國凢華人寸鐡輙厚售之即切肉小刀價至數錢華人利其直輙聽鬻去家家無復寸鐡乃約日勒㸃名籍分三百人為一院入即殺之事稍露諸流寓乃糾衆走菜園屯聚為亂八月朔日夷兵大起攻菜園死傷無數次日聚大崙山揭竿應敵夷亦少挫酋旋悔禍遣人請和華人慮其誘我撲殺彼使夷怒設伏城旁初三日華人在大崙山饑甚不得食冒死攻城夷人伏發燃銅銳擊殺華人萬餘華人大潰或逃散餓死山谷間横尸相枕計指二萬五千人存者三百口而已是役倉徨無主盟又粮與刄俱乏故搏手困窮膏塗逺嶼華人在大崙時風雨大作人立雨中夜半望見長天有光烱爍大地震動每驚突自相觸殺夷乗其斃而屠之是月漳亦大水漂没萬家受禍同時陽九之均厄也後夷酋下令招撫其所掠華人貨悉封識貯庫中移書閩當事俾諸戚屬往領明年賈舶乃稍稍去奸商黄某者與酋善輙冒領他貨稱為某子甲姻黨綑載乾没云三十三年有詔遣商徃諭吕宋無開事端至是禍良已留者又成聚矣佛郎機身長七尺眼如猫嘴如鷹面如白灰鬚密捲如烏紗而髮近赤其僧擁重權國有大故則酋就僧為謀主人論死者僧誦經勸之首肯然後行刑中罪用拘輕拘一足重則拘兩足婦女歳時詣寺䜟悔有隂事輙密向僧自輸僧為說法鞭之數十忍痛不敢言夜留宿寺中聽僧意所指畫唯唯而已婚姻父母不能定惟僧所決之人死貯以布囊就寺以葬所畜財産半入僧室矣先是吕宋國王兄弟勇甚既為佛郎機所戕輙祟於國國人每值死日夷僧為摽牛厭之摽牛者栅木為場置牛數十頭於中環射之牛叫擲死以此逐鬼云性婪甚靡國不至至則謀襲人吕宋滿刺加遂至易社在吕宋者初嘗攻破婆羅婆羅放藥水毒殺之故奔吕宋其在中國香山盤據為日已乆今則馬非馬驢非驢儼然金城雄其澚中矣廣東通志曰佛郎機素不通中國正徳十二年駕大舶突至廣州澚口銃聲如雷以進貢為名撫按查無會典舊例不行乃退泊東筦南頭蓋房樹柵恃火銃自固御史邱道隆何鰲前後具奏皆言殘逆稱雄逐其國主先年潜遣火者亞三假充滿剌加使臣風飄到澚徃來窺伺熟我道途畧買小兒烹而食之近日滿剌加國王奏其奪國讐殺等情屠掠之禍漸不可長宜即驅逐所造房屋城寨盡行拆毁詔從之海道副使汪鋐帥兵至猶據險逆戰商人鑿舟用䇿乃悉擒之餘皆遯去嘉靖中黨類更畨徃來私舶雜諸夷中為交易首領人皆髙鼻白晳廣人能辨識之方言謂天為西羅日為梭羅風為綿除山為文池真珠為亞思佛玳瑁為實除奴牙犀角為亞里髙佛金為阿羅銀為巴勞礁形勝名蹟覆鼎山其形似鼎倒覆故名上有野夷巢居樹巔射鳥獸鮮食之人跡不到文武樓逺望山容甚偉故華人䝉以佳號大崙山華人與吕宋相攻時屯聚于此圭嶼為其山與吾澄圭嶼相類因襲今名半邉山望之半缺故名加溢城初只一山夷人以其要害地也慮紅毛出没始築城伏銃其内賊至以銃擊之蔽不敢窺張嶷所稱機易山想即加溢之訛耳大湖假港即吕宋港口物産金永樂時充貢奸人所捉影而唱金豆之說也銀錢大者七錢五分夷名黄幣峙次三錢六分夷名突唇又次一錢八分名羅料釐小者九分名黄料釐俱自佛郎機攜來子花即吉貝花蘇木夷名巴朥居椰夷名哥具交易舟至遣人馳詣酋以幣為獻徵稅頗多網亦太密我人徃徃留彼不返者利其近且成聚故也釁隙而後彼亦戒心于我恐族類既繁後復為亂輙下令每舶至人只二百為率毋溢額舶歸所載回必倍以四百毋縮額我人當放舟時多詭名充數聽其查覈中流輒逃回彼土市名澗内舊在城中後既猜嫌改設城外新澗大港是東洋最先到處彼中一大部落也砌石為城佛郎機以酋來鎮米穀繁盛他産不過皮角之屬未至港有筆架山南旺在大港相連再過為密雁為雁塘皆小小村落所産皮角子花玳瑁港地勢轉入故稱玳瑁灣而表山環其外凢舟徃吕宋必望表而趨故茲山推望鎮焉灣名玳瑁然玳瑁非其所出所出蘇木耳再進為里銀中邦是海中一片髙嶼吕蓬在吕宋之南産螺􅪆磨荖央在吕宋之後産子花油麻椰子以寧從文武樓一葦可造産只蘇木其地有龍隠山最大屋黨亦名屋同城郭森峙夷酋屯聚糧食處所也其咽喉名漢澤朔霧俗名宿霧佛郎機未據吕宋時先聚彼中與其國人相親好佛郎機之破吕宋朔霧人有力焉佛郎機徳之既奄有諸土率虜使其民獨與朔霧為婚媾城戍儼然一大酋擁重兵守之向歳吕宋王之子求報父寃自稱奉命駐劄朔霧是也所産蘇木子花海菜以上俱吕宋屬國佛郎機人主之者也吕宋王如中國總兵官巴禮如文吏諸國酋皆吕宋王所遣偏禆為政其間所在各建禮拜寺咸有巴禮司彼夷化諸國風俗與吕宋盡相類故附列焉蘇祿髙藥蘇祿在東南海中永樂十五年其國東王巴都葛叭答刺西王巴都葛叭蘇哩峒王巴都葛叭刺卜各率其妻子酋目來朝并貢方物賜王冠服金錢錦幣雜器子女姻戚侍從賞賫有差㑹典曰賜王紗帽金箱玉帶鈒花金帶金蟒龍衣金銀錢紗錦紵絲紗羅器皿等物王妃冠服銀紗紵絲等物餘冠帶衣服諸物三王者東王為長西王亞之峒王又亞之空國來歸鱗次闕下亦嚮化之篤也還次徳州東王以疾殂于驛亭命有司營葬更為文樹碑墓道留其姬妾内侍十人守墳滿三載然後還國遣使册其子都麻合為蘇祿國東王十九年遣使來貢今賈舶到者言其城據巉巗之巔雅稱天險疑是峒王所都佛郎機屢擁兵攻之不能克聚落不滿千家山涂田瘠間植粟麥民食沙糊魚蝦螺蛤氣候半熱男女短髮纒皂縵繫小印布煮海為鹽釀蔗為酒編竹為布時從鮫室中探珠滿袖自成生涯云形勝名蹟石﨑山一統志曰國以此山為保障犀角嶼珠池入夜登髙望之水面浮光物産真珠一統志曰色青白而圖有至徑寸者玳瑁本朝充貢珠殻片腦本朝充貢番錫本朝充貢降香本朝充貢竹布本朝充貢綿布本朝充貢蓽茇本朝充貢黄蠟本朝充貢蘇木本朝充貢豆蔲鸚鵡交易舟至彼中將貨盡數取去夷人攜入彼國深處售之或别販旁國歸乃以夷貨償我彼國值歳多珠時商人得一巨珠攜歸可享利數十倍若夷人探珠獲少則所償數亦倍蕭索顧逢年何如耳夷人慮我舟之不徃也每返棹輙留數人為質以冀後日之重來髙藥與蘇禄相近出玳瑁猫里務網巾礁老猫里務即合猫里國也地小土瘠國中多山山外大海海饒魚蟲人亦知耕稼永樂三年國王遣使回回道奴馬髙奉表來朝并貢方物國於吕宋隣壤故與吕宋使者偕來其後漸成沃土俗亦近馴故舶人為之語曰若要富須徃猫里務蓋小邦之善地也有網巾礁老者數為盜海上駕舟用長橈其末如瓠之裁半虚中以盛水者入水蕩舟其行倍疾望逺濤中僅微茫數㸃倐忽賊至趨避不及無脫者猫里務既重遭寇害死亡數多遂轉貧困賈舶徃者慮為賊所急稍稍望别島以行形勝名蹟羅黄山上有白石物産蘇木子花交易小國見華人舟跫然以喜不敢凌厲相加故市法最平礁老在海上行劫第欲人之詣彼土也舟徃販者每善待蓋自藏其殺機焉沙瑶呐嗶嘽班隘沙瑶呐嗶嘽其地相連呐嗶嘽在海畔沙瑶稍紆入山隈皆吕宋一帶第不屬佛郎機部署男女畜髮椎結衣服無内外領或用布丈餘抄摺男子多襲以二三重婦人一襲而止男著皮履婦人乃卻跣足足極細潤耳皆穿大孔令可容極重金錈衣服即錦綺或甚竒細之布必剪破服之以衣服多為富字亦用紙筆第畫不可辨築板為城竪木覆茅為宫拜則兩手和南伸身直伏跪屈足而俯兩手支地人多奉佛在處禮拜寺甚夥凢入寺者將死堆柴坐其上自下焚之男女之禁甚嚴夫行在前其妻與人嘲笑夫徑刄其妻所嘲笑之人亦不敢逃聽其刺割盜不問大小輙論死其人願到家與妻子别輙聽去及期妻子自送詣酋酋令架髙棚登棚自剖其腹孕婦以水灌之仍用水滌所生子置子水中生而與水習矣又有班隘者即蚊罩山山甚竒徃徃有仙人出没山頭火光日夜不斷故亦名火山險巇倍常人跡罕到其上極至半山而止人皆扁頭赤身亦佛郎機號令所不到處也形勝海山物産蘇木子花交易僻土無他長物我舟徃販所攜亦僅磁器鍋釜之類極重至布疋然竟少許不能多也舟至詣酋亦有微贈交易朴直美洛居美洛居俗訛為米六合東海中稍蕃富之國也酋出威儀甚備所部合掌伏道旁男子削髮女乃椎結腦後嫁女多市中國盛酒器圖飾其外富家至數十百枚以示豪侈讌㑹設二大盆盛酒置坐隅人手一器酌而飲之長大者起為夷舞年少環列旁視遜不敢登塲也先是佛郎機來攻國人狼籍請降赦其酋令守舊為政于國歳輸丁香若干不設兵戍令彼國自為守和蘭既輈張海外無安頓處忽舟師直搗城下虜其酋語曰若善事吾吾為若主殊勝白頸佛郎機人皆白頸故云酋唯唯又禆理國事如故佛郎機聞之怒曰悔不殺奴汚吾刄奴故反耶亟治兵征美洛居驅澗内華人命當一隊刑法酷急華人中途殺夷王駕其舟遯歸事具吕宋考王子自朔霧馳還吕宋嗣立為王飲恨久之益出兵竟父所志紅夷雖主美洛每一二載大衆輙返國既去復來吕宋王兵抵境外值紅夷空國言返斬關以入遂殺美洛居酋立所親信主之紅夷繼至復破吕宋酋逐之去更立美洛居酋子為嗣自是每嵗征鬭遞為勝負華人某者流寓彼中慧而黠有口辨遊說兩國間分萬老髙山山半為界山北屬和蘭而山南屬佛郎機各罷兵並雄茲土形勝萬老髙即兩國分界處香山雨後香墮沿流滿山採拾不了故常帶沙泥之色王每檄致之委積充棟以待他壤之售民間直取餘耳物産丁香東洋僅産于美洛居夷人用以辟邪曰多置此則國有王氣故二夷之所必争交易向時舟所攜貨有為紅毛夷所特需者倘遇佛郎機必怒謂此舟非關我車來直是和蘭接濟將貨掠去且横殺人故必緘固甚密不令得見若紅毛人見有佛郎機所需貨怒亦如之解紛之後稍息睚眦然一淵兩蛟商彼者亦難矣文萊文萊即婆羅國東洋盡處西洋所自起也唐總章二年王旃逹鉢遣使者與環王使者偕朝自後久絶永樂四年遣其臣勿黎哥來朝并貢方物賜王及妃文綺俗傳今國王為閩人隨鄭和征此留鎮其地故王府旁舊有中國碑先年曽為佛郎機所逐國人走山谷中放藥水流出毒死佛郎機無數佛郎機遂奔吕宋其地故有一石城一木城後折石城於長腰嶼築岸閉潮今所遺者木城耳王削髮裹金繡巾腰佩雙劎出自歩行從者二百餘軰其親屬稱邦竒蘭貴重與王相亞王有金印一枚重十六兩印上篆文作獸形一隻云是永樂間所賜者夷人婚娶請印印背上恐或假寵中國以哃喝其部落非果鑄自上方也入禮拜寺每祭用犧吾學編云人多念佛素食惡殺民間不得食猪肉食猪肉者論死此地有毛思畨在處行刼所得人貨中分與王形勝名蹟聖山夷人自號此山為天下第一山按于闐國北境通聖山人跡罕到此沿其名耳長腰嶼毛文蠟鯉魚塘浮納招廟神為國初時押工總管直庫三人陣亡合葬于此因廟食其地賈舶到必屠牛烹雞并獻茉莉花紅花梳篦等物以祭舟中有人不拜則病彼國人將行賈亦獻花禮神得利回取雙雞繫刀于足俾鬬墓前雞死即以謝神亦大竒也物産真珠本朝充貢玳瑁本朝充貢瑪瑙見一統志車渠魏文帝賦曰玉屬也多纎理縟文本朝充貢片腦海上耳錄曰腦樹出東洋文萊國生深山中老而中空乃有腦有腦則樹無風自摇入夜腦行而上瑟瑟有聲出枝葉間承露日則藏根柢間了不可得蓋神物也夷人俟夜静持革索就樹柢鞏束震撼自落黄蠟本朝充貢萪藤交易華船到進王方物其貿易則有大庫二庫大判二判秤官等酋主其事船既難出港最宜蚤行有時貿易未完必先駕在港外東番考不在東西洋之數附列于此雞籠淡水雞籠山淡水洋在彭湖嶼之東北故名北港又名東番云深山大澤聚落星散凢十五社名山記云社或千人或五六百無君長徭賦以子女多者為雄聽其號令性好勇暇時習走足躢皮厚數分履棘刺如平地不讓奔馬終日不息縱之度可數百里男女椎髻于腦後裸逐無所避女或結草裙蔽體人遇長老則背身而立俟過乃行至見華人則取平日所得華人衣衣之長者為裏衣而短者䝉其外凢十餘襲如襜帷颺之以示豪侈别去仍掛於壁裸逐如初男子穿耳女子斷齒女年十五斷唇兩旁二齒以此為飾手足則刺紋為華美衆社畢賀費亦不貲貧者不任受賀則不敢更言刺紋男子惟女所悦娶則視女可室者遺以瑪瑙一雙女不受則他徃受則夜抵其家彈口琴挑之口琴薄鐵所製齧而鼓之錚錚有聲女延之宿未明便去不謁女父母自是宵來晨去必以星迨産子始徃婿家迎婿婿始見女父母或云既留為婿則投以一箒一鋤傭作女家有子然後歸姙婦産門外手拄兩杖跪地而娩遂浴子於清流焉人死以荆榛燒坎刳尸烘之環匍而哭既乾將歸以藏有祭則下所烘居數世一易地乃悉汚其宫而埋於土他夷人無此葬法也四序以草青為歳首土宜五穀而皆旱耕名山記曰治畬種禾山花開則耕禾熟拔其穂粒比中華稍長穀種落地則禁殺人謂行好事從天公乞飯食比收稻訖乃摽竹竿於路謂之挿青此時逢外人便殺矣村落相仇訂兵期而後戰勇者數人前跳被殺則皆潰其殺人者賀之曰壯士前殺人也見殺者亦賀之曰壯士前故見殺也次日即解嫌和好如初其地多竹大至數拱長十丈伐竹搆屋而茨以茅廣長數雉聚族以居無歴日文字有大事集而議之位置如横階陛長者居上以次遞下無位者乃列兩旁至宴㑹置壘團坐酌以竹筒時起跳舞口烏烏若歌曲焉其人精用鏢竹棅鐵鏃長五尺九咫銛甚攜以自隨試鹿鹿斃試虎虎斃居常禁不得私捕鹿冬鹿羣出則約百許人即之鏢發命中所獲連山社社無不飽鹿者取其餘肉離而腊之篤嗜鹿腸剖其腸中新咽草㫖噉之名百草膏畜雞任自生長拔其尾飾旗射雉亦㧞其尾見華人食雞雉輙嘔居島中不善舟且酷畏海捕魚則於溪澗蓋老死不與他夷相徃來永樂初鄭中貴航海諭諸夷東番獨逺竄不聽約家貽一銅鈴使頸之蓋擬之狗國也至今猶傳為寶富者至掇數枚曰是祖宗所貽云厥初朋聚濵海嘉靖末遭倭焚掠稍稍避居山後忽中國漁者從魍港飄至遂徃以為常其地去漳最近故倭每委涎閩中偵探之使亦歲一再徃形勝璜山琉璜氣每作火光沿山躲鑠沙巴里大幇坑大圓堯港物産薏茨甘藷漳名番藷以其自東番攜來也異物志曰甘藷似芋亦有巨魁去皮肌肉正白如脂肪南人專食以當米穀南方草木狀曰實如拳皮紫而肉白蒸鬻食之味如藷蕷蒸切如米粒以充糧糗是名藷糧椰佛手柑酒名山記曰米甘香採苦草雜米釀之間有佳者飲能一斗鹿名山記曰􅟡􅟡俟俟千百為羣交易夷人至舟無長幼皆索微贈淡水人貧然售易平直雞籠人差富而慳每攜貨易物次日必來言售價不凖索物補償後日復至欲以元物還之則言物已雜不肯受也必疊捐少許以塞所請不則諠譁不肯歸至商人上山諸所嘗識面者輙踴躍延致彼家以酒食待我絶島好客亦自踈莽有韻論曰合東洋諸國僅足當西洋大國之三吕宋既折入干系蠟已非貢夷之舊直䝉故號與相羈縻而已蘇祿婆羅賈類藏珠㑹均執玉異防風之後至同儷日之齊翻宜其久也雞籠雖未稱國自門外要地故列之附庸焉東西洋考卷五
