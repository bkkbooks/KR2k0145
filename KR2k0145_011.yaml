body:
  text: 東西洋考卷十一明張燮撰藝文考占城劉宋剋林邑與將帥詔林邑介恃遐險久稽王誅龍驤將軍交州刺史檀和之忠果到列思略經濟稟命攻討萬里推鋒法命肅齊文武畢力潔已奉公以身率下故能立勳海外震服殊俗宜加褒飾參管近侍可黃門侍郎領越騎校尉行建武將軍龍驤司馬蕭景憲協贊軍首勤捷顯著總勒前驅剋殄巢穴必能威服荒夷撫懷民庶可持節督交州廣州之鬱林寧浦二郡諸軍事宋書林邑傳曰陽邁遣使上表求領交州詔答以道逺不許後頻貢獻而寇盜不已所貢亦陋薄太祖忿其違慠二十三年使交州刺史禮和之伐之遣振武將軍宗慤受和之節度府司馬蕭景憲為前鋒陽邁聞將見討遣使上表求還所略日南民户奉獻國珍太祖詔和之果有款誠許其歸順二月軍至朱梧戌遣曰南太守姜仲基賊曹參軍蟜𢎞民宣揚恩㫖陽邁執仲基等遣𢎞民反命外言歸款猜防愈嚴景獻等進軍向區粟城陽邁遣大帥范扶龍大戍區粟又遣水步軍徑至景憲破其外救盡鋭攻城剋之斬扶龍大首乘勝剋林邑陽邁父子挺身奔逃所獲珍異皆是未名之寶上嘉將帥之功南齊報林邑詔林邑蠢爾介在遐外世服王化當根純乃誠款懇到率其僚職逺績克宣良有可嘉宜沾爵號以𢎞休澤可持節都督緣海諸軍事安南將軍林邑王南齊書曰楊邁子孫相傳為王夷人范當根純攻奪其國篡立為王永明九年遣使貢獻金簟等物詔答之梁答林邑詔林邑王范天凱介在海表乃心款至逺修職貢良有可嘉宜班爵號被以榮澤可持節督緣海諸軍事威南將軍林邑王梁書曰天監九年文贊子天凱奉獻白猿詔答之明封占城國王詔咨爾占城國王素處海邦奠居南服自乃祖父世篤忠貞向慕中朝恪守臣職今朕肇承天統撫馭萬方欲率土之咸寧嘗馳書而往報而爾能畏天命知尊中國即遣使稱臣來貢方物思法前人之訓以安一境之民眷爾忠誠良可尚嘉是用遣官齎印仍封爾為占城國王尚慎終如始永為藩輔明賜占城王璽書洪武二年二月四日虎都蠻奉虎象至王之誠意朕已具悉然都蠻未至朕之使已在途矣朕之遣使正欲報王知之曩者我中國丁元人之末造遂使冦盜布滿四方廢我中國之彞倫朕發兵討之垂二十年芟夷既平朕主中國天下乂安恐畨夷未知故遣使以報諸國不期王之使者先至誠意至篤朕甚嘉焉今以大統厯一本織金綺紗羅絹五十匹專人送使者歸且諭王以道能奉若天道使占城之人安以生業王亦永保祿位福及子孫上帝實鑒之王其勉圖勿怠御製諭占城國王阿答阿者敕洪武十三年九月十八日占城使至為朕上夀非王誠意極專來使奉命萬里之外豈能期時而若此耶覽表閲辭知復與安南交兵水戰弗利朕戒爾兩國毋得深搆仇讎以安生民今一勝一負終無休息果何如哉今再敕前去王其審之古人有云殺莫大於好殺生莫大於好生殺莫大於好殺者好用兵也天之所惡用兵也生莫大於好生天之所好者仁也人能行仁有血氣者無有不生焉曩者安南兵出敗在占城之下占城乘勝入安南之國辱之甚矣若此之後可已而已王能保守封疆奉天勤民則福祿綿長必欲驅兵連年苦戰彼此勝負固不可知鷸蜂相持漁人獲利悔之晚矣朕觀宋書占城在宋朝時曽被真臘入境難之甚者也因王至意故戒之再三使歸王其修仁惟吉故兹敕諭象御製問中書禮部慢占城入貢敕占城國王所進馬至承天門合無發付朕居中國撫四夷若夷有誠從者必以禮待之若肆侮者必異處之前瓜哇非禮所以貢物不以禮受但拘收而已使者囚之占城來貢甚誠王非侮我行人方物既至則當陳設晨朝以禮而進今不令使者進獻為何宰相之職出納朕命禮接百僚今以重事視為泛常豈不法所難容特敕爾等自思果何理道哉永樂十三年戒諭占城王敕縣爾久罹安南荼毒屢請發兵除害朕既命師平之郡其地爾賴以安當思感德守分用保爵土若隂蓄二心悖違天道不撫下人不歸侵地安南覆轍在前爾其鑒之遣祭占城等國山川碑記朕賴天地祖宗眷祐位臣民之上郊廟社稷以及嶽鎮海瀆之祭不敢不恭邇者占城安南遣使奉表稱臣已封其王則其國境內山川悉歸職方考之古典天子望祭雖無不通未聞有遣使致祭其境者今思與普天之下共享升平之治故具牲幣遣使往祭于神神既歆格必能庇其國王世保境土使風雨以時年榖豐登民庶得以靖安庶昭一代同仁之意是用刻石以垂永久洪武三年遣使往占城安南祀其山川所至諸國皆勒石紀其事八年禮部尚書牛諒言京都既罷祭天下山川其四夷山川亦非天子所當躬祀乃命别議以聞中書及禮部奏以外夷山川附祭各省如廣西則宜附祭安南占城真臘暹羅廣東則宜附祭三佛齊瓜哇福建則宜附祭日本琉球渤泥京城更不須祭又言各省山川與風雲雷雨既居中南向其外夷山川神位宜分東西同壇共祀上可其奏命中書頒行入貢表宋占城王陽陀排前進奉使李良莆回伏䝉聖慈賜臣細馬二匹旗五面銀裝劒五口銀纒槍五條弓弩各五張及箭等戴恩感懼稽首稽首臣生長外國敻逺天都竊承皇帝聖明威德廣大臣不憚介居海裔遣使入朝皇帝不棄蠻夷曲加優賜然臣自為土長聲勢尚卑常時外國頗相侵撓况以前民庶如芥隨風星散流離各不自保近䝉皇帝賜臣內間駔駿及旗幟兵器等鄰國聞之知臣荷大國之寵各懼天威不敢謀害今臣一國安寧流民來復非皇帝天德加護何以至此臣之一國仰望仁聖覆之如天載之如地臣自思惟鴻恩不淺且自天子之都至臣所居之國涉海綿邈不啻數萬里而所賜之馬及器械等並安全而至皆聖德所及也自前本國進奉未嘗有旌旗弓矢之賜臣今何幸獨受異恩此蓋天威廣被壯臣土疆臣雖殞身無以上報兼臣貢使往復資給備至恩重山嶽不可具陳今特遣專使李波珠副使訶散等進奉犀角十株象牙三十株玳瑁十斤龍腦二斤沈香百斤夾箋黃熟香九十斤檀香百六十斤山得雞二萬四千三百雙胡椒二百斤簟席五前物固非珍奇惟表誠懇臣生居異域幸遇明時不貴殊珍惟重良馬儻皇帝念及外國不罪懇求若使介南歸願垂頒賜臣之幸矣本國元有流民三百散居南海曽䝉聖㫖許令放還今有猶在廣州者本國舊有進奉夷人羅常占見駐廣州乞詔本州盡數㸃集兵籍以付常占令造舶船乘便風部領歸國冀安生聚以實舊疆至於萬里感恩一心事上臣之志也宋史曰淳化元年王陽陀排自稱新坐佛逝國遣使李臻貢馴犀方物表訴為交州所攻人民財寶皆為所略上賜黎桓詔令各守境三年遣使李良莆貢方物賜王白馬二兵器等本國僧淨戒獻龍腦金鈴銅香爐如意各優賜之至道元年王遣使奉表來貢上覽表遣使詣廣州詢問願還者悉付波珠使還復賜白馬二遂為常制入貢表宋占城王占城國王楊普俱毗茶室離頓首言臣聞二帝封疆南止屆于湘楚三王境界北不及於幽燕仰矚昌時實邁往跡伏惟皇帝陛下乾坤授氣日月儲英出震居尊承基御極慈悲敷於天下聲教被於域中業茂前王功芳徂后蒼生是念黃屋非心無方不是生霛有土並為臣妾真風遍布霈澤周行凡沐照臨共增聳抃臣生于邉鄙幸襲華風蟻垤蜂房聊為遂性龍樓鳳閣尚阻觀光再念自假天威獲全封部鄰無侵奪俗有舒蘇每遣下臣問寧上國䝉陛下恩霑行葦福及豚魚特因回人頒賜戎器臣惟望闕焚香歡呼拜受心知多幸曷答鴻恩聖君既念於賔王微􅈤肯忘於述職今遣專信臣布祿爹地加副使臣除逋麻瑕珈耶等部署土毛逺充嵗貢雖表楚茅之禮實懷魯酒之憂䖍望睿明甫寬譴戮專信臣等回日軍容器仗耀武之物伏願重加賜賚蓋念忝為臣子合告君親服飾車輿威儀斧鉞不敢私制惟望恩頒干冒冕旒不任死罪宋史曰咸平二年王揚普俱毗茶逸施離遣使朱陳堯副使蒲薩陀婆以犀象玳瑁香藥來貢賜堯等冠帶衣褥有差景德元年又遣使來貢詔以良馬介胄戎器等賜之四年遣使布祿爹地加等奉表來朝表函藉以文錦布祿爹地加言本國舊𨽻交州後奔佛逝北去舊所七百里使還賜物甚厚暹羅御製諭暹國王詔洪武初年君國子民非上天之明命后土洪恩曷能若是華夷雖間樂天之樂率土皆然若為人上能體上帝好生之德協和人神則祿給世世無間矣爾哆囉祿內修齊家之道外造睦鄰之方數遣使中國稱臣入貢以方今時王言之可謂賢德豈不名播諸畨今年秋貢象至朝朕遣使往諭特賜暹國之印及衣一襲爾當善撫邦民永為多福故兹詔諭想宜知悉附洪武二十八年諭祭暹羅國王敕朕自即位以來命使出疆周于四維厯邦國足履其境者三十六聲聞于耳者三十一風殊俗異大國十有八小國百四十九較之於今暹羅最近邇者使至知爾先王已逝王紹先王之緒有道於家邦臣民歡懌兹特遣人祭已故者慶王紹位敕至其罔失法度罔淫于樂以光前烈其敬之哉永樂十七年諭暹羅國王敕朕祇膺天命君主華夷體天地好生為治一視同仁無問彼此王能敬天事大修職奉貢朕心所嘉蓋非一日比者滿剌加國王亦思罕答兒沙嗣立能繼乃父之志躬率妻子詣闕朝貢其事大之誠與王無異聞王無故欲加之兵夫兵者凶器兩兵相鬭勢必俱傷故好兵非仁者之心况滿剌加國王既已內屬則為朝廷之臣彼如有過當申理於朝廷不務出此而輒加兵是不有朝廷矣此必非王之意或者王左右假王之名弄兵以逞私忿王宜深思勿為所惑輯睦鄰國無相侵越並受其福豈有窮哉王其留意焉明禮部移暹羅國王檄自有天地以來即有君臣上下之分且有中國四夷之禮我朝混一之初海外諸畨莫不來庭豈意胡惟庸造亂三佛齊乃生間諜紿我信使肆行巧詐豈不知大琉球王與其宰臣皆遣子弟入我中國受學皇上賜寒暑之衣有疾則命醫疹之皇上之心仁義兼盡矣皇上一以仁義待諸畨國何三佛齊背大恩而失君臣之禮據有一蕞之土欲與中國抗衡儻皇上震怒使一偏將將十萬衆越海問罪如覆手耳何不思之甚乎皇上嘗曰安南占城真臘暹羅大琉球皆修臣職惟三佛齊可謂梗教夫智者憂未然勇者能從義彼三佛齊可謂不畏禍者矣爾暹羅國王猶守臣職我皇上眷愛如此可轉達瓜哇俾以大義告三佛齊三佛齊係瓜哇統屬其言彼必信或能改過從善則與諸國咸禮遇之如初勿自疑也三十年六月禮部奏諸畨國使臣客旅不通上曰洪武初海外諸畨與中國往來商賈便之凡三十國胡惟庸謀亂三佛齊生間紿我使臣至彼瓜哇國王聞知戒飭禮送還朝是後使臣阻絶諸國王之意遂爾不通惟安南占城真臘暹羅大琉球自入貢以來至今來庭我待諸畨國不薄但未知諸國之心若何今欲遣使諭瓜哇國恐三佛齊中途阻之三佛齊係瓜哇統屬爾禮部備述朕意移文暹羅國王令轉達瓜哇知之於是禮部咨暹羅王瓜哇明賜瓜哇國王璽書洪武二年中國正統自元之季遂失其紀綱常既隳盜賊四起朕起兵討之垂二十年海內悉定朕奉天命已主中國恐遐邇未聞故專報王知之使者已行聞王國人掜只某丁前奉使于元還至福建而元亡因來居京師朕念久離瓜哇必深懷念今遣人送還頒去大統厯一本王知正朔所在必能奉若天道俾瓜哇之民安於生理王亦永保祿位福及子孫其勉圖之勿怠永樂十一年諭瓜哇國王都馬坂敕比前內官吳賓等還言恭事朝廷禮待敕使有加無替聞王以滿剌加國索舊港之地而懷疑懼朕推誠待人若果許之必有敕諭今既無朝廷敕書王何疑焉下人浮言慎勿聽之今賜王文綺紗羅至可領也奉劉宋太祖表闍婆國王宋國大主大吉天子足下敬禮一切種智安隱天人師降伏四魔成等正覺轉尊法輪度脫衆生教化已周入于涅槃舍利流布起無量塔衆寶莊嚴如須彌山經法流布如日照明無量淨僧猶如列宿國界廣大民人衆多宫殿城郭如忉利天宫名大宋揚州大國大吉天子安處其中紹繼先聖王有四海閻浮提內莫不來服悉以兹水普飲一切我雖在逺亦霑靈潤是以雖隔巨海常遙臣屬願照至誠垂哀納受若䝉聽許當年遣信若有所須惟命是獻伏願信受不生異想今遣使主佛大陀婆副使葛扺奉宣微誠稽首敬禮大吉天子足下陀婆所啓願見信受諸有所請唯願賜聽今奉微物以表微心宋書元嘉十二年國王師黎婆逹陀阿羅跋摩遣使奉表蓋是時甫通中國云大泥宋入貢表勃泥國王勃泥國王向打稽首願皇帝萬嵗夀今遣使入貢向打聞有朝廷無路得到昨商人蒲盧歇船泊水口差人迎到州言自中國來比詣闍婆遇猛風破其船不得去此時聞自中國來國人大喜即造舶船令導達入朝貢所遣使人只願平善見皇帝每年令人入朝貢每年修貢慮風吹至占城界望皇帝詔占城令有向打船到不要留臣本國别無異物乞皇帝勿怪舊港宋賜三佛齊國使者詔吾以聲教覆露方域不限逺邇茍知夫忠義而來者莫不錫之華爵耀以美名以寵異其國爾慕恱皇化浮海貢琛吾用汝嘉併超等秩以昭忠義之勸宋史曰熙寧十年使大酋領地伽羅來以為保順慕化大將軍賜詔寵之奉梁武帝表干陀利國王常勝天子陛下諸佛世尊常樂安樂六通三達為世間尊是名如來應供正覺遺形舍利造諸塔像莊嚴國土如須彌山邑居聚落次第羅滿城郭館宇如忉利天宫具足四兵能伏怨敵國土安樂無諸患難人民和善受化正法慶無不通猶處雪山流注雪水八味清淨百川洋溢周回屈曲順趨大海一切衆生咸得受用於諸國土殊勝第一是名震旦大梁揚郡天子仁廕四海德合天心雖人是天降生護世功德寶藏救世大悲為我尊生威儀具足是故至誠敬禮天子足下稽首問訊奉獻金芙蓉雜香藥等願垂納受梁書曰跋陀死子毗邪跋摩立十七年遣長史圓跋摩奉表麻六甲勞滿剌加國王還國敕永樂九年王涉海數萬里至京師坦然無虞蓋王之忠誠神明所祐朕與王相見甚歡固當且留但國人在望宜往慰之今天氣向寒順風南帆實維厥時王途中善飲食善調護以副朕眷念之懷啞齊上宋太宗表大食舶主蒲希密衆生垂象回拱於北辰百谷疏源委輸於東海屬有道之柔逺罄無外以宅心伏惟皇帝陛下德合二儀明齊七政仁宥萬國光被四夷賡歌洽擊壤之民重譯走奉珍之貢臣顧惟殊俗景慕中區早傾向日之心頗鬱朝天之願昨在本國曽得廣州蕃長寄書招諭令入京貢奉盛稱皇帝聖德布寬大之澤詔下廣南寵綏蕃裔阜通逺物臣遂乘海舶爰率土毛涉厯龍王之宫瞻望天帝之境庶遵𤣥化以慰宿心今雖屆五羊之城猶賖雙鳳之闕自念衰老病不能興遐想金門心目俱斷今遇李亞勿來貢謹備蕃錦藥物附以上獻臣希密凡進象牙五十株乳香千八百斤賔鐵七百斤紅絲吉貝一段五色雜花蕃錦四段白越諾二段都爹一琉璃瓶無名異一塊薔薇水百瓶宋史淳化四年李亞勿來貢舶主蒲希密至南海老病不能詣闕以方物附之上表來獻詔賜希密敕書錦袍銀器束帛至道元年舶主蒲押陀黎齎希密表來獻引對崇政殿云父希密泛舶廣州五稔未歸毋令臣逺來尋訪具言前嵗䝉聖恩降敕賜法錦袍紫綾纒頭間塗金銀鳳瓶一對綾絹二十匹令臣來謝以方物致貢上賜襲衣冠帶被褥令閣門宴犒就館延留數月遣回降詔答賜黃金凖其所貢之直吕宋折吕宋採金議明高克正邑人翰林院檢討蕞爾敝邑介在海濵頻年驛騷民困日甚邇採金使者又見告矣澄民習夷什家而七問機易山未有能舉其處者有金與否果可望氣而知乎自丱使四出所得金幾何可按籍計也輒云海上開採嵗輸精金十萬白金三十萬將取之寄抑輸之神乎夷德亡厭好利更甚安有瓦鑠黃白坐錮以待我者取之能必夷之不攘臂爭乎能必我之取不為大盜積乎明命已頒姦商已揚揚乘六而來要若曹亦未知澄事耳採金海上非餘皇十餘艘卒徒千餘人不可行而是十餘艘千餘人者非可空手而具亡米而炊也誰為備之而誰為給之至計窮而欲奪商船以應上命斂民財以應上供則土崩之形成而脫巾之勢見吾所慮者不在風濤之外也桑梓之地疾痛與俱惟台臺為萬姓請命以杜亂萌澄邑幸甚第二議與有問不佞者曰姦商以採金為名力能勾引富民以夷市前哨探一開應者如響往事可鏡愚以今日之事與哨探不同哨探公行藉此闌出私貨通畨獲利捆載而歸盡入私槖而官弗問也採金則歸必輸金於朝罄敝邑富民家藏與每年通夷所入不足當黃金十萬白金三十萬之數其誰肯以身委風波而金輸朝廷故斷謂敝邑商人不敢與姦商比而為此也搆第三議大約姦民之雄其能出資以通番勾夷而釁者必大力量者也張嶷么䯢小人未必辦此不過以虛詞厚利聳動主心幸得一聽必遣貂璫貴臣與之共事繇此恣睢道路騷擾地方既至則以利啖愚民以勢抗官府惟所欲為或可如意賴主上明見萬里內使不遣責其自備船隻工本毋致煩擾則張嶷之膽寒矣奉命置郵迅速可至且疏云以十十一月往以四五月歸則造船備貨當在數月之前乃今遲遲其行姑待來年則伎倆亦自可見矣今兩臺章疏已上倘張嶷至省嚴加約束以待明㫖一精嚴有司足制死命於戲投珠抵璧之風既難望於叔季轉圜投水之喻又難必於朝廷以杞包瓜令其自潰至計無所施金無所出朝廷責以欺罔之罪始見封疆之臣為國計誠忠而羣小果不足信也日本附魏報倭女王詔景初六年制詔親魏倭王卑彌呼帶方太守劉夏遣使送汝大夫難升米次使都市牛利奉汝所獻男生口四人女生口六人班布二匹二丈以到汝所在踰逺乃遣使貢獻是汝之忠孝我甚哀汝今以汝為親魏倭王假金印紫綬裝封付帶方太守假授汝其綏撫種人勉為孝順汝來使難升米牛利涉逺道路勤勞今以難升米為率善中郎將牛利為率善校尉假銀印青綬引見勞賜遣還今以綘地交龍錦五匹綘地皺粟罽十張蒨綘五十匹紺青五十匹答汝所獻貢直又特賜汝紺地勾文錦三匹細斑華罽五張白絹五十匹金八兩五尺刀二口銅鏡百枚真珠鉛丹各五十斤皆裝封付難升米牛利還到録受悉可以示汝國中人使知國家哀汝故鄭重賜汝好物也附宋永初二年詔明倭讚萬里修貢逺誠宜甄可賜除授宋大六年詔倭王世子興奕世載忠作藩外海稟化寧境恭修貢職新嗣邉業宜授爵號元與日本書朕惟自古小國之君境土相接尚務講信修睦况我祖宗受天明命奄有區夏遐方異域畏威懷德者不可悉數朕即位之初以高麗無辜之民久瘁鋒鏑即令罷兵還其疆域反其旄倪高麗君臣感戴來朝義雖君臣歡若父子計王之君臣亦已知之高麗朕之東藩也日本密邇高麗時通中國至於朕躬而無一乘之使以通和好恐知之未審特遣使持書布告朕志冀自今以往通問結好以相親睦且聖人以四海為家不相通好豈一家之理哉以至用兵夫孰所好王其圖之又命趙良弼往使書蓋聞王者無外高麗與朕既為一家王國實為鄰境故嘗馳信使修好為疆埸之吏抑而弗通所獲二人敕有司慰撫俾賫牒以還復寂無所聞繼欲通問屬高麗林衍搆亂坐是弗果豈王亦因此輟不遣使或已遣而中路梗塞皆不可知不然日本素號知禮王之君臣寧肯漫為弗思之事乎近已滅林衍復舊王位安集其民特命少中大夫祕書監趙良弼充國信使持書以往如即發使與之偕來親仁善鄰國之美事其或猶豫以至用兵夫誰所樂為也王其審圖之御製諭日本國王詔曩宋失馭中土受殃金元入主二百餘年及元將終英雄鼎峙聲教紛然朕控弦三十萬礪刃以觀未幾命大將軍律九伐之征不逾五載戡定中原蠢爾東夷君臣非道四擾鄰邦前年浮辭生釁今年人來否真實非疑其然而往問果較勝負於必然實搆隙於妄誕於戲渺居滄溟罔知帝賜竒甸傲慢不恭縱民為非將必殃乎故兹詔諭想宜知悉洪武三年諭日本國王良懷而朕聞順天者昌逆天者亡自古帝王居中國治四夷歷代相承咸出斯道朕荷上天祖宗之祐百神效靈諸將用命收海內之羣雄復前代之疆宇即皇帝位已三年矣比嘗遣使持書飛諭四夷髙麗安南占城瓜哇稱臣入貢既而西域諸畨各獻良馬來朝俯伏聽命元人逺遁沙漠將及萬里特遣征虜大將軍率馬步八十萬出塞追獲殲厥渠魁大統已定蠢爾倭夷出沒海濱為冦已嘗遣問久而不答方將整飭巨舟致罰爾邦俄聞被冦者來歸始知前日之冦非王之意乃命有司暫停造舟之役然或外夷小邦故逆天道不自安分神人共怒天理難容征討之師控弦以待果能革心順命共保承平不亦美乎嗚呼撫順伐逆古今彞憲王其戒之以延爾嗣御製設禮部問日本國王賜禮部尚書致意專答日本國王嗚呼王罔知上帝奇甸於滄溟之中命世傳而福黔黎不守已分但知環海為險巖頭石角為奇妄自尊大肆侮鄰邦縱民為盜帝將假手於人禍有日矣吾奉至尊之命移文與王王若不審巨微效井底鳴蛙仰鏡觀天無乃搆隙之源乎恐王大略涉厯古書不能詳細特將日本與中國通往禮物及前貪商之假辭如王之國至日可細目日本之盛大也且日本之稱有自來矣始號曰佞後惡名遂改日本其通使中國上古勿論自漢魏晉宋梁隋唐宋之朝皆遣使表貢方物生口當時帝王或授以職或爵以王或睦以親由彼歸慕意誠故報禮厚也若叛服不常搆隙中國則必受兵如吳大帝晉慕容廆元世祖皆遣兵往伐俘獲男女以歸千百年間往事可鑒王其審之上宋順帝表升明二年倭國王武封國偏逺作藩于外自昔祖禰躬擐甲胄跋涉山川不遑寧處東征毛人五十五國西服衆夷六十六國渡平海北九十五國王道融泰廓土遐畿纍葉朝宗不愆于嵗臣雖下愚忝𦙍先緒驅率所統歸崇天極道遙百濟裝治船舫而句驪無道圖欲見吞掠抄邉𨽻䖍劉不已每致稽滯以失良風雖曰進路或通或不臣亡考濟實忿寇讎壅塞天路控弦百萬義聲感激方欲大舉奄喪父兄使垂成之功不獲一簣居在諒暗不動兵甲是以偃息未捷至今欲練甲治兵申父兄之志義士虎貢文武效功白刃交前亦所不顧若以帝德覆載摧此彊敵克靖方難無替前功竊自假開府儀同三司其餘咸假授以勸忠節宋書曰詔除武使持節都督倭新羅任那加羅秦韓慕韓六國諸軍事安東大將軍倭王上宋太宗表僧奝然日本國東大寺大朝法濟大師賜紫沙門奝然啓傷鱗入夢不忘漢主之恩枯骨合歡猶亢魏氏之敵雖云羊僧之拙誰忍鴻霈之誠奝然誠惶誠恐頓首頓首死罪奝然附商船之離岸期魏闕於生涯望落日而西行十萬里之波濤難盡顧信風而東别數千重之山嶽易過妄以下根之卑適詣中華之盛於是宣㫖頻降恣許荒外之跋涉宿心克協粗觀㝢內之瓌奇况乎金闕曉後望堯雲於九禁之中巖扄晴前拜聖燈於五臺之上就三藏而稟學巡數寺而優游遂使蓮華回文神筆出於北闕之北貝葉印字佛詔傳於東海之東重䝉宣恩忽趂來跡季夏解台州之艦孟秋達本國之郊爰逮明春初到舊邑緇素欣待侯伯慕迎伏惟陛下惠溢四溟恩高五嶽世超黃軒之古人直金輪之新奝然空辭鳳凰之窟更還螻蟻之封在彼在斯只仰皇德之盛越山越海敢忘帝念之深縱粉百年之身何報一日之惠染筆拭泪伸紙搖魂不勝慕恩之至謹差上足弟子傳燈大法師位喜因等拜表以聞僧奝然來朝還國後數年遣其弟子喜因奉表來謝請計處倭酋疏明許孚逺福建巡撫都御史為偵探有據廷議紛紜懇乞審定大計殄滅狂酋事臣入境之初據指揮沈秉懿史世用稱奉石尚書密遣打探倭情看得沈秉懿老而黠不可使令還報石尚書史世用貌頗魁梧才亦倜儻遂選取海商許豫令世用扮作商人同往薩摩州二十二年三月許豫回報舊年七月船收日本莊內國內浦港距薩摩州尚逺探得州酋滕義久同許儀後隨關白去名護屋地方史指揮分别潛去尋覔同伴張一學等密往關白居住城郭探其動靜起居八月關白同義久幸侃儀後等回九月初三日豫備禮物以指揮作客商進見幸侃幸侃曰恐非商販儀後答曰亦大明一武士也侃將自穿盔甲送豫有大隅州正興寺倭僧𤣥龍來問曰船主得非密探我國之官耶豫權答曰是因爾侵伐高麗皇帝不忍發兵救援遣遊擊將軍來講和好福建許軍門欲發商船未審虛實先差一船人貨來此原無他意倭僧將信將疑十一月義久㑹幸侃等差倭使黑田喚豫覆試前情倭僧𤣥龍與豫面寫對答喜為足信仍奉文書一封旗刀二事付豫進送軍門以圖後日貿易通利之意延二十三年正月豫始得回并倭酋所上文書旗刀幸侃送豫盔甲一副又莊內國倭酋滕一雲送豫倭刀一把根占國倭酋平重虎送豫鳥銃一對逐一呈報一探得關白平秀吉今稱大閣王年五十七嵗子才二嵗養子三十嵗平日姦雄詭詐六十六州皆以和議奪之一侵入高麗被本朝官兵殺死不計其數病死亦不計其數弓盡箭窮人損糧絶詭計講和方得脫歸一關白造船千餘大船長九丈闊三丈用櫓八十枝中船長七丈濶二丈五尺用櫓六十枝諸倭云候和婚不成欲亂入大明等處一日本㸃兵十八嵗至五十嵗而止若姦巧機謀者雖七十嵗亦用之一日本長岐地方廣東香山澚番每年至長岐買賣透報大明消息仍帶倭奴假作佛郎機潛入廣東覘伺動靜一關白姦奪六十六州必拘留子弟為質令酋長出師以侵高麗實置死地各國暫屈讎恨不忘察義久等甚有惡成樂敗之意一浙江福建廣東三省人民被虜日本生長雜居十有其三住居年久熟識倭情多有歸國立功之志乞思籌䇿令其回歸又據商人張一學將到關白城郭偵探事情開報一平秀吉有三帥名石田淺野大谷大小謀議俱是三人一吉發兵令自備乾米絡繹接應處處含寃一豐護州酋首野柯踏聞大明助兵喪膽逃回吉剿殺一家一兵入朝鮮內浦港抽選七十人回者止二十人日向國大船裝倭三百回者止五十人損失甚多一薩摩州乃船隻慣泊之處今發往吕宋船四隻交址三隻東埔一隻暹邏一隻佛郎機二隻興販出沒此為咽喉也一器械不過黃硝烏鉛硫黃日本産出焰硝隨處惡土煎煉亦多惟烏鉛大明所出香山澚發船往彼販賣煉成鉛彈一日本有罪不論輕重登時殺戮壬辰吉兒病故妄殺乳母十餘人癸巳吉在名護屋回聞女婢通姦將男女四人燒大堺野中究殺七十餘口一吉自擅政山城君懦弱無為壬辰征高麗將天正二十年改為文祿元年自號大閣王將關白付與義男孫七郎字見吉年三十智勇不聞一虜掠朝鮮良家子女糠飱草宿萬般苦楚有秀才亷思謹等被虜厚給衣食欲拜為軍師謹等萬死不願據此臣又屢閲邸抄為議封貢一事本兵經略大臣與臺省諸臣持論不决朞月於此臣在封疆不容無言竊料平秀吉一狡詐殘暴之夫耳本以人奴篡竊至此彼國諸酋思攘奪者甚衆隂謀伐國搆怨亦深如結薩摩州將幸侃逼令州官義久殺其弟中書以自明義久不得已佯為降順心未嘗一日忘秀吉也奪豐後州官之妻為妾民間妻女充塞卧內淫虐百端諸州質子禁若囹圄共不勝忿恨之情日本原無征科之擾而今令逺道輸糧原無興大兵動大衆之舉今則徴發騷然舉國鼎沸日事殺人而虞其噬多行不軌而慮其毒故出則䝉面卧則移徙彼亦自知不免于禍自底滅亡可計日而待也今夫謀動干戈驅無辜之蒼赤而欲盡置死亡之地此神明所不與恃其取諸州之故智以襲朝鮮憑其破朝鮮之餘威思犯中國怒臂當車豈可久長且彼雖數十萬衆航海而來我沿海舟師以主待客勝算在我而又絶其嚮導乖其所之彼未可遽入吾地也戰艦雖巨而多離船則不能守守之則不能登陸而戰兵數萬計日須數百石糧我堅壁清野使無所掠食則困斃立至曩時倭犯浙直閩廣間雖受荼毒卒就殲滅昨入朝鮮不下一二十萬死亡過半伎倆可知矣蕞爾夷邦主者不過一匹夫之勇左右羽翼非素親信曽無有韓白之略又或懷豫讓之謀故以臣䇿之必不能得志於我而不戢自焚旋就顛蹶亦理勢之必然今中外洶洶畏蜀如虎者皆過也若封貢之說諸臣言之甚詳無容復置喙竊謂山城君雖懦弱名分猶存一旦以天朝封號加之僣逆之夫且置山城君何地崇姦怙亂乖紀廢倫非所以令衆庶而示四夷也北國諳達之孫巴罕鼐濟來投我執以為質而彼卑辭求之因而還其孫與通貢市假以王封先帝有不殺之恩北國無要挾之迹此機㑹偶有可乘今非若此也秀吉無故興兵陷我屬國碧蹄戰後暫退釡山尚未離朝鮮而我以細人之謀聽其往來講封講貢若謂許我封貢則退不許封貢則進要耶非耶近朝鮮國王李昖奏稱倭賊於金海釡山築城造屋運置糧器焚燒攻掠無有巳時尚可謂退兵乞和耶夫乞封固非秀吉本謀然藉名號以讋服諸夷益以恣狂逞之志則秀吉亦姑爾從之行長小西飛懾於平壤王京之戰既未能長驅直入而又兵入朝鮮死亡數多恐無辭于秀吉則亦姑假封貢之說以紿秀吉而緩其怒是以沈惟敬茍且之謀得行其間我經略總督諸臣不過因惟敬而過信行長諸酋又因行長諸酋而錯視秀吉不知秀吉豺狼之暴狐兔之狡必不可信義處者也觀請封表文末云世作藩籬之臣永獻海邦之貢因封及貢其情已露於此要而得封必復要而求貢求市朝廷將何以處之今當事之議欲令倭盡歸島不留一兵朝鮮以聽命顧彼方肆無忌憚又安肯收兵還國憣然順從臣恐不能得此於彼也即使暫時退兵旋復入寇敗盟之罪又將誰責耶議者多謂封貢不成倭必大舉不知秀吉妄圖情形久著封貢亦來不封貢亦來特遲速之間耳伏乞明詔天下以倭酋平秀吉干犯天誅必不可赦之罪兼諭日本諸酋以擒斬秀吉則有非常之賞破格之封朝廷不封凶逆之夫而封其能除凶逆者以此曉然令於天下然後姦雄喪膽豪傑生氣平秀吉不久當殄滅無難也臣以為今日之計莫妙於用間莫急於備禦莫重於征剿何者倭酋倡亂惟在秀吉一人諸州酋長面降心異中間有可義感者有可利誘者秀吉原無親戚子弟股肱心膂之人儻得非常奇士密往圖之五間俱起不煩兵戈而元凶可擒故曰莫妙于用間備禦之䇿屢奉申飭亦嚴矣臣惟遼陽天津密邇京師一由朝鮮度鴨緑江而上一由山東海面乘風疾趨設有踈虞震驚宸極宜將東征之兵挑選分屯兩地以防不測各省直兵防更於今日嚴為整備俟其入寇或犄或角戮力殲之此不可恃其不來而一日懈緩者故云莫急於備禦然用間妙矣恐未可必得志於彼備禦急矣恐未能使破膽於我臣以為彼不內犯則已果其內犯大肆猖狂乞我皇上定議征討特發內帑百萬分助諸省打造戰艦二千餘隻選練精兵二十萬人乘其空虛㑹師上游直搗倭國此堂堂正正名其為賊敵乃可服者也故曰莫重於征剿或者謂興師逺涉為費不資臣計山東浙直閩廣備倭兵餉嵗不下二百萬積之十年則二千萬征剿所費不過一嵗之需而足若倭奴蕩平海防又可息肩各處餉銀可坐省其半一勞永逸未有若斯舉矣又聞元世祖舟師討倭溺十萬衆五龍山下談者恆為口實臣料世祖雖雄其實北人不諳海上形便當時將帥必多逹官彼以不習波濤不識風汛之人顛倒沈溺百萬何用今東南舟師必習波濤必知風汛無憂覆溺試觀沿海商民興販各國者百鮮失一故元事非所論於今日也夫人情畏倭而慮其來又株守而憚於往是以倭酋得恐嚇要求誠知備禦之䇿攻伐之謀不患其來復制其往兵志謂未戰而廟算勝者此舉是也臣非不知諸臣值時勢之艱從權變羈縻之術何敢輕為撓阻但灼知封貢非利不封貢非害敢效愚忠仰贊廟畫惟皇上斷而行之則順逆之分明華夷之防定久安長治之計從此可得矣論曰文告表狀古今之所馭夷大率盡此蓋暌則聯之以信服則懷之以仁梗則威之以兵行逺惟文傳信乃核讀此者愈以悟一張一弛之道而見同軌同文之徴矣東西洋考卷十一
