body:
  text: 東西洋考卷七明張燮撰餉稅考宋時發舶海上郡國有司臨水送之嘗登泉山見刻石紀嵗月甚夥爾時典綦重云閩在宋元俱設市舶司國初因之後竟廢成𢎞之際豪門巨室間有乘巨艦貿易海外者姧人陰開其利竇而官人不得顯收其利權初亦漸享竒贏久乃勾引為亂至嘉靖而弊極矣二十六年有佛郎機船載貨泊浯嶼漳泉賈人往貿易焉巡海使者柯喬發兵攻夷船而販者不止都御史朱紈獲通販九十餘人斬之通都海禁漸肅顧海濵一帶田盡斥鹵耕者無所望嵗只有視淵若陵久成習慣富家徵貨固得稇載歸來貧者為傭亦博升米自給一旦戒嚴不得下水斷其生活若輩悉健有力勢不肻縛手困窮於是所在連結為亂潰裂以出其久潜蹤於外者既觸網不敢歸又連結逺夷鄉導以入漳之民始嵗嵗苦兵革矣四十四年奏設海澄縣治其明年隆慶改元福建巡撫都御史塗澤民請開海禁准販東西二洋蓋東洋若呂宋蘇祿諸國西洋若交址占城暹羅諸國皆我羈縻外臣無侵叛而特嚴禁販倭奴者比於通番接濟之例此商舶之大原也先是發舶在南詔之梅嶺後以盜賊梗阻改道海澄隆慶六年郡守羅青霄以所部雕耗一切官府所需倚辦里三老良苦於是議徵商稅以及賈舶賈舶以防海大夫為政萬歷三年中丞劉堯誨請稅舶以充兵餉嵗額六千同知沈植條海禁便宜十七事著為令于時商引俱海防官管給每引徵稅有差名曰引稅東西洋每引稅銀三兩雞籠淡水稅銀一兩其後加增東西洋稅銀六兩雞籠淡水二兩每請引百張為率盡即請繼原未定其地而限其船十七年中丞周寀議將東西洋賈舶題定額數嵗限船八十有八給引如之後以引數有限而願販者多增至百一十引矣其徵稅之規有水餉有陸餉有加增餉水餉者以船廣狹為凖其餉出於船商陸餉者以貨多寡計值徵輸其餉出於鋪商又慮間有藏匿禁船商無先起貨以鋪商接買貨物應稅之數給號票令就船完餉而後聽其轉運焉西洋船面濶一丈六尺以上者徵餉五兩每多一尺加銀五錢東洋船頗小量減西洋十分之三陸餉胡椒蘇木等貨計值一兩者徵餉二分雞籠淡水地近船小每船面濶一尺徵水餉五錢陸餉亦如東西二洋之例加增餉者東洋吕宋地無他産夷人悉用銀錢易貨故歸船自銀錢外無他攜來即有貨亦無幾故商人回澚征水陸二餉外屬吕宋船者每船更追銀百五十兩謂之加征後諸商苦難萬歷十八年量減至百二十兩每嵗夏仲至秋中風汛届期賈客揚帆歸抵海外經過南澚浯銅諸寨及島尾濠門海門各巡司隨報餉館逐程遣舟護送以防寇掠實欲稽察隱匿寶貨云自萬歷四年餉溢額至萬金刋入章程録至十一年纍增至二萬有餘二十一年倭寇朝鮮閩以震鄰禁止通販海上人輒違禁私下海或假借縣給買穀捕魚之引竟走逺夷中丞許孚逺深念之恐復為變如嘉靖時移檄招諭凡留販人船不論從前有引無引日逺日近俱許駕回詣官輸餉如故事凡私通及壓冬情罪一切宥免於是越販商人胡臺謝楠等二十四船聞撫綏令皆駕船回澚二十二年餉驟溢至二萬九千有竒此因逆而順收之者也其後當事疑稅餉贏縮防海大夫在事久操縱自如所申報不盡實録議倣所在𣙜關例嵗擇全閩府佐官一人主之及瓜往還示清核毋専利藪而泉人以兵餉匱乏泉觀察議分漳販西洋泉販東洋各畫隴無相攙越欲於中左所設官抽餉如漳例漳郡守持之謂割漳餉以給泉兵則漳餉當匱且有不漳不泉夤緣為姦者將奈何奏記力言其不可獨𣙜稅不屬海防官聽上裁詳文略曰本府軍需往往告匱即隆慶間開設舶稅僅數千金萬歷間增至萬兩以此佐之猶且不敷動請司餉濟急往牒具在也逮十三年增稅至二萬餘兼以尺土寸田凡屬官者靡不括以充餉即鐵罏牛行渡船漁稅摉無遺利始免仰給司牧然亦必盡數追完方克有濟見在十縣餉額共三萬七千七百九十餘湊船稅二萬餘大都六萬上下而水陸官兵月糧修船置器犒賞諸費嵗不下六萬如二十一年禁海餉詘則括府縣帑藏支用豐有贏餘積藏於庫哉餉在漳則漳利餉在泉則泉利其便均也漳餉匱則請在漳泉餉匱則請在泉其不便均也今欲東西洋分屬漳泉割漳餉以贍泉兵不惟漳之兵食無從措給從此私販之徒緣為姦利不漳不泉東影西射公然四出不可究詰者又什百於昔日本府籌之未見善畫在彼府計其無弊何如耳於是漳泉分販議罷不行而上章請改設餉館給關防㑹二十七年上大𣙜天下關稅中貴人髙寀銜命入閩山海之輸半搜羅以進內府而舶稅歸內監委官徵收矣時議委三司首領一員與委官合管正稅外索辦方物費復不資諸虎而冠者生翼橫噬漳民洶洶賴有司調停安輯之不大沸時郡守韓擢澄令龍國祿也三十四年有㫖封閉礦洞各省直稅課有司照常征解命甫下海內方欣欣忭舞而所在稅監仍奏請轉解及辦進方物且言稅歸有司奴輩無所事事乞召回于是㫖紛出先後互異稅銀准解工部又總解稅監分進內庫方物准折辦又敕該監照舊辦進其布政司銀既彚解而稅監者又欲州縣有司徑解及代辦方物有司莫知適從紛然久之藩司具咨户部請畫一而部咨回覆以藩司一邦之主若金花稅糧等銀何莫不由藩司而州縣敢於徑解乎近者南贛巡撫題奉明㫖各處稅課都著類總解稅監分解應用是各處者指各省直言也類總解監者明命布政司類總也若由州縣徑解當云各解何須類總為乎方物乃稅監芹曝之誠非有司貢獻之禮撫臣既題准折辦及措處加平等費續奉明㫖照舊辦進並未有有司備辦之㫖謹始慮終正在今日亟當移㑹該監備將歷來明㫖開導其詳使知類總二字㫖意昭然徑解之舉終屬悖謬矣自是議稍定當事復申前餉官之議以海澄洋稅原議輪委各府佐徵收但外府官逺來住劄非便而增設供應人役所費倍繁不若于本府佐剌五員嵗委一員管理事無専屬既於原議不悖且于事體為宜當路報可於是本府官承委嵗一更代云四十一年上採諸臣議撤寀鐺還詔減關稅三分之一漳稅應減萬一千七百當事悉罷五關雜稅獨以洋商羅大海之重利即不減猶可支持僅蠲三千六百八十八兩然不可謂非聖世洪洞之恩也夫賈人占風犯濤博十一於鱗介之國幸而取贏逺望故里關山欣同隔世有續命縷乃墨者既慿髙攫之黠者豪者又從旁百計浚之情倍可憐當議蠲時主者曰孰使之走不測風濤與蛟龍爭命也比於征賤丈夫不必議此亦未足服商人之口要以弊竇開而無變計則中閹雖撤遺毒尚沿賦雖減猶未減惟是上下相維美意行其良法使害馬既去鮫泣長收縱蠲少猶多也四十四年推官蕭基署郡符蒿目商困條上恤商釐弊凡十三事看得海澄餉稅初僅三千其後增益至萬又加倍之逮中使專𣙜始盈二萬七千近奉恩命減三分之一議減三千乃蠧弊未滌颶害連遭商人羽毛剝落行道相戒給引日少將來餉額愈不可支及今不為釐正上下交病安所底止請先言其害而後規其便可乎一曰官害夫倉巡下屬逢船至營求差使如田夫逐鹿一有奉委驟以富名稱驗查而常例不資稱押送而常例不資稱封釘而常例又不資夫餉船動載數千擔旬日盤量不能殫其數即賢者亦不克勝而况鼴鼠之腹止計充囊者乎又况狡者桀者賣放指嚇倍索常例之外尤有足未到船鏹已充盈者乎故差官是瘠商之蟊賊也一曰吏害夫衙役之橫無如餉館之甚上以嘗官下以蝕商報貨則匿其半而輸半直於吏書量船則匿其一而酬其二分於吏書喜則嘯席怒則張鴟甚至官壞而吏仍肥餉虧而書悉飽皂快人役同類分至慘焰異常故衙黨是殘商之蜂蠆也一曰姧商之害夫一船商以數百計皆四方萍聚霧散之賔而聽命於商主受壓於船主彼操頥指之柄先從外洋派斂衆商從一科十從十科百動稱使費代為打㸃而市棍包引之徒分門别户以相表裏衙胥狙獪之雄絲牽繩聨以相應和彼各艙之商拋命圖財詎堪魚肉有委貨於中流以求脫免者故積年操柄是削商之刀鋸也三害不芟將見吏書以積包者為市包棍以船主為市船主又以商梢為市其究商絶民困餉虧計窮浸漸以往又不止今日之情形也為今日計商人寬一分則受一分之惠諸蠧減一分則省一分之害釐弊拯急無出此二言矣謹據臆參訪輿論酌為規條凡議十三以聽採奪一議水餉水餉以梁頭尺寸為定載在成冊而商人往往尅減尺寸官亦利其加增而重科之吏書人役百般詐索姧弊莫清今酌以十月修船時餉官躬詣從腹濶處看量尺寸編記天地𤣥黃字號以某船往某處給引其同澚即照字號規則依納水餉不必復量梁頭其約省商費固無量也在餉官雖以今年理來年之船然互相代稽事所宜然賢者自不惜以一勞而杜百擾今春除巳駕發外議以今秋九十月始一議復印信官單之規原給引時商船量報梁頭登引而本海道發印信官單一本發與商人以備登報答艙貨物遞送掣驗如所報有差錯船沒官貨物斤數不同貨沒官此厲禁也重以道印之冊至嚴崇也誰敢犯之邇因內監套官單付餉館書吏命各商先替草單吏書從中任其加增商欲不減報貨物不可得者是穢叢也合無請復舊規將道印官單於請引時發下商人令諸在船散商親填貨物多寡如不能書者即寫代筆某人與主商梁頭濶狹備造官冊隨送隨驗隱報者如律究治亦釐弊清商之急務也七一議出水免委官驗船洋船多以百計少亦不下六十隻列艘雲集且髙且深委官二員竭力莫勝適以飽索常例止矣而姧商藉經驗護送之名益便於放膽犯載是滋害也夫一船一商主司之即散商負載而附者安能逃其耳目合無專責一人仰船至親遞甘結同港諸船主共相保結嚴以一體連坐之律又廣開首舉之門能首實者給重賞如此責命必鮮有犯者而出水雜費杜矣商已當受其利矣故委驗之官斷可已也防一議入港先委官封釘封釘前無此例近年始有之漏貨也然滔滔洋波何地不可匿載何必入港而封之適以飽官差之需索乎只宜嚴禁地方套小艇先出海外接載餉貨須命巡欄澚甲之人防之然假巡緝名色駕船者多是漏載之姧應示禁巡欄澚甲之船在大擔內者只就海畔瞭望不許近泊商船在本港者從溪邊巡視不許在商船邊往來倘商梢登岸止用小艇渡載而搜檢有夾帶貨者究沒其巡欄澚甲人役如三五成羣生事指騙者亦究治此法三令五申未必不可以杜漏貨而蠲商害也凜一議禁加起夫匿貨漏稅應盡沒官律有明禁至凜也自有加起之名而商人始不得實報留其餘以待加起於是明用錢少暗用錢多如報道本船一千擔其加起作一千二三百者有之甚則加起作一千五六百者有之是官與商為市也此加起者歸何手乎而考成徒以虛報故事登冊宜額餉之虧失也合無照舊規貨物逐一開報有加起者以漏貨論大書告示使民遵守商貨盡數開填餉額必有羡無失即船寡之年無虞乏矣故革絶加起與梁頭加增者並禁於以絶乾沒社衙蠧足國餉有三善焉一議驗船後船貨二稅船貨二稅俱從在船貨物多寡精粗勻科命艙商自稱以防船主多科之弊邇因有常例有加增有果子銀有頭鬃費名色不等俱從商首取給任其科索東洋船有斂三百餘金者西洋船有斂四百金者悉歸商首操縱不止餉一費一甚餉一而費二矣衆商為喉主商為腹怨聲載道率此之由自今以後合無容艙商自納自稱倣收糧銀之法投入匱內商首不得科索止命銀匠數人驗銀足色限十日內通完違限者方指名差追不得混票更嚴禁管餉收餉人役掯索情弊亦蘇小商而杜姧商之一端也一議禁包引給引時積年市猾每每包引包保至五六船者串慣主商倡言給引費至數十兩而後來諸商自給引者只得如數出費彼且從中瓜分及船回銷引時又倡言費銀數十兩而後之銷引者只得如數出費彼又從中瓜分此輩坐富作姧已久甚至揑名給引虛造僯結將引移東轉西賣與越販如朱彩德等其證也近略訪鄭心齊等究治外今後引從商人自給保取里僯實保無容包同衙役作弊犯者重治以清市猾一議洋船隨至隨驗以便起貨海舟入澚跋涉久而幾壞裝載重而甚危而巨颶時作覆沒堪虞乃衙門吏胥不飽欲壑不為稟驗以致風水叵測閣破濕漏如前年之秋可鑒也自後船至即行抽驗限以三日為期不得踰期刁難違者究治所謂早一日得一日之便者也印一議蘇逰兵之害洋船啓行既有經館驗船經縣蓋抱引出洋法綦密矣何必更用厦門司蓋印復添設浯銅逰之盤詰乎夫盤詰所以防四月後踰期之船杜越販也今一槩嗜為利孔盡行留難總哨目兵次第苞苴藉聲掯詐阻滯拖延是費商也亦厲商也合請示禁一議復失水壓冬之船免徵餉銀失水者人貨俱付之奔濤而勒追者復向迫之誅求其家人父子於斷腸招魂之餘株連親黨波及侣傍此近日之苛政也自今以後如失水被劫之情形既核同港僯澚之公結不虛應寬免以恤逰魂至壓冬而索水餉者向無而近有之為不無假道走倭之虞耳然多有中途飄泊歸來無期者應從寬免如不得已于餉乏時只宜先徵一半留其餘以待來歸不得一槩并索則舊規所宜酌復者此為亟矣一議洋餉充額以六十船為率夫每年徵輸大似貢法無論嵗之豐缺船之多寡廣收不益數詘不減何不平也今約餉館六十隻即可足額其溢出者隨多寡申報徵銀儲府以備公用或留異日補乏之資逐年仍送查盤以便稽實如每年船出六十下者亦少然就給引之時可量酌之取數果少不過從西洋吕宋二處船隻稍稍增補權宜申請以無失額亦不為厲此乃萬一之遇在司餉者相機裁之耳間一議餉館吏書餉館吏書舊從府撥吏二書四而中幫附不知其幾矣乃司餉官勢不能不攜人役跟用此皆朘商之膏而蔽上之窠也且府役權難約束不無掣肘之形若本役獨為任使適多駢指之纍矣合無餉吏二名自本府發其書手即就餉官衙役取去止許四名而止庶鈐束自由功罪有歸而衙黨亦差汰矣銀一議禁主商科斂方物近查蔡美一船簿開出方物百十兩而冊載僅半之餘蓋未可量算矣且物貨原有定價聞平易之未聞其酷索之也總之官市一吏書市二矣書吏索一主商又斂二矣重重徵削皆商膏也應宜切禁船主不得藉此項名色科斂衆商即有應用之貨平交公買其價值載在成册可依不然中使藉上供之名窮搜異貝哀號方熄可令人已去而弊猶踵乎何得不就今釐革也分守參知洪世俊力贊之條上中丞臺若直指悉報可俾垂令甲舶事有重大難決者悉詣府決之而餉大夫亦凛凛奉德意惟謹賈人子各得意去譬之旱魃之後而登泰岱值觸石之吐雲矣若通倭之禁向嵗稍弛廷臣章數上近乃嵗嵗申飭犯者戮不待時然禁嚴而倭患尚劇此又司關者所不得問也水餉萬歷三年提督軍門劉詳允東西洋船水餉等第規則時海防同知沈植議詳船濶一丈六尺以上每尺抽稅銀五兩一船該銀八十兩一丈七尺以上濶船每尺抽稅銀五兩五錢一船該銀九十三兩五錢零一丈八尺以上濶船每尺抽稅銀六兩一船該銀一百八兩一丈九尺以上濶船每尺抽稅銀六兩五錢一船該銀一百二十三兩五錢十二丈以上濶船每尺抽稅銀七兩一船該銀一百四兩銀二丈一尺以上濶船每尺抽稅銀七兩五錢一船該一百五十七兩五錢二丈二尺以上濶船每尺抽稅銀八兩一船該銀一百七十六兩銀二丈三尺以上濶船每尺抽稅銀八兩五錢一船該一百九十五兩五錢百二丈四尺以上濶船每尺抽稅銀九兩一船該銀二一十六兩二丈五尺以上濶船每尺抽稅銀九兩五錢一船該銀二百三十七兩五錢百二丈六尺以上濶船每尺抽稅銀十兩一船該銀二六十兩販東洋船每船照西洋船丈尺稅則量抽十分之七陸餉萬厯十七年提督軍門周詳允陸餉貨物抽稅則例萬歷三年陸餉先有則例因貨物髙下時價不等海防同知葉世德呈詳改正胡椒每百斤抽稅銀二錢五分銀象牙成器者每百斤稅銀一兩不成器者每百斤稅五錢蘇木東洋木小每百斤稅銀二分西洋木大每百斤稅銀五分銀檀香成器者每百斤稅銀五錢不成器者每百斤稅二錢四分稅竒楠香稅銀二錢八分器犀角每十斤花白成器者銀三錢四分烏黑不成者稅銀一錢沉香每十斤稅銀一錢六分錢沒藥每百斤稅銀三錢二分玳瑁每百斤稅銀六肉豆䓻每百斤稅銀五分錢氷片每十斤上者稅銀三兩二錢中者稅銀一兩六下者稅銀八錢燕窩每百斤白者稅銀一兩中者稅銀七錢下者稅銀二錢每鶴頂每十斤上者稅銀五錢次者稅銀四錢蓽撥百斤稅銀六分黃蠟每百斤稅銀一錢八分畨鹿皮每百張稅銀八分雀子綿每百斤稅銀四分被每床一分二釐孔尾每千枝稅銀三分每竹布每匹八釐大嘉文席每床稅銀五分畨藤床稅銀一分風子每百斤稅銀二分檳阿片每十斤稅銀二錢釐交址絹每匹稅銀一分榔每百斤稅銀二分四水藤每百斤稅銀一分分白藤每百斤稅銀一分六釐藤牛角每百斤稅銀二牛皮每十張稅銀四分黃每百斤稅銀一錢六分分黑鉛每百斤稅銀五分分畨錫每百斤稅銀一錢六畨藤每百斤稅銀二六釐烏木每百斤稅銀一分八釐珠紫檀每百斤稅銀六分撔每百斤稅銀一錢母殼每百斤稅銀五分紫畨米每石稅銀一分四釐四降真每百斤稅銀四分四白豆䓻每百斤稅銀一錢分血竭每百斤稅銀錢二孩兒茶每百