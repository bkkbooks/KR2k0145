入港而私接濟者有接濟後而匿報者甚欲并其稅而滅之者即今盤驗數船除物貨外每船載米或二三百石或五六百石又有麻里吕船商陳華滿船載米不由盤驗竟自發賣問其稅則曰規則所不載也訪其價則又夷地之至賤也夫陸餉照貨料算船盈則貨多貨多則餉足今不載貨而載米米不徴餉不費而獲厚利孰肯載貨而輸餉乎誠恐貪夫狥利後不載貨而載米國課日以虧也查規則內畨米每石稅銀一分二釐今此米獨非畨地來者乎今後各商船內有載米五十石者准作食米免科凡五十石外或照畨米規則或量減科徴庶輸納惟均而國餉亦少補也督餉職官本府海防同知相繼署稅務凡七人羅拱辰廣西馬平人舉人隆慶三年任清軍同知後以才望改海防隆慶六年稅務初起公首膺斯任議留稅銀若干築城圭㠘城凡八面以象八卦名曰神石龜負圖其後卒官吏民惜之萬厯間城為豪所毁驅其去至今海波微警始議更築轉思羅公之勳矣沈植湖廣臨湘人萬厯元年任三年當路請舶稅以充兵餉公條海稅禁約十七事當路才之後擢廣東僉憲周裔登廣東南海人辛未進士萬厯七年任後擢闕部員外郎民有平恕之思姚應龍浙江慈溪人舉人萬厯十三年任公磊磈多英御事胸有成局後中讒去竟祀名宦葉世德浙江溫州人舉人萬厯十七年任後擢王長史王應乾廣西馬平人舉人萬厯二十年任舒九思浙江奉化人舉人萬厯二十一年任久之論劾罷去當路始疑舶政為防海大夫私物而輪管之議起矣各府佐二官委署餉務只一人趙賢意浙江東陽人乙未進士授邵武府推官以能聲最諸郡來督漳餉時萬厯二十六年也未幾中貴人橫操利權各府佐遂罷遣本府佐二官輪署餉務凡十二人事歸有司後議以本府輪管不復借材他郡杜獻璠南直上海人舉人清軍同知署三十四年餉是時商人稍脫稅璫之苦而公華胄起家不妄取豫擢宗正大夫人為立碑郡人副使鄭懷魁撰凝侯展驥霞中濯鱗海甸虞廷九載漢吏任專夜燭清晨鳥化警軍籍清核而轅門無脫巾之號考校貞嚴而楚庭無寃玉之恨其最著者督餉吾澄率多惠政彼逃命于龍堆鱗谷之險爭息于蝸角蠅頭之間者得侯如得艾也單車詣船城社塞漁獵之竇諸餉投匱豪猾絶乾沒之階馬如羊金如粟箕斂幸見息肩門如市心如水貂璫為之奪氣貨無逗遛商稱便利南陽杜母政在今日如晦王佐不蔡可知矣兹擢宗正大夫行以親民者入而展親以佐郡者轉而佐國又豈特一方之惠向陽之春也耶鄭僑功成宜播輿人之誦羊祜德厚永垂峴首之思共勒貞珉爰志不朽沈有嚴南直宣城人舉人海防同知署三十五年餉公強直自遂風骨稜稜而舶政乃更平易賈人安之鍾顯江西定南人歲貢督捕通判署三十六年餉後被劾罷去陳欽福江西南豐人舉人督糧通判署三十七年餉公門市心水在脂不潤擢廣東提舉商人至今思之吕繼楩浙江新昌人舉人督捕通判署三十八年餉公溫然長者所在與名流酬和盛有篇章其為政詳練周至嘗陳餉事十議兩臺命懸象魏以示來兹商人立石頌德郡人宫保尚書戴耀撰夫澄東南偏一澨也民故鮮耕種之饒以海為田始歲輸不踰九千既中使至竭澤漁矣民安土任貢猶將撫其凋敝况危生以供上乎必實與以長便俾上不病國下不病商可永垂無擾者而後為軫念之至若我吕侯其人已侯浙東之博聞有道術者也嫺于經濟聲華燁然倅漳未期月而案牘神恬萑苻迹掃當塗者亷其賢屬之餉務當是時也澄雲霓侯而侯亦雨露澄曰風濤叵測東西岐島有發不及至者至不及返者返不及有貨者餉其能如額乎即可如額而諸為餉病者弊竇種種計餉則不得不計弊矣蒿目焦思條其欵十上于兩臺藩臬皆報可而侯得一意行之諸不便國不便商者一切報罷於是船得從實報報得從實驗驗得從實納有不督責而自輸者較曩額加溢焉餉事竣商人私相告語曰吕侯十法吾商人生命也創行利可近習行利又可逺易人而行易紛異時而法又易廢且奉公者所便抑又營私者之所不便也以為便楫不上下鼓以為不便方圓左右畫矣吾儕何知梗商者惟恐一日興便商者惟恐一日廢耳遂相與叩臺使者請曰得此法與賈舶常相維不惟議法者德抑亦主行法者德也夫法少不便必有尼之者今而後俱得請也長便可知已以燭弊如鏡照以釐姧如剸犀以凜積猾如立之氷谷以便賈航如負之春暄以垂憲來兹又如衡之平輕重低昂咸取則焉石可泐此法不可朽也爰勒貞珉以視來者其十法劃然夫已另編之餉署之前侯字思楙由鄉進士兩令邑三守州今任清漳别駕其世家尤多顯仕云龔朝典湖廣臨湘人舉人海防同知署三十九年餉以墨論罷張應奎湖廣蘄水人甲辰進士推官署四十年餉後卒于官邵圭浙江餘姚人舉人清軍同知署四十一年餉公長才亮識傾心俊流其督餉自足額而外多從寬政商人德之立碑頌美後左遷商人無貧富悉致厚贐公好語謝卻之商人流涕而别郡人御史林秉漢撰貝閩古澤國也澄之賈淫於海指南所至纍譯而通紫文甲之玩異香華毳之竒耀宇內而飾天府歲益縣官芻挽費九千緡中貴人至倍征三之幾與中原大都㑹埒矣緹騎絡驛畫攖方物氷蠶火浣不盡入內供而以資旁獵市豪猾胥又橫吸焉茫茫大壑真成苦海孰駕慈航而濟之者則邵侯其烈哉侯奕世載德家著宦譜先司寇名蹟彪炳玉昆金友淵源漸矣頃廣德最遷二吾郡郡即繁劇乎而咄嗟治辦賈其餘力旁兼數篆捷舉若承蜩當道嘉之更以澄餉屬侯侯甫視事詳詢商民便苦有虎翼狐假藉上供而恣魚肉者乎有積猾作姧乾沒不可詰者乎有誣越禁以恐嚇而借有力為吞舟者乎盡得某利某害狀條請兩臺諸蠧病商者悉屏絶永勿令蹂躙衆悉感悅歌何暮焉届期風便浪恬羣艦雲屯侯隨至隨閲以所報簿書為徵以所頒衡尺為凖要以歲輸如額而止毋增羡毋苛責毋淹時日毋繁訟牘有沒而逋餉者憐其拏勿督賦自登而下不擾一切駔猾孰得侵牟其間為商患苦者哉君子是以謂侯識之朗也其於利病靡不晰也才之贍也其於紛糾靡不解也守之勵也其於膏脂靡不淨也惠之普也其於卵翼靡不周也蓋二郡而理兼篆而理署餉而又理使人並歌舞而尸祝之異時足要津而手盤錯將與先司寇伯仲輝映何必減驃騎哉余里居聞侯政最稔而商民乞余言勒諸石夫餉署若傳舍然閲人多矣幾能令萬心悅而萬口頌者而于侯獨著然則直道何嘗不在人而上之馭之者與其賄而沒沒何若使人謂子實生我而令名之垂以不朽也余不文爰次口碑紀之以表好德之公且勸後之受餉事者知所慕尚云爾盧崇勳廣東增城人舉人海防同知署四十二年餉公蒞事清謹既滿人為立碑邑人御史周元起撰神聞之利器非盤錯不顯而剸犀斷蛟則純鈎之用始澄故難藪也民以海為禾猶穡人以禾為禾當連轖結艛捆載而歸持籌不煩以供上方額易易耳不者而難易半或期至而洋舶有至未至或過期乃至猶可東支西補雖煩籌而額無虞不足何居乎澄今年餉也澄舶每乘觱發去乘薰來是年七月將望薰風變為淒其舶至僅什之二徵輸幾何望後稍鱗次至而餉篆改委之議下矣議未定為八月五日是夜異風挾雨怒號無一刻停空中如簸詰朝視之拔木發屋而數十萬洋貨一颶立盡傷哉舟待颶乎颶待舟乎公冒雨亟省之災民駢首雨衣環公泣公亦泣亟馳檄請蠲顧上額近奉明赦業減三分之一而必復減之不益難之難乎雖巧婦安能噓無煙之銼蒸無米之炊也公毅然曰事不辭艱且惡乎辭之則亟按本年籍常例秋毫弗入正賦杪忽勿漏一切均輸以佐餉額則覆按往年籍黠者毋久逋殷者毋幸免一切竝徵以佐餉額則豫按來年募商人量徵水餉將來舶至免重徵蓋其始民若磎既而知上額之必不可減催科之即為撫字衮甫之歌已繼麛裘而作矣嗟乎大盈內貢山賦海視彈丸餉鍰太倉梯米耳夫烏知公固粒穫寸掇稊米而登之太倉乎哉是月也觱發又至而賦成清風兩袖飄然還署令治辦人人如公豈憂難事哉蓋公所難與易所難者如此其它治狀已載口碑中兹不具贅江一雷山東即墨人例貢督糧通判署四十三年餉丘建經廣東汝源人嵗貢督捕通判署四十四年餉王起宗應天上元人官生督糧通判署四十五年餉公溫秀朗暢興利除弊之際綽有成緒而所部不擾商人謀為立碑郡人㑹魁林茂桂撰相環㝢皆商也獨澄之商舶民間醵金發艅艎與諸夷貿易以我之綺䊵磁餌易彼之象玳香椒射利甚捷是以人爭趨之第其出也凌飈破浪與天吳九首博命其返也頭㑹箕斂不勝噬血吮膚之慘是以人又爭患苦之視中土之商輪楫優遊利害勞逸奚啻霄壤理餉先屬海防今議於郡佐中嵗委一員稱曰餉館嵗丁巳我王侯以半剌承檄理其事侯金陵世家也才若流雲慧若然犀一覩簿單胸中便自了了接諸商務節省簡便如舶初進港苦驗發稽遲未免漂損侯登時往驗風雨不辭便一先時每委役將貨物稱明而後請驗乾沒無算侯既躬核斯竇隨塞便二今嵗紅毛酋為梗舶貨被掠僅存其半餉若全徵其誰堪之侯就中量派許其半徵梗三至久畨漏報法應株及通船沒官侯只著漏者充完餉額不用楊便四其餘藉口上進方物減值強市額外橫征者一切明禁便五間有全舟覆沒往時征餉如故侯亷其實狀務從寬恤便六蓋侯心切惠商而拘束左右甚嚴檢防宿蠧甚周是以諸商議伐貞珉以紀不磨而介不佞一詞也蓋侯嘗署余邑矣其為政勤而彊練而密簡而不煩刑罰平恕罔不沐浴其膏露者夫圭海之商即梁山之民也民有去思商有忭儛侯豈特無忝官常直不負家聲哉宜為頌頌曰大海東濤湧波沉島夷碁列氛霧滃淫念此海賈趨險莫禁一葉為畝指南為針濟邊取給匪今斯今不畏鯨侮而畏漁侵天惠此邦屛星聿臨琉璃為照香蓮為心泛泛者舶其至如林一切衆生波羅蜜斟歡呼告語我席我袵虎蓋齊髙龍門嫓深召公是似芾棠載陰刻篆豐碑後來所欽公署督餉館在縣治之右即靖海館舊基嘉靖四十二年新設海防改建為海防館萬歷間舶餉輪管因改為督餉館無四十五年通判王起宗以餉館驗船舊往厦門厦門駐劄處所議於圭嶼再建公館一區於驗船為便奏記申請其略曰商船出海向屬浯銅官兵於厦門盤驗始放開駕近改委各館輪驗職冬春之間已驗放出洋身履其地始知不便者三故易地設館之議不得不為之請也夫厦門原𨽻泉州為浯銅汛地職等非隨波上下者此必駐公館方可譏盤厦門原設參府海防二署當洋船開駕正春汛防海之㑹參府及泉州防館駐劄職詣其地既無空閒公廨又難借擾民居不便者一况漳州官逺涉泉境既非所轄之地又無服役之人勢難單騎褁糧而跟隨人役不下數十人若渙散民居殊非關防體統不便者二且本府至厦門兩經潮汐衝突波濤一遇風則輕舟難泛時日稽遲商船不無耽閣不便者三職往來洋上相地度形圭㠘一山浮於海口環山皆海適在中央乃商船必由之路又澄邑所屬之區且今築造城堡其上添制兵船其下職議於圭㠘設立公館將來盤驗即駐本㠘船之出洋也既可稽查船之回港也亦便瞭望不越出於他境不阻隔於風濤雖易地不同及譏察則一此職目擊而身歷者俯候詳示另議設處估計工料覆詳亦一勞永逸之計也論曰司關掌國貨之節以聨關市此周制也漢時商各以其物自占率二千而算一軺車二算船五尺以上一算匿不自占占不悉沒其緡錢告者以半卑之從此網綦密矣市舶之設始於唐宋大率夷人入市中國中國而商於夷未有今日之夥者也夷人來市似乎以逸待勞然鱗介窺我版圖紛然其擾不若自此之彼境內永清開舶以來垂數十載𣙜額之時贏時縮𣙜司之誰濁誰清𣙜政之遞因遞革據牘覆按抑可深長思矣東西洋考卷七
