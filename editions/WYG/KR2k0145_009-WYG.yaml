body:
  text: 東西洋考卷九明張燮撰舟師考海門以出洄沫粘天奔濤接漢無復崖埃可尋村落可誌驛程可計也長年三老鼔枻揚㠶截流横波獨恃指南針為導引或單用或指兩間慿其所嚮蕩舟以行如欲度道里逺近多少准一晝夜風利所至為十更約行幾更可到某處又沉繩水底打量某處水深淺幾托方言謂長如兩手分開者為一托賴此暗中摸索可周知某洋島所在與某處礁險宜防或風濤所遭容多易位至風静濤落駕轉猶故循習既乆如走平原蓋目中有成算也舟大者廣可三丈五六尺長十餘丈小者廣二丈長約七八丈弓矢刀楯戰具都備倅遇賊至人自為衞依然長城未易卒㧞焉造舶費可千餘金每還徃嵗一修輯亦不下五六百金或謂水軍戰艦其堅緻不及賈客船不知賈舶之取數多若兵艦所需縣官金錢僅當三之一耳每舶舶主為政諸商人附之如蟻封衞長合併徙巢亞此則財副一人爰司掌記又總管一人統理舟中事代舶主傳呼其司戰具者為直庫上檣桅者為阿班司椗者有頭椗二椗司繚者有大繚二繚司舵者為舵工亦二人更代其司針者名火長波路壯濶悉聽指揮書雲有常占風有候此破浪輕萬里之勢而問途無七聖之迷者乎内港水程海澄港口舊名月港隆慶六年奏設縣治此間水淺商人發舶必用數小舟曳之舶乃得行計一潮至圭㠘圭嶼屹立海中為漳之鎮邑人御史周起元力請當道建塔其上并構天妃宫文昌祠大士閣監司郡縣悉捐俸佐工諸商亦共襄盛舉濤門淜湃頓爾改觀近又以海宼微警築復舊城并設逰兵以固吾圉商船甫出水便過此中近議餉大夫就此盤驗半潮至中左所中左所一名厦門南路叅戎防汛處從前賈舶盤驗于此驗畢移駐曾家澚候風開駕二更船至擔門東西洋出擔門分路矣西洋針路鎮海衞太武山打水二十托宋圖經稱未有生人時太武夫人拓土以居其上有壇出大擔門半更船過此用丁未針四更取大小柑大小柑橘嶼内是銅山所欽依把總置寨於此船從外過内打水十五托外二十五托用坤未針三更取南澚坪南澚坪山南澚是漳湖接連處萬歴四年設副總兵鎮此築城周圍五百丈其外𤣥鍾寨屬漳柘材寨屬湖最稱重鎮坪山者逺望只一山近有三門西南邊一派沉礁與澚相連内打水十八托外打水二十五托舶從外過用坤申十五更取大星尖大星尖屬廣州東筦縣其内為大鵬所洪武間築城守之大星尖赤石甚尖故名内打水三十五托外四十五托用坤申針七更過東姜山東姜山對開打水四十五托其前為弓鞋山弓鞋山山如弓鞋様對開打水四十九托内外俱可過船其前為南亭門南亭門對開打水四十七托用單坤五更取烏猪山烏猪山上有都公廟舶過海中具儀遙拜請其神祀之回用彩船送神洋中打水八十托用單申針十三更取七州山七州山七州洋瓊州志曰在文昌東一百里海中有山連起七峰内有泉甘冽可食元兵劉深追宋端宗執其親屬俞廷珪之地也俗傳古是七州沉而成海舶過用牲粥祭海厲不則為祟舟過此極險稍貪東便是萬里石塘即瓊志所謂萬州東之石塘海也舟犯石塘希脱者七州洋打水一百三十托若徃交阯東京用單申針五更取黎母山黎母山在瓊州定安縣南四百里廣東通志曰五指山一名黎母生黎峒中五峰如人指屹立圖經云島上四洲黎母為主每辰巳後雲霧收斂則一峯聳翠挿天申酉間復蔽不見此南極星􅉭所降之地又云婺女星見此山因名黎婺後訛呼黎母虞衡志曰山極髙常在雲霧中黎人自鮮識之乆晴海氣清明見翠尖浮半空明丘濬詩五峯如指翠相連撑起炎荒半壁天夜盥銀河摘星斗朝探碧落弄雲煙雨餘玉筍空中見月出明珠掌上懸豈是巨靈伸一掌遙從海外數中原取用庚酉針十五更海寶山海寶山用單亥針及乾亥由塗山海口五更取雞唱門即安南雲屯海門也交阯東京一統志曰東至海西至老撾南至占城北至思明府又從七州洋用坤未針三更取銅鼓山銅鼓山廣東通志曰在文昌東北諸獠鑄銅為大鼓懸庭中讐殺相攻則擊此鼓到者雲集後瘞此山鄉人掘得之故名瓊州志曰銅鼓海極深險坤未針四更取獨珠山獨珠山俗名獨猪山瓊州志曰獨州山一名獨珠山在萬州東南海中峯勢髙峻周圍五六十里南國諸番修貢水道視此為凖其洋為獨珠洋舶人云有靈伯廟徃來祭獻打水六十五托用坤未針十更取交阯洋交阯洋唐沈佺期有渡海詩嘗聞交阯郡南與貫胷連四氣分寒少三光置日偏越人遙捧翟漢將下飛鳶北斗崇山掛南風漲海牽别離頻改月容鬢驟催年虚道崩城淚明心不應天打水七十托用坤未針取占筆羅山是廣南港口廣南漢為日南郡隋唐為驩州國朝為乂安府又從交阯洋用未申針三更取望瀛海口入清華港清華港漢為九真郡隋唐為愛州交阯為西京國朝為清化府又從交阯洋取小長沙海口入順化港順化港國朝為順化府又從交阯洋用坤未針十一更取外羅山外羅山逺望成門近看東髙西低北有椰子塘西有古老石船傍西行打水四十五托用丙午針三更取馬陵橋其内為提夷是交阯屬縣提夷馬陵橋打水二十五托内外俱可過舩南邊有礁出水用丙午針四更至交杯㠘即新州港口新州港國朝為新安府新州交杯㠘兩㠘相對如交杯狀故名内打水十八托用丙午三更取羊㠘羊嶼有小石塔好抛船内打水八九托外二十托南有羊角礁不可近用丙午針三更取煙筒煙筒山此交阯占城分界處也以狀似煙筒故名雖極澄霽亦頂上有氤氳氣用丙午針三更取靈山靈山星槎勝覽曰與占城山連接峻嶺而方有泉下繞如帶山頂一石塊似佛頭故名靈山徃來販舶於此樵汲崇佛誦經燃放水燈彩船以禳人舩之災更開打水六十托用單午針二取伽㑲貌伽㑲貌山港内有三㠘潮漲則不見山逺過打水十五托用坤未針五更由圭龍㠘取羅灣頭即占城港口占城國一統志曰東距海西抵雲南南接真臘北連安南東北至廣東舟行可半月程至厓州可十日程古名林邑唐名環王國後始名占城占城國羅灣頭打水五十托用坤申針五更取赤坎山赤坎山宋時占城王常避交人徙居兹山近打水二十托外十八托用單申針四更取鶴頂山鶴頂山打水二十五托洋中有玳瑁洲宜防若徃東埔寨由此分路用單庚四更取柯任山柯任山自赤坎沿山而行因風應變外任尋港用庚申針開有石爛礁在西南若行船放落㠘下開頭用單庚及庚申針看風讓髙收毛蠏洲毛蠏洲打水六七托舩頭對洲收入有三托水在淺内船恐犯洲尾淺要認毛蠏洲須見兩邊坤身頭﨑便是天畧清明潮水曉退在外任開舩東風小午到淺至午進港為妙東埔寨即古真臘地也又名占臘將至港俱是泥地故名占臘泥國人自呼甘孛智後訛為甘破蔗舶人又訛為東埔寨一統志曰東際海西接蒲甘南連加囉唏北抵占城又從赤坎山單未十五更取崑崙山崑崙山此非河源之崑崙然自海中一大名勝星槎勝覽曰節然瀛海中山髙而方山盤廣逺俗云上怕七州下怕崑崙針迷舵失人舩莫存用單庚及庚酉三更取小崑崙小崑崙兩邊有礁出水用庚酉及單酉八更取真嶼真嶼看成三山内過打水十四托泥地外過打水十八托沙地逺過只七八托便是假嶼水淺不可行只從真嶼東北邊出水礁南邊過舩用庚戌針五更取大横山大横山到此是暹羅界外過南邊打水二十五托為正路北邊水淺只五托水船在南邊見小横山小横山其山多樹打水十四托辛戌十更單戌十更乾戌十更取筆架山筆架山逺望形如筆架故云山下打水十四托開打水二十托壬亥五更取陳公嶼及黎頭山黎頭山西邊髙大東南稍低其内有嶼西北一派是石排山用壬子針五更取圭頭淺圭頭淺打水四十托用單乾三更取竹嶼竹嶼淺口打水四五托用壬子及乾亥沿山坤申尾即暹羅暹羅乃古赤土及婆羅刹地至本朝合暹與羅斛二國名暹羅一統志曰在占城極南又從崑崙山用坤申及庚酉針三十更取吉蘭丹吉蘭丹即大泥港口用坤申七更入港是大泥國大泥國即古渤泥也我朝貢道由福建入又從崑崙山取真嶼用辛酉針二十八更取六坤六坤暹羅屬國也其地與大泥相連又從崑崙山用坤未針三十更取斗㠘斗嶼用丁午針五更取彭亨國彭亨國一名彭坑單午五更取地盤山地盤山在彭亨港外外打水二十八托内四十四托三更至東西竺東西竺此柔佛地界也用丁未針十更取羅漢嶼即柔佛港口柔佛國一名烏丁樵林羅漢嶼有淺宜防徃來尋白礁為凖徃滿剌加從北邊過舩用庚酉五更入龍牙門龍牙門星槎勝覽曰山門相對如龍牙狀中通船田瘠榖薄男女穿短衫圍稍布擄掠為豪番船於此防之今人夜舶不敢行以其多盜且南有凉傘礁也中打水三十托北二十托南八九托又過淡馬錫門用庚酉及辛戌針三更取吉里問山吉里問山打水二十七托兩邊有淺用乾亥針三更取崑宋㠘崑宋嶼打水二十五托用單亥針五更取箭嶼箭嶼打水三十四托用乾戍針五更取五嶼五嶼先時酋開鎮於此此中有真五㠘假五㠘沿山而入為麻六甲麻六甲即滿剌加國也舶人音訛耳在古為哥羅富沙地又從東西竺用丙午針十更取長腰嶼長腰嶼北邊正路打水二十六托若徃丁機宜用坤申四更取獨石門獨石門出門用單酉針過鐵釘嶼鐵釘嶼其外水流急甚用單庚及庚申針四更至鱷魚嶼鱷魚嶼西是坤身晝南流而夜北流再進由第二港入是丁機宜國丁機宜瓜哇屬國又從長腰嶼用丁午針十更取龍雅大山龍雅山在馬户邊過用單午針三更取饅頭嶼饅頭嶼収入即是詹卑七更可到詹卑三佛齊人稱其國王為詹卑其國既為𤓰哇所破故王徙居于此因以名地七嶼從饅頭嶼駕開用丁午針三更到此又用丁未七更取彭家山彭家山用坤未三更取西南第二山有沉礁收坤申針收入舊港舊港即三佛齊故都也其先為干陁利國初時為𤓰哇所并改名舊港以别於彼之新村又從彭家山用辰巽針十更取進峽門進峽門用丙巳巡坤身七更見三麥嶼三麥嶼過嶼用單丁及丁午五更單未五更取都麻横港口都麻横港口中望一山名真不真假不假正路打水十七托用單午針十更取覽邦港口覽邦港口覽邦夷人好食人故舶無維纜者外有小嶼名奴沙牙近嶼打水八九托用丁午三更取奴沙剌打水十四托又用丁午針三更逺望錫蘭山錫蘭山港口即梁時所通狼牙脩也今訛為石旦隋常駿至林邑遙望見焉夷言髙山為錫蘭港口者亦就望見言之其實去彼尚逺青星槎勝覽曰地廣人稠亞於𤓰哇山頂産黄鴉鶻石紅寶石海旁有珠簾沙常取螺蚌傾入池中作爛淘珠貨之海邊有一盤石上印足跡長三尺許常有水不乾稱先世釋迦從翠藍嶼來登此足躡迹至今尚存歸永樂間其王來貢旋復負固不恭鄭中貴和虜其王上命釋之其後貢使歳以為常用洋中凢五嶼正門打水四五托丙巳針六更至下港下港即古闍婆在南海中者也亦名社婆至元始稱𤓰哇今下港正彼國亦巨鎮耳舶人亦名順塔再進入為咖􅖛吧又從滿剌加國五嶼分路入蘇門答剌用單乾針五更取綿花嶼綿花嶼第三灣正好過船打水七八托外二十托用單戌針過淺辛戌四更取雞骨嶼雞骨嶼對開打水六十六托有淺舩宜逺過用乾戌針十更取雙嶼雙嶼對開打水三十五托即正路所經也用乾戌并辛戌四更取單嶼單嶼内打水十六托外四十托用辛戌針十更認亞路亞路坤身打水三托洋中二十托用壬亥及乾亥針若離山用乾戌針十五更取巴禄頭巴禄頭其旁為九州山星槎勝覽曰林木叢生枝葉茂翠永樂間鄭