body:
  text: 東西洋考卷二明張燮撰西洋列國考占城占城古越裳地也秦林邑漢象林及區連殺縣令自立稱林邑王數世中絶外甥范熊代之子逸嗣逸死奴文簒立梁書曰文本夷帥范稚家奴嘗牧羊山澗得醴魚二化而為鐵因以鑄刀刀成文向石呪曰若所石破者文當王此國因斫石如斷芻槀文心異之范稚嘗使之商賈至林邑因教林邑王作宫室及兵車器械王寵任之後乃䜛王諸子各奔餘國及王死無嗣文偽於鄰國迓王子置毒漿中殺之脅國人而自立永和間襲破日南殺其守夏侯覽以屍祭天屯日南乆之梁書曰夏侯覽為太守侵刻尤甚林邑貪日南地肥沃常欲畧有之因民之怨遂舉兵襲日南殺覽以其屍祭天留三年乃還交州刺史朱藩遣劉雄戌日南文復屠滅之遣使告藩願以日南北境横山為界藩不許遣陶緩討之文歸林邑尋復屯日南文死子佛嗣屢為晉兵所破然亦世為交南患梁書曰佛立猶屯日南征西將軍桓温遣滕峻灌䆳帥交廣兵討之佛嬰城固守畯盛兵於前䆳帥勁卒自後踰壘而入佛衆驚潰追至林邑佛乃請降昇平初復為寇暴刺史温放之討破之隆安三年佛孫須逹復冦日南執太守霛源又寇九徳執太守曹炳交阯太守杜瑗遣鄧逸擊破之即以瑗為刺史義熈三年須逹復寇日南殺長史瑗遣阮斐討破之斬獲甚衆九年須逹復冦九真行郡事杜慧期與戰斬其息及生俘百餘人自瑗卒後林邑無歳不冦日南諸郡殺傷甚多交州遂致虛弱至孫文敵為扶南所殺大臣范諸農平其亂自立為王傳子陽邁宋永初時遣使來貢南史曰陽邁初在孕其母夢生兒有人以金席藉之其色光麗夷人謂金之精為陽邁若中國云紫磨者因以為名其後叛服靡常交州刺史檀和之將兵擊之深入其境齊梁亦通使徃來隋時為大將劉方所破北史曰仁夀末上遣大將軍劉方擊之王梵志乗巨象戰方軍不利方多掘小坑草覆其上與戰偽北梵志逐之其象陷大破之入其郡獲其廟主十八枚皆鑄金蓋其國有十八世方班師梵志復其故地至唐而范始滅國人立其姑子諸葛地更號環王元和初都䕶張丹擊走之徙國於占占城之名所自始也宋時襲破真臘文獻通考曰閩人有泛海之吉陽軍者飄至占城見其國與真臘乗象以戰無大勝負乃說王騎戰教之弓弩騎射王大恱具舟送之吉陽厚齎隨以買馬得數十匹以戰大克後真臘大舉復讐俘殺㡬盡更立真臘人主之元世祖詔降虎符授榮禄大夫占城郡王即其地立省撫安之然竟負固大軍南討國王戰敗逃遁然不果降明興髙皇帝賜占城國璽書國王阿荅阿者遣使朝貢蓋從此始歸款矣四年王為安南所苦奉表乞賜兵器樂人俾安南知我為聲教所被不敢輒欺負上憐之報曰兩國既共内附豈宜擅兵相攻業詔安南無開疆釁兵器不爾吝但以安南故賜爾是助爾搆兵也樂有聲律方言各異中國人不可遣爾國人能習華語者來習肄十六年遣子入賀聖節永樂改元遣使告諭即位其王占巴的頼奉金葉表來貢上使行人蔣賔王樞徃報之賜金綺有差且勅安南毋相侵掠從來請也四年遣中貴馬彬諭以共伐安南詔粤東諸將繕兵甲由海道與占城㑹賜占城王鍍金銀印他物甚侈王出兵助征廣通志曰復遣太監王貴通賫勅徃勞賜金幣五年奏言克復安南所侵地獻俘貢方物上下詔褒美數年間屢遣使來貢悉厚答之至命中貴彬䕶其使臣以歸十三年兵部尚書陳洽馳奏初討安南時占城王雖聽命出征然實懐二心愆期不進又以金帛戰象資季擴季擴以黎蒼女遺之復約陳翁挺侵升華府所𨽻地罪下季擴一等耳請發兵征之上以交趾初平不欲窮兵逺夷遣使諭王歸我侵地其後三年一朝貢詔使亦間徃不絶吳恵日記云正統六年奉使占城王遣頭目迎詔笳鼔填咽旌麾䁆靄㲲衣椎髻前奔馳至行宫設宴王乗象迓於國門帳列戈㦸以羣象為衛既宣詔稽首受命上元夜請賞煙火􅅡沉香燃火樹盛陳樂舞民多裸袒士著苧衣景泰末王摩訶貴殂天順初年弟盤羅悦馳使請封命給事中江彤行人劉寅之持冊徃王亦遣使來謝云成化中王茶全為交趾所破嗣王徙居赤坎邦遣使請封如故事而安南陪臣據其故都詭稱占城王迎詔使臣馮乂誤謂真王也持封册給之嗣王古來航海奔廣州投訴更以來朝為辭督臣屠滽命叅議姜英覈其事時安南納叛將而助之虐申言古來不當嗣滽從僉議謂冊印元有古來名宜王其地具䟽以聞仍移檄安南道之順逆安南亦不敢大肆其狼噬乃選官軍二千令東筦商人張宣䕶送古來還國𢎞治十八年古來卒沙古卜洛嗣正徳五年奉詔册封者給事中李貫行人劉廷瑞也十二年來朝嘉靖二十一年再至云其俗果于戰鬬尚釋教王冠三山金花玲瓏冠披錦帔著玳瑁履腰束八寳方帶出游乗象或黄犢車一人持㯽榔盤前導從者十餘軰各執弓矢刀鎗梁書曰王著法服加瓔珞如佛像之飾出則乗象吹螺擊鼔罩吉貝繖以吉貝為幡旗民望之膜拜一而止臣茭葉冠男蓬頭宋史曰撮髮為髻散髮餘髾於後女後椎結居處為閣名曰干闌門户皆北向民居茅茨不得踰三尺衣紫衣梁書曰男女皆以横幅吉貝繞腰以下謂之干漫僣𤣥黄者論死椰葉為席以麝塗身山牛不任耕耨但殺以祭鬼令巫祝之曰阿羅和敎他早托生也正月一日牽象周行所居之地然後驅逐出郭謂之逐邪四月㳺船十一月望日為冬至所部各獻方物十二月望日城外縛木為塔以衣服香藥置塔上焚之祭天釀酒甕中俟熟賔主繞甕坐筒而吸且吸且注水味盡而止星槎勝覽曰非至午不起非至子不睡見月則歌舞為樂無紙筆以羊皮搥薄削竹為筆蘸白灰書字南史曰書樹葉為紙或擊鼔以警衆或吹蠡以即戎古稱歳時採生人膽入酒飲之又以浴身謂之通身是膽也嫁娶必用八月女先求男同姓還相婚姻使婆羅門引壻見婦握手相付囑曰吉利吉利北史曰婚媾令媒者齎金銀釧酒二壺魚數頭至女家於是擇日夫家㑹親賔歌舞相對女家請一婆羅門送女至男家壻盥手因牽女授之喪用火葬以器乗餘骨沉之隋書曰王死七日而葬百官三日庶人一日皆以凾盛屍鼔舞導從輿至水次積薪焚之收其餘骨王則内金甖中沉之於海有官者以銅甖庶人以瓦送之於江男女皆截髮隨喪至水次盡哀而止歸則不哭毎七日然香散花復哭盡哀盡七七而罷王在位三十年即入山茹素受戒曰我不道當充虎狼食或病死從此國事不得復相關傳子攝國期年得無恙復入為王國人呼為芳嚟馬恰剌札焉唐書曰呼王為陽滿王妻為陀陽河熊大子為阿長逋宰相為婆漫地隋書曰尊官有二其一曰西那婆帝其二曰薩婆地歌其屬官三等其一曰倫多姓次歌倫致地次乙他伽蘭外官分為二百餘部其長官曰弗羅次曰可輪如牧宰之差也形勝名蹟金山在林邑故國梁書曰石皆赤色其中生金金夜則出飛狀如螢火鴉候山元史曰唐人曽延來言國主逃於大州西北鴉候山聚兵三千餘集他郡兵未至不日將與官兵交戰諜者云國主實在鴉候山不勞山在林邑浦外唐書曰有罪者使象踐之或送不勞山令自死赤坎山占城王為交趾所逼徙居于此伽㑲貌山區栗城南齊書曰區栗城建八尺表日影度南八寸木城元史曰官軍依海岸屯駐占城兵治木城四面約二十餘里起樓棚立回回三梢砲百餘座又木城西十里建行宫半山塔元行省嘗屯兵于此羅灣即占城港口物産金即金山所出者南齊書曰金汁流出於浦事尼乾道鑄金銀人像大十圍銀元史曰遣其舅奉國王信物大銀三錠小銀五十七錠碎銀一甕為質歸款又獻金葉九節標槍曰國王病未能進先使持其槍來以見誠意錫見吾學編鐵見宋史寶母原化記魏生得一美石有胡人見之曰此寶母也每月望設壇海邊置石其上可得美珠一統志載為占城産澄水珠宣室志曰嚴生得一珠胡人云此清水珠置濁流則渙然澄徹一統志載為占城産火珠舊唐書曰范頭黎獻火珠大如雞􅆗圓白皎潔光照數丈狀如水精正午向日以艾蒸之則火燃琥珀華夷考曰林邑多琥珀琥珀在地其上及傍不生草木深者或八九尺大如斛屑去皮成焉初如桃膠凝成乃堅水精一名水玉太康四年林邑王獻紫水精唾壺一口青白水精唾壺二口貝齒本草曰貝子一名貝齒生東海梁書云占城所出菩薩石周顯徳中入貢談苑曰色瑩白若水晶類日光射之有五色如佛頂圓光犀角夷人謂之黑暗宋及本朝充貢吾學編曰占城犀角象牙最多犀大者八百斤獨角在鼻端長者可尺五寸象牙夷人謂之白暗宋及本朝充貢瑇瑁見梁書竒楠香諸國出者惟占城為佳本朝充貢星槎勝覽曰棋楠香在一山所産酋長禁民不得採取犯者斷手足吾學編名伽南香沉香梁史曰沉木香者土人斫斷積以歳年朽爛而心節獨在置水中則沉故名沉香檀香佛家謂之旃檀宋及本朝占城以之充貢圖經曰檀香凢數種有黄白紫之異古今註曰紫旃木出林邑亦謂紫檀也龍腦香酉陽雜俎云樹髙八九丈可六七尺圍葉圓而背白樹有肥瘦形似松脂作杉木氣乾脂謂之龍腦香清脂謂之波律膏麝香唐書曰以麝塗身日再塗再澡華夷考曰似麞而小其香正在隂前皮内别有膜裹之春分取之生者益良一説香有三種第一夏食蟲多至寒香滿入春急痛自以爪剔出之落處草木皆焦其次臍香乃捕得殺取者又次心結香麝被獸逐狂走顛墜崖谷而斃破心見血流出作塊者是乳香宋時充貢廣志曰即松木脂有紫赤如櫻桃者名乳香蓋薰陸之類也香譜云今以通明者為勝降真香本朝充貢本草曰和諸雜香燒煙直上天召鶴盤旋其上丁香宋時充貢本草註曰樹髙丈餘凌冬不凋葉似櫟而花圓細色黄子如丁長四五分紫色中有粗大長寸許者呼母丁香擊之則順理而折薔薇水周時入貢宋史曰灑水經歳香不歇俗呼為薔薇露猛火油周時入貢宋史曰得水愈熾國人用以水戰吉貝梁書曰樹名也其華成時如鵞毳其緒紡以作布亦染成五色織為斑布朝霞布唐書曰王妻服朝霞又貞觀時以之充貢絲紋布見宋史白㲲布宋史曰無絲蠶以白㲲布纒其胷垂至於足貝多葉簟貝多葉長一尺五六寸濶五寸許葉形似琵琶而厚夷人以此書字者也織以為簟宋時占城充貢明角烏角黄蠟見宋史硫黄陶隠居云出林邑色如鵞子初出殻名崑崙黄蘇木見宋史本朝充貢烏樠木見宋史本朝充貢星槎勝覽曰烏木降香樵之為薪觀音竹吾學編曰如藤長丈八尺色黑如鐵一寸二三節穀宋史曰每歳稲熟王自割一把從者及婦女競割之今漳人所有占粟即占城種也燕窩華夷考曰海燕大如鳩春回巢於古巖危壁葺壘乃白海菜也島夷伺其秋去以脩竿接鏟取而鬻之謂之燕窩宴品珍之胡椒宋時入貢㯽榔唐書曰取㯽榔瀋為酒宋時入貢椰南方草物狀曰昔林邑王與越王有故怨遣俠客刺得其首懸之於樹俄化為椰子林邑王憤之剖為飲器南人至今效之當刺時越王大醉故其漿如酒云波羅蜜瀛涯勝覽曰占城有果曰波羅蜜狀如冬𤓰皮似荔枝内有黄肉大如鷄子味甘如蜜中有子似鵞腰子炒食之味如栗海梧子南方草木狀曰樹與中國松同但結實絶大形如小栗三角肥甘樽爼間佳果也出林邑茴香圖經曰懷香子亦名茴香交廣諸番出入藥用番舶者花頭如傘蓋結實如麥而小青色宋時占城入貢蓽澄茄本草經曰生佛誓國似梧桐子及蔓荆子㣲大亦名毗陵茄子按宋史占城王為交州所攻奔于佛逝即占城属國也荳蔲見宋史按宋史載占城所産又有甘蔗蕉子蓮子麻豆之屬兹不具悉犀林邑記曰犀行過叢林不通開口露齒前向棘林自開周顯徳中占城獻雲龍形通天犀獅說文曰虓獅子也爾雅曰狻猊如虥猫食虎豹宋史占城傳曰民獲獅象皆輸於王象酉陽曰環王國野象成羣一牡管牝三十餘國人養馴者可令代樵猩猩見唐書白猿梁天監九年來獻白雉援神契曰周成王時越裳獻白雉秦吉鳥唐㑹要曰林邑國有結遼鳥謂之吉了能人語華夷考曰如鸜鵒黒色丹咮目下連頂有深黄文頂毛有縫如人分髮能言比鸚鵡尤慧大抵鸚鵡如兒女吉了聲則如丈夫鸚鵡山經曰青羽赤喙人舌能言名曰鸚鵡舌似小兒脚折前後各兩扶南徼外出五色者舊唐書曰林邑獻五色鸚鵡太宗異之詔李百藥為賦又獻白鸚鵡精識辨慧善於應答太宗憫之並付其使令放還於林藪山雞異苑曰山雞愛其毛映水則舞傅𤣥賦曰惟南州之令鳥兼坤維而體珍被黄中之正色敷文象以飾身占城宋時入貢歸飛水經註曰林邑城外香桂成林氣清澄煙時禽異羽􅃋集間關兼比翼鳥不比不飛鳥名歸飛鳴聲自呼俞益期與韓豫章牋曰其背青其腸赤丹心外露鳴情未逹終日歸飛飛不十千路有萬里何由歸哉龜宋史曰官無資俸但給龜魚充食交易賈舶扺岸獻果幣于王王設食待之國人狠而狡貿易徃徃不平故徃販者少或謂取人膽者非止獻王亦以供象洗目伺人于道乗其不意斫殺之取膽以去若彼人驚覺則膽破不中用矣置衆膽煑釡中華人膽輒居上故必取華人膽為貴五六月間商人出必戒嚴暹羅六坤暹羅在南海古赤土及婆羅刹地也以赤土故後人訛為赤眉遺種隋大業二年募能通絶域者屯田主事常駿等自南海郡乗舟使赤土宣詔畢為奏天竺樂曰今是大國臣非復曩赤土國矣以鑄金為多羅葉隠起成文為表金函封之遣子隨駿還報此通中華之始也隋書曰王遣舶三十艘來迎進金鏁以纜駿船月餘至都遣子那邪迦送金盤貯香花并鏡鑷金合二枚貯香油金缾八收貯香水白疊布四條擬供盥洗其日那邪迦又將象二頭持孔雀蓋以迎并致金花金盤以藉詔函男女百人奏蠡鼓婆羅門二人導路至王宫駿等奉詔上閣王以下皆坐宣詔訖引駿等坐奏天竺樂事畢駿等還舘遣婆羅門就舘送食曰飲食踈薄願大國意而食之後數日請駿等入宴前設兩牀牀上並設草葉盤方一丈五尺上有黄白紫赤四色之餅牛羊魚鼈蝳蝐之肉百餘品延駿升牀從者坐於地席各金鍾置酒女樂迭奏禮遣甚厚尋遣那邪迦隨駿貢方物并獻金芙蓉冠龍腦香令婆羅門以香花奏蠡鼔送之唐貞觀時婆利羅刹與林邑使者偕來唐書曰婆利東即羅刹也常駿使赤土遂通中國其後分為暹與羅斛二國暹瘠土不宜耕稼羅斛土平衍而種多獲暹取給焉元元貞初暹遣使入貢賜來使素金符佩之元史曰元貞元年進金字表欲朝廷遣使至其國比表至已先遣使蓋彼未之知也使急追詔使同徃以暹人與麻里予兒舊相讐殺至是皆歸順有㫖諭暹人勿傷麻里予兒以踐爾言大徳三年暹國主上言父時朝廷嘗賜鞍轡白馬及金縷衣乞循故事以賜帝以丞相言彼小國而賜馬恐其鄰祈都軰譏議朝廷竟賜金縷衣不錫以馬迨至正間暹降羅斛遂稱暹羅斛洪武四年國王叅烈昭毘牙遣使奉金葉表來朝七年使臣沙里拔繼至自言銜命來王去秋八月壊舟烏猪洋漂至南海所餘貢物僅蘇木降香兠羅綿來獻不敢自外於包茅上訝其無表詭言舟覆而方物廼存必番商也卻之詔中書禮部曰古者中國諸侯比年一小聘三年一大聘九州之外則每世一朝所貢方物不過表誠敬而已髙麗稍近中國頗有文物禮樂與他番異是以命依三年一聘之禮其他逺國如占城安南西洋瑣里𤓰哇浡泥三佛齊暹羅斛真臘等處新附國土入貢既頻勞費甚大朕不欲也令遵古典不必頻煩其移文使諸國知之九年國王哆囉禄遣其子昭祿羣膺貢象及方物下詔褒諭賜暹羅國王印自是始稱暹羅從朝命也二十年再貢二十八年哆囉祿殂遣中使趙逹徃祭兼賜嗣王昭祿羣膺及妃綺帛氁布有差永樂元年遣使賀即位二年表貢方物遣中使李興徃勞賜文綺鈔帛四年貢使嗣至表乞量衡式許之并賜古今烈女傳是秋國王遣使與琉球修好遭風漂舟入閩守臣籍記方物以請上謂李至剛曰屬夷締盟美事也朕豈有利焉鄉有善人猶能救人於危况朝廷統御天下哉令有司給粟俟便風導之去七年使凢兩至首春以祭仁孝皇后秋九月更修職貢厚報之時南海叛民何八觀等屯聚島外竄入暹羅至是使歸兼諭國王毋為逋逃主八年貢使附送八觀等還降勅嘉美十年冬貢復至十三年昭禄羣膺殂子三頼波磨札剌的頼嗣暹羅於滿刺加夙鞭箠使之徵輸惟命然猶歳歳開兵隙十七年詔暹羅國王俾與滿刺加平十八年貢又至遣中使楊敏䕶其使還國并報禮王十九年春奉表謝侵滿剌加之罪七月貢如常儀蓋是歳使又兩至云二十一年貢至賜鈔幣如禮其後著令三載一貢至成化間汀州士人謝文彬者以販鹽下海飄入暹羅因仕其國後充貢使至留都遇從子瓉于途為織錦綺貿易事覺下吏竟遣歸然成化後大率六年一貢矣嘉靖三十二年使至貢白象及方物途中白象已斃遺象牙一枝使者以珠寶飾之置金盤内并貯白象尾毛為信廣志曰象牙一枝長八寸首尾廂金起花牙首大五寸七分鑲石榴子十顆中鑲珍珠十顆寶石四顆尾大二寸鑲金剛鑚一顆上嘉其意而禮遣之隆慶初年東蠻牛俗名放沙求婚暹羅暹羅拒之峻東蠻牛恚甚統沙外兵圍暹羅破之王自經死虜其世子及中朝所賜印以歸次子攝國奉表請印曰暹羅部領數十國非天朝印不得調兵上命給予時鄭汝璧為禮部郎白内閣不知印文云何閣臣曰第鑄暹羅國王印予之可耳鄭曰國初受封未必即稱王且篆文尺寸或有未合於彼不便彼所存公移舊印文固在也宜檄粤東撫臣徃取循以給之内閣曰然嗣取印文至則都統使印也遍考諸書國王印是永樂所賜而耳目刺謬若此豈先朝佯為駕御之術耶抑邇來在事者因更給而故殺其權耶存之以俟知者暹羅既敗其後頗為東蠻牛所制嗣王整兵經武志在復讐萬厯間東蠻牛復來寇嗣王引兵迎擊之殺其子東蠻牛宵遁不敢復窺暹羅暹羅新雄海外遂移軍攻真蠟真蠟降從此年年用兵遂霸諸國矣比倭寇朝鮮部議遣材官諭諸屬國率夷兵攻夷暹羅願領所部前驅自効經畧都御史宋應昌以聞㑹倭酋死遯去不果行焉其土下濕氣候嵐熱不齊民悉樓居樓密聨㯽榔片藤繫之甚固藉以藤席竹簟寢處其間王宫髙九丈餘以黄金為飾雕縷八卦備極𢎞麗隋書赤土傳王居有門三重每門圖畫飛仙菩薩之狀懸金花鈴旄王宫諸屋悉是重閣北户北面而坐坐三重之榻王榻後作一木龕以金銀五香木雜鈿之龕後懸一金光燄夾榻又樹二金鏡前並陳金甕金鑪當前置金伏牛前樹一寳蓋左右皆有寳扇然則今之暹羅猶畧祖其華靡也諸酋見王禮制甚肅望門自拜膝行乃前王與國人白布纒首被服長衫腰束嵌絲􅍤王獨加以錦綺跨象或乗肩輿尚釋教國人效之赤土傳曰其俗敬佛百金之産便以其半施佛婦人多智丈夫事無大小悉歸與婦計之聽其裁決婦見華人慕悦之置酒款接留宿酣狎以為常夫不能禁也吾學編曰男陽嵌珠玉貴者範金盛珠行鏗然有聲婚則羣僧迎壻至女家僧取女紅帖男額以為吉祥喪禮以水銀灌之葬于髙埠蓋塔其上貧家鳥葬耳以礬製紙施煙粉為白黒田平而沃稼穡豐熟其俗勁悍善水戰星槎勝覽曰削㯽榔木為標鎗水牛皮為牌藥鏃等器大將多用聖銕裹身刀矢不能入聖銕者人腦骨也方言謂天為普頼地為佃因日為脈月為晩官制凡九等一曰握啞徃二曰握歩剌三曰握四曰握悶六曰握文七曰握板八曰握郎九曰握救坤文則使臣在舘教習譯字生者形勝名蹟其國有款細灣細辭滑沾奔諸府皮細禄倒腦細可刺諸司大帽山在王宫後筆架山三峯接連如筆架狀黎頭山竹嶼椰樹灣黄河水水自五月一派從海中來漸而漲田其地四月插苗苗隨水漲而發水漸髙苗亦漸長遂至六七尺漲以九月始退退則稻熟可收田得水而肥其米純白鄰壤多取給焉三寶港是港無鱷魚金城在王宫金塔在殿内其中金佛無數高七八尺小一二尺三關其一為程盡所轄其二為本夷所轄其三為佛郎機日本所轄錫門華人出入必經之處鄭和為建卓楔扁曰天竺國禮拜寺永樂間鄭和所建寺甚宏麗佛髙與屋齊三寶廟在第二關祀太監鄭和西塔其塔無合尖聞夷人初建塔功成鄭和令削去之後屢緝不能就物産珠徐𠂻南方狀曰採珠用五牲祈禱若祠祭有失則風攪海水或有大魚在蚌左右海賈云中秋有月是歳多珠珊瑚圖經曰生海底作枝柯狀明潤如紅玉海中經曰取珊瑚先作鐵􅃠沉水底珊瑚貫中而生嵗高三二尺絞綱出之皆摧折在網中故難得完好者今一統志云以絲繩繫五爪鐵猫兒用黑鉛為墜擲海中取之亦其遺法也本朝充貢琥珀博物志曰松脂淪地中千年化為茯苓又千年化為琥珀猫睛石寶貨辨疑曰猫睛出南番酒色濶如指面大者愈大愈好寶石華夷考曰錫蘭髙山參天頂産青美藍石黄雅鶻石青紅寶石毎遇大雨衝流沙中拾取之暹羅本朝充貢金剛鑚抱朴子曰金鋼生水底石上如鐘乳狀體如紫石英没水取之鐵擊不能傷華夷考曰金剛砂出深山高頂人不可到乃鷹隼打食郤於野地上鷹糞中獲得以其能鑚定器名金剛鑚犀角本朝充貢象牙本朝充貢翠羽本朝充貢玳瑁龜筒嶺表錄異曰人立背上可附而行取殻以生得全者為貴初用木換出其肉楚毒鳴吼如牛古人謂生龜脫筒指此工人以其甲通明黄色者煮拍陷瑇瑁為器謂之龜筒花錫爾雅錫謂之靷鉛地鏡圖曰草青莖赤秀下有鉛羅斛香一統志曰味極清逺亞於沉香本朝充貢檀香葉廷珪香譜曰皮實色黄者為黄檀皮潔色白者為白檀皮腐色紫者為紫檀並堅重清香白檀尤良乳香佛書謂之天澤香言其潤澤也又謂之伽羅香降香本朝充貢俗呼舶上來者為番降片腦華夷考曰産暹羅諸國髙二三丈皮理如沙栁腦則其皮間凝液也島夷以鋸付就谷中尺斷而出剝採之有大如指厚如二青錢者香味清烈瑩潔可愛謂之梅花片鬻至中國擅翔價焉復有數種其次耳本朝充貢薔薇水華夷考名􅙐醿露曰海國所産天氣淒寒零露凝結著他草木乃氷澌木稼殊無香韻惟􅙐醿花上瓊瑶晶瑩芬芳襲人若甘露焉夷女以澤體髮膩香經月不滅暹羅尤特愛重競買畧不論直兠羅綿瞿睿夫曰兠羅綿刀矢不能入明角烏角蠟見星槎勝覽阿魏酉陽雜爼曰樹長八九尺皮色青黄斷其枝汁出如飴名阿魏海上耳談謂傳之暹羅商云樹如棘叢生刺若蝟毛春初麞麂孶逐狂奔著樹輒死地産大蟻壅泥沙啜之成封垤夷人乃以竹筒作篦射壅中筒溜成藥彼中食料以此爛物如鮑肆忘臭按唐本註曰性極臭而能止臭亦竒物也􅆩皮蘇木吾學編曰暹羅蘇木賤如薪色絶勝本朝充貢夷瓶以夷泥為之俗名干柸夏月貯水可以不敗大風子本草釋名曰能治大風疾故名紫梗本草名紫鉚蘇恭曰紫色如膠作赤䴢皮及寶鈿用為假色亦以膠寶物云蟻於樹藤皮中為之如蜂造蜜吳錄所謂赤膠没樂圖經曰海南諸國有之根株如橄欖葉青而密歳乆者膏液流滴地下凝結成塊一統志曰樹高大如松皮厚一二寸採時掘樹下為坎用斧伐其皮取脂交易中國徃與貿易既至王城以幣帛橙橘之類貢王然王深居不得見其俗以海􅖝代錢是年不用􅖝則國必大疫故相沿不改􅖝即今螺巴星槎勝覽云每一萬准中統鈔二十貫貿易輸稅各有故事國人禮華人甚摯倍于他夷真慕義之國也論曰林邑夙通中華居然雄國暹羅自赤土攀隋亦便有衣被震旦意明興内附洗沐雲油占城見苦交人則屢詔銷其鋒暹羅躪蹂滿剌加則十行折其鋭蓋莫不義畏而仁懐焉然占城從征而有二心於交暹羅當海内寧夷輒請遣子入學當屬國雲擾又請助戰擒倭夫固二國之優劣也東西洋考卷二
